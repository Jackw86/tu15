:root {
  --primary: #00D4B8;
  --primary-dark: #00B39A;
  --bg: #0F1117;
  --bg2: #181C25;
  --bg3: #22272F;
  --text: #F8F9FA;

  --accent-glow: rgba(0, 212, 184, 0.20);
  --radius: 28px;

  --radius-lg: 32px;
  --shadow-sm: 0 8px 24px -4px rgba(0, 212, 184, 0.15);
  --shadow-lg: 0 25px 50px -12px rgba(0, 212, 184, 0.25);
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

#root {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  background: var(--bg);
  overflow-x: hidden;
}

/* Typography */
h1, h2, h3 { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em; }
h2 { font-size: 1.55rem; }
h3 { font-size: 1.25rem; }

/* Spring interactions */
.spring {
  transition: transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1),
              opacity 0.28s cubic-bezier(0.4, 0, 0.2, 1),
              box-shadow 0.25s ease;
}
.spring:active { transform: scale(0.96); }

/* Glassmorphism modal */
#modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
#modal-box {
  background: rgba(24, 28, 37, 0.96);
  backdrop-filter: blur(32px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 480px;
  max-height: 88dvh;
  overflow-y: auto;
  padding: 0 20px calc(20px + env(safe-area-inset-bottom));
}

/* Enhanced isometric icons */
.iso-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  filter: drop-shadow(4px 8px 16px rgba(0, 212, 184, 0.28));
  transition: filter 0.25s ease;
}
.iso-icon:hover { filter: drop-shadow(6px 10px 20px rgba(0, 212, 184, 0.45)); }

/* Premium buttons */
.btn-primary {
  background: linear-gradient(135deg, var(--primary), #00E6C8);
  color: #0F1117;
  font-weight: 700;
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px 24px;
  font-size: 0.96rem;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }

.card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}

/* Loading screen */
.loading-screen {
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  flex-direction: column;
  gap: 20px;
}
