// GUEST MODE — loads demo data, bypasses all Firebase reads/writes
// ─────────────────────────────────────────────────────────────────────────────
function enterGuestMode() {
  state.isGuest      = true;
  state.demoRole     = 'admin';  // default to admin so all features visible
  state.user         = DEMO.user;
  state.profile      = DEMO.profile;
  state.teams        = [DEMO.team];
  state.activeTeamId = DEMO.team.id;
  state.members      = DEMO.members;
  state.events       = DEMO.events;
  state.posts        = DEMO.posts;
  state.comments     = DEMO.comments;
  state.chats        = DEMO.chats;
  state.fees         = DEMO.fees;
  state.files        = DEMO.files;
  state.polls        = DEMO.polls;
  state.albums       = DEMO.albums;
  state.trips        = DEMO.trips;
  state.opponents    = DEMO.opponents;
  state.sections     = DEMO.sections;
  state.messages     = [];
  state.rsvps        = { ev1:'yes', ev2:'yes' };
  applyTeamTheme(DEMO.team.id);
  navigate('home');
  // Show walkthrough for first-time users
  maybeStartTour();
}
window.enterGuestMode = enterGuestMode;

function exitGuestMode() {
  state.isGuest             = false;
  state.demoRole            = 'admin';
  state.checklistDismissed  = false;
  state.user         = null;
  state.profile      = null;
  state.teams        = [];
  state.activeTeamId = null;
  state.members      = [];
  state.events       = [];
  state.posts        = [];
  state.comments     = {};
  state.chats        = [];
  state.fees         = [];
  state.files        = [];
  state.polls        = [];
  state.albums       = [];
  state.trips        = [];
  state.opponents    = [];
  state.sections     = [];
  state.activeSection = null;
  state.messages     = [];
  state.rsvps        = {};
  state.unsubs.forEach(u => u());
  state.unsubs       = [];
  navigate('welcome');
}
window.exitGuestMode = exitGuestMode;

// Guest-safe write guard — call before any Firestore write
function guestBlocked(action = 'This feature') {
  if (state.isGuest) {
    showToast(`${action} is disabled in demo mode 👀`, 'error');
    return true;
  }
  return false;
}

// TEAM THEME — updates CSS variables instantly when team colour changes
// ─────────────────────────────────────────────────────────────────────────────
function applyTeamTheme(teamId) {
  const team    = state.teams.find(t => t.id === (teamId || state.activeTeamId));
  const root    = document.documentElement;

  // Admins and coaches see the clean system teal — no custom brand colour
  // Parents and players see the team's chosen colour
  const effectiveRole = state.demoRole
    || state.members.find(m => m.userId === state.user?.uid)?.role
    || 'player';

  const isAdminOrCoach = effectiveRole === 'admin' || effectiveRole === 'coach';
  const colour = isAdminOrCoach
    ? '#00BFA5'  // always system teal for admin/coach
    : (team?.brandColour || '#00BFA5');

  root.style.setProperty('--primary',       colour);
  root.style.setProperty('--primary-dark',  shadeColour(colour, -15));
  root.style.setProperty('--primary-light', hexToRgba(colour, 0.1));
  root.style.setProperty('--primary-glow',  hexToRgba(colour, 0.07));
}
window.applyTeamTheme = applyTeamTheme;

function shadeColour(hex, pct) {
  const num = parseInt(hex.replace('#',''), 16);
  const f = pct / 100;
  const r = Math.min(255, Math.max(0, (num >> 16) + Math.round(255 * f)));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + Math.round(255 * f)));
  const b = Math.min(255, Math.max(0, (num & 0xff) + Math.round(255 * f)));
  return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

function hexToRgba(hex, alpha) {
  const num = parseInt(hex.replace('#',''), 16);
  return `rgba(${(num>>16)&255},${(num>>8)&255},${num&255},${alpha})`;
}

window.showBookingScreen = function() {
  const myRole = state.members.find(m => m.userId === state.user?.uid)?.role;
  const isCoach = myRole === 'admin' || myRole === 'coach' || state.demoRole === 'admin' || state.demoRole === 'coach';

  const slotsHtml = _booking.slots.length
    ? _booking.slots.map(slot => {
        const booked     = slot.bookings.includes(state.user?.uid || 'demo-user');
        const full       = slot.bookings.length >= slot.maxBookings;
        const spotsLeft  = slot.maxBookings - slot.bookings.length;
        return `
          <div class="booking-slot-card">
            <div class="booking-slot-header">
              <div>
                <div class="booking-slot-label">${escHtml(slot.label)}</div>
                <div class="booking-slot-meta">${slot.day} · ${slot.time} · ${slot.duration}min</div>
                ${slot.notes ? `<div class="booking-slot-notes">${escHtml(slot.notes)}</div>` : ''}
              </div>
              <div class="booking-slot-price">£${slot.price}</div>
            </div>
            <div class="booking-slot-footer">
              <span class="booking-spots">${spotsLeft > 0 ? spotsLeft + (spotsLeft===1 ? ' spot left' : ' spots left') : 'Fully booked'}</span>
              ${isCoach
                ? `<button class="btn btn-ghost btn-sm" onclick="editBookingSlot('${slot.id}')">Edit</button>`
                : booked
                  ? `<button class="btn btn-ghost btn-sm booking-booked" onclick="cancelBooking('${slot.id}')">Cancel booking</button>`
                  : full
                    ? `<button class="btn btn-ghost btn-sm" disabled>Full</button>`
                    : `<button class="btn btn-primary btn-sm" onclick="bookSlot('${slot.id}')">Book — £${slot.price}</button>`
              }

          </div>`;
      }).join('')
    : `<div class="sections-empty"><div class="sections-empty-title">No slots available yet</div>

window.bookSlot = function(slotId) {
  const slot = _booking.slots.find(s => s.id === slotId);
  if (!slot) return;
  const uid = state.user?.uid || 'demo-user';
  if (slot.bookings.includes(uid)) { showToast('Already booked','error'); return; }
  if (slot.bookings.length >= slot.maxBookings) { showToast('Slot is full','error'); return; }
  slot.bookings.push(uid);
  showToast(`${slot.label} booked for ${slot.day} at ${slot.time} ✅`);
  showBookingScreen();
};

window.cancelBooking = function(slotId) {
  const slot = _booking.slots.find(s => s.id === slotId);
  if (!slot) return;
  const uid = state.user?.uid || 'demo-user';
  slot.bookings = slot.bookings.filter(b => b !== uid);

window.setKitAlloc = async function(uid, field, value) {
  const team = state.teams.find(t => t.id === state.activeTeamId);
  if (!team) return;
  if (!team.kitAllocated) team.kitAllocated = {};
  if (!team.kitAllocated[uid]) team.kitAllocated[uid] = {};
  team.kitAllocated[uid][field] = value;
  if (!state.isGuest) {
    try {
      await updateDoc(doc(db,'teams',state.activeTeamId), {
        [`kitAllocated.${uid}.${field}`]: value
      });
    } catch(e) {}
  }
};

window.markKitPaid = async function() {
  const team = state.teams.find(t => t.id === state.activeTeamId);
  const uid  = state.user?.uid || '';
  if (!team) return;
  if (!team.kitAllocated) team.kitAllocated = {};
  if (!team.kitAllocated[uid]) team.kitAllocated[uid] = {};
  team.kitAllocated[uid].paid = true;
  team.kitAllocated[uid].paidAt = new Date();
  if (!state.isGuest) {
    try {
      await updateDoc(doc(db,'teams',state.activeTeamId), {
        [`kitAllocated.${uid}.paid`]: true
      });
    } catch(e) {}
  }
  showToast('Kit marked as paid');
  showKitAllocated();
};

// Hardcoded founder friends — team IDs or user emails that get lifetime Pro
// App owner: add your friend's team ID here
const FOUNDER_FRIENDS = new Set([
  'jackw-care-limited',  // Jack's Care Limited — example
  // Add more team IDs or emails here as needed
]);

function isFounderFriend(teamId, userEmail) {
  if (!teamId && !userEmail) return false;
  return FOUNDER_FRIENDS.has(teamId) || FOUNDER_FRIENDS.has(userEmail);
}

// Override isTeamPro to check founder friend status
const _isTeamPro_orig = window.isTeamPro || function(team) {
  return team?.isPro || team?.proTier === 'lifetime' || team?.proTier === 'trial';
};

window.isTeamPro = function(team) {
  if (!team) return false;
  if (isFounderFriend(team.id, team.ownerEmail)) return true;
  if (isFounderFriend(null, state.user?.email)) return true;
  return _isTeamPro_orig(team);
};

// Admin utility to grant founder Pro (call from console: grantFounderPro('teamId'))
window.grantFounderPro = function(teamIdOrEmail) {
  FOUNDER_FRIENDS.add(teamIdOrEmail);
  showToast('Founder Pro granted for: ' + teamIdOrEmail);
};

window.showMatchReport = function(eventId) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return;
  const report = ev.matchReport || { score:'', notes:'' };

  // Build player ratings without nested template literals
  const ratingsHtml = state.members.filter(m => m.role === 'player').map(m => {
    const rating = (ev.playerRatings||{})[m.userId] || 0;
    const stars  = [1,2,3,4,5].map(n =>
      '<button class="star-btn ' + (rating>=n?'active':'') + '"' +
      ' onclick="setPlayerRating(\'' + eventId + '\',\'' + m.userId + '\',' + n + ')">★</button>'
    ).join('');
    return '<div class="player-rating-row">' +
      '<span class="player-rating-name">' + escHtml(m.displayName) + '</span>' +
      '<div class="player-rating-stars">' + stars + '</div>' +
      '</div>';
  }).join('');

  showModal(`
    <h3>Match report</h3>
    <div class="form-label">Score</div>
    <input id="mr-score" class="input" placeholder="e.g. 3–1" value="${escHtml(report.score)}"
      style="font-size:1.5rem;font-weight:900;text-align:center;letter-spacing:.1em"/>
    <div class="form-label" style="margin-top:10px">Notes</div>
    <textarea id="mr-notes" class="input textarea" rows="3"
      placeholder="How did the match go? Key moments, player highlights…">${escHtml(report.notes)}</textarea>
    <div class="form-label" style="margin-top:10px">Quick player ratings</div>
    <div class="player-rating-list">${ratingsHtml}</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="showEventDetail('${eventId}')">Cancel</button>
      <button class="btn btn-primary" onclick="saveMatchReport('${eventId}')">Save</button>
    </div>`);

window.setPlayerRating = function(eventId, userId, rating) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return;
  if (!ev.playerRatings) ev.playerRatings = {};
  ev.playerRatings[userId] = rating;
  // Update stars UI
  const rows = document.querySelectorAll('.player-rating-row');
  rows.forEach(row => {
    if (row.querySelector('.player-rating-name')?.textContent ===
        state.members.find(m=>m.userId===userId)?.displayName) {
      row.querySelectorAll('.star-btn').forEach((btn,i) => {
        btn.classList.toggle('active', i < rating);
      });
    }
  });
};

window.saveMatchReport = function(eventId) {
  const ev    = state.events.find(e => e.id === eventId);
  if (!ev) return;
  const score = document.getElementById('mr-score')?.value.trim() || '';
  const notes = document.getElementById('mr-notes')?.value.trim() || '';
  ev.matchReport = { score, notes, savedAt: new Date() };
  showToast('Match report saved');
  showEventDetail(eventId);
};

window.markAllPresent = function(eventId) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return;
  const players = state.members.filter(m => m.role==='player'||m.role==='coach');
  ev.markedIn = [...new Set([...(ev.markedIn||[]), ...players.map(m=>m.userId)])];
  showToast(`${players.length} players marked present`);
  renderApp();
  showEventDetail(eventId);
};

  if (!ev.compEntries) ev.compEntries = {};
  if (!ev.compEntries[userId]) ev.compEntries[userId] = {};

  const ev = state.events.find(e => e.id === eventId);
  if (!ev) { showToast('Event not found','error'); return; }
  const start  = ev.startsAt?.toDate?.() || new Date();
  const pad    = n => String(n).padStart(2,'0');
  const fmt    = d => d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';
  const end    = new Date(start.getTime() + 90*60000); // default 90 min
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text:   ev.title || 'Training',
    dates:  fmt(start)+'/'+fmt(end),
    details: ev.bringNote ? 'Bring: '+ev.bringNote : '',
    location: ev.location || '',
  });
  window.open('https://calendar.google.com/calendar/render?' + params.toString(), '_blank');
};

window.addToAppleCalendar = function(eventId) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) { showToast('Event not found','error'); return; }
  const start  = ev.startsAt?.toDate?.() || new Date();
  const end    = new Date(start.getTime() + 90*60000);
  const fmt    = d => d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const ics = [
    'BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',
    'DTSTART:'+fmt(start),'DTEND:'+fmt(end),
    'SUMMARY:'+encodeURIComponent(ev.title||'Training'),
    ev.location ? 'LOCATION:'+encodeURIComponent(ev.location) : '',
    'END:VEVENT','END:VCALENDAR'
  ].filter(Boolean).join('\n');
  const blob = new Blob([ics], { type:'text/calendar' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = (ev.title||'event').replace(/[^a-z0-9]/gi,'_')+'.ics';
  a.click();
  URL.revokeObjectURL(url);
};

async function loadTeams() {
  if (!state.user) return;
  try {
    const indexSnap = await getDocs(
      collection(db, 'userTeams', state.user.uid, 'teams')
    );
    const teamIds = indexSnap.docs.map(d => d.id);
    if (!teamIds.length) { state.teams = []; return; }

    const teamDocs = await Promise.all(
      teamIds.map(id => getDoc(doc(db, 'teams', id)))
    );
    state.teams = teamDocs
      .filter(d => d.exists())
      .map(d => ({ id: d.id, ...d.data() }));

    if (!state.activeTeamId && state.teams.length) {
      state.activeTeamId = state.teams[0].id;
      await loadTeamData(state.activeTeamId);
    }
  } catch(e) { console.warn('loadTeams:', e); }
}

async function loadTeamData(teamId) {
  state.unsubs.forEach(u => u());
  state.unsubs = [];

  // Events
  const evUnsub = onSnapshot(
    query(collection(db,'teams',teamId,'events'),
          orderBy('startsAt','asc'), limit(20)),
    snap => { state.events = snap.docs.map(d=>({id:d.id,...d.data()})); renderApp(); }
  );

  // Posts
  const postUnsub = onSnapshot(
    query(collection(db,'teams',teamId,'posts'),
          orderBy('createdAt','desc'), limit(20)),
    snap => { state.posts = snap.docs.map(d=>({id:d.id,...d.data()})); renderApp(); }
  );

  // Members
  const memUnsub = onSnapshot(
    query(collection(db,'teams',teamId,'members'),
          where('isActive','==',true)),
    snap => { state.members = snap.docs.map(d=>({...d.data()})); renderApp(); }
  );

  state.unsubs = [evUnsub, postUnsub, memUnsub];
}

async function loadChat(chatId) {
  state.activeChatId = chatId;
  const msgUnsub = onSnapshot(
    query(collection(db,'chats',chatId,'messages'),
          orderBy('sentAt','asc'), limit(50)),
    snap => { state.messages = snap.docs.map(d=>({id:d.id,...d.data()})); renderChatRoom(); }
  );
  state.unsubs.push(msgUnsub);
}

async function toggleReaction(postId, emoji) {
  if (!state.activeTeamId || !state.user) return;
  if (state.isGuest) {
    const post = state.posts.find(p => p.id === postId);
    if (!post) return;
    const existing = post.reactions[emoji] || [];
    const hasReacted = existing.includes(state.user.uid);
    post.reactions[emoji] = hasReacted
      ? existing.filter(id => id !== state.user.uid)
      : [...existing, state.user.uid];
    renderApp();
    return;
  }
  const postRef = doc(db,'teams',state.activeTeamId,'posts',postId);
  const post = state.posts.find(p => p.id === postId);
  if (!post) return;
  const existing = post.reactions?.[emoji] || [];
  const hasReacted = existing.includes(state.user.uid);
  await updateDoc(postRef, {
    [`reactions.${emoji}`]: hasReacted
      ? arrayRemove(state.user.uid)
      : arrayUnion(state.user.uid)
  });
}

function randomCode(len=6) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:len},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}

function computeChecklist() {
  const uid = state.user?.uid || '';
  return {
    // Step 1: team has at least one event
    addedActivity:   state.events.length > 0,
    // Step 2: current user has RSVP'd to any event
    rsvpdActivity:   Object.keys(state.rsvps).length > 0 &&
                     Object.values(state.rsvps).some(s => s === 'yes' || s === 'maybe' || s === 'no'),
    // Step 3: team has more than 1 member (i.e. someone was invited)
    invitedMembers:  state.members.length > 1,
    // Step 4: team has at least one post
    addedPost:       state.posts.length > 0,
  };
}

function renderChecklist() {
  const cl = computeChecklist();
  const steps = [
    { key:'addedActivity', label:'Add your first activity',  done: cl.addedActivity,  action:"switchTab('schedule')" },
    { key:'rsvpdActivity', label:'RSVP to an activity',      done: cl.rsvpdActivity,  action:"switchTab('schedule')" },

    { key:'addedPost',     label:'Add a welcome post',       done: cl.addedPost,      action:'showCreatePost()'      },

  const doneCount  = steps.filter(s => s.done).length;
  const totalCount = steps.length;
  const pct        = Math.round((doneCount / totalCount) * 100);

  // If all done or dismissed — don't render
  if (allDone || state.checklistDismissed) return '';

  return `
    <div class="checklist-card">

        <div class="checklist-header-text">

      </div>

      <!-- Progress bar -->
      <div class="checklist-progress-track">
        <div class="checklist-progress-fill" style="width:${pct}%"></div>
      </div>

      <!-- Steps -->
      <div class="checklist-steps">
        ${steps.map(step => `
          <button class="checklist-step ${step.done ? 'done' : ''}"
            onclick="${step.done ? '' : step.action}">
            <div class="checklist-step-icon">
              ${step.done
                ? `<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                     <circle cx="8" cy="8" r="8" fill="#e5e7eb"/>
                     <path d="M5 8l2.5 2.5L11 5.5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                   </svg>`
                : `<div class="checklist-step-dot"></div>`}
            </div>
            <span class="checklist-step-label">${step.label}</span>
            ${!step.done ? `<span class="checklist-step-arrow">›</span>` : ''}

// ── Pro tier logic ────────────────────────────────────────────────────────────
function isTeamPro(team) {
  if (PREVIEW_MODE) return true;      // developer preview — all Pro features visible
  if (!team) return false;
  if (state.isGuest) return true;     // demo always shows Pro
  // All paid tiers grant Pro access
  if (['monthly','yearly','lifetime'].includes(team.proTier)) return true;
  // Trial: check 14-day window
  if (team.proTier === 'trial') {
    const start = team.proTrialStart?.toDate?.() || team.proTrialStart;
    if (!start) return false;
    const trialEnd = new Date(start);
    trialEnd.setDate(trialEnd.getDate() + 14);
    return new Date() < trialEnd;
  }
  return false;
}

// Human-readable tier label for UI badges
function getProTierLabel(team) {
  const labels = {
    lifetime: 'Lifetime Pro',
    yearly:   'Pro · Yearly',
    monthly:  'Pro · Monthly',
    trial:    'Pro Trial',
  };
  return labels[team?.proTier] || 'Pro';
}

function getTrialDaysLeft(team) {
  if (team?.proTier !== 'trial') return null;
  const start = team.proTrialStart?.toDate?.() || team.proTrialStart;
  if (!start) return null;
  const trialEnd = new Date(start);
  trialEnd.setDate(trialEnd.getDate() + 14);
  const ms = trialEnd - new Date();
  return Math.max(0, Math.ceil(ms / (1000 * 60 * 60 * 24)));
}

  const team = state.teams.find(t => t.id === state.activeTeamId);
  const myRole = state.members.find(m => m.userId === state.user?.uid)?.role;
  const isAdmin = myRole === 'admin' || myRole === 'coach';

  if (isTeamPro(team)) {
    onAllowed();
    return;
  }

  // Not Pro — show upgrade screen (only admins can purchase, others see read-only screen)
  showUpgradeModal(featureName, isAdmin);
}

async function handleProPurchase(plan) {
  const team = state.teams.find(t => t.id === state.activeTeamId);
  if (!team) return;

  // Demo: instant Pro activation
  if (state.isGuest) {
    activateProDemo();
    return;
  }

  // Already on trial → redirect to native app for billing
  if (team.proTier === 'trial') {
    const prices = { monthly:'£7.99/month', yearly:'£59/year', lifetime:'£69.99 one-time' };
    const label  = prices[plan] || plan;
    showModal(`
      <div style="text-align:center;padding:8px 0 12px">
        <div style="font-size:2.5rem;margin-bottom:12px">📱</div>
        <h3>Subscribe in the app</h3>
        <p style="color:var(--muted);font-size:.88rem;margin:10px 0 16px;line-height:1.6">
          ${escHtml(label)} — billing is handled through<br/>
          Apple or Google in the TeamUp mobile app.
        </p>
        <button class="btn btn-primary" onclick="closeModal()">Got it</button>
      </div>`);
    return;
  }

  // Free team → start 14-day trial (plan stored for later upgrade)
  await startProTrial(plan);
}

async function handleSendLink() {
  if (!FIREBASE_CONFIGURED) { showToast('Add your Firebase config to enable sign-in', 'error'); return; }

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showToast('Enter a valid email', 'error'); return;
  }
  const btn = document.getElementById('send-link-btn');
  btn.textContent = 'Sending…'; btn.disabled = true;
  try {
    const actionCodeSettings = {
      url: window.location.origin + window.location.pathname,
      handleCodeInApp: true,
    };
    await sendSignInLinkToEmail(auth, email, actionCodeSettings);
    localStorage.setItem('tu_email', email);
    document.getElementById('root').innerHTML = `

        <div class="check-email">

          <button class="btn btn-ghost" onclick="navigate('login')">Use different email</button>
        </div>
      </div>`;
  } catch(e) {
    showToast(e.message, 'error');
    btn.textContent = 'Send magic link →'; btn.disabled = false;
  }
}

// ── Google Sign-In ──────────────────────────────────────────────────────────
async function handleGoogleSignIn() {
  if (!FIREBASE_CONFIGURED) { showToast('Add your Firebase config to enable sign-in', 'error'); return; }
  try {
    const provider = new GoogleAuthProvider();
    provider.addScope('profile');
    provider.addScope('email');
    // Hint the account chooser for a smoother UX
    provider.setCustomParameters({ prompt: 'select_account' });

    const result = await signInWithPopup(auth, provider);
    await ensureUserDoc(result.user);
    // onAuthStateChanged handles the rest (profile fetch → navigate)
  } catch(e) {
    if (e.code === 'auth/popup-closed-by-user' ||
        e.code === 'auth/cancelled-popup-request') return; // user dismissed — silent
    showToast(e.message || 'Google sign-in failed', 'error');
  }
}
window.handleGoogleSignIn = handleGoogleSignIn;

// ── Apple Sign-In ───────────────────────────────────────────────────────────
async function handleAppleSignIn() {
  if (!FIREBASE_CONFIGURED) { showToast('Add your Firebase config to enable sign-in', 'error'); return; }
  try {
    const provider = new OAuthProvider('apple.com');
    provider.addScope('email');
    provider.addScope('name');

    const result = await signInWithPopup(auth, provider);
    await ensureUserDoc(result.user);
    // onAuthStateChanged handles the rest
  } catch(e) {
    if (e.code === 'auth/popup-closed-by-user' ||
        e.code === 'auth/cancelled-popup-request') return;
    // Apple sign-in not configured yet — show helpful message
    if (e.code === 'auth/operation-not-supported-in-this-environment' ||
        e.code === 'auth/configuration-not-found') {
      showToast('Apple Sign-In not configured in Firebase yet', 'error');
      return;
    }
    showToast(e.message || 'Apple sign-in failed', 'error');
  }
}
window.handleAppleSignIn = handleAppleSignIn;

window.otpInput = function(i, el) {
  if (el.value.length === 6) {
    const digits = el.value.split('');
    digits.forEach((d,j) => { const inp = document.getElementById(`otp-${j}`); if(inp) inp.value=d; });
    document.getElementById('otp-5')?.focus();
    return;
  }
  el.value = el.value.slice(-1);
  if (el.value && i < 5) document.getElementById(`otp-${i+1}`)?.focus();
};
window.otpKey = function(i, e) {
  if (e.key === 'Backspace' && !document.getElementById(`otp-${i}`)?.value && i > 0)
    document.getElementById(`otp-${i-1}`)?.focus();
};
async function handleVerifyOTP() {
  const code = [0,1,2,3,4,5].map(i=>document.getElementById(`otp-${i}`)?.value||'').join('');
  if (code.length < 6) { showToast('Enter all 6 digits','error'); return; }
  try {

window.showComments = function(postId) {

  function renderCommentList() {

      ? comments.map(c => {
          const isMe   = c.authorId === uid;
          const timeAgo = c.createdAt?.toDate ? relativeTime(c.createdAt.toDate()) : 'just now';
          return `
            <div class="comment-row ${isMe?'comment-mine':''}">

              <div class="comment-bubble">

                <span class="comment-time">${timeAgo}</span>
                <p class="comment-text">${escHtml(c.text)}</p>
              </div>
              ${isMe ? `<button class="comment-delete-btn" onclick="deleteComment('${postId}','${c.id}')">✕</button>` : ''}
            </div>`;
        }).join('')
      : `<div class="comments-empty">No comments yet — be the first! 👇</div>`;
  }

  function renderModal() {
    showModal(`

        <div class="comments-header">
          <h3>💬 Comments</h3>
          <span class="comments-count">${comments.length}</span>
        </div>
        <div class="post-text-preview">${escHtml((post.text||'').slice(0,80))}${(post.text||'').length>80?'…':''}</div>

          ${renderCommentList()}
        </div>
        <div class="comment-compose">
          <div class="avatar avatar-sm">${(state.profile?.displayName||'?').charAt(0).toUpperCase()}</div>
          <input id="comment-input" class="input comment-input"
            placeholder="Add a comment…"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitComment('${postId}');}"/>
          <button class="comment-send-btn" onclick="submitComment('${postId}')">➤</button>
        </div>
      </div>`);
    // Focus input after render
    setTimeout(() => document.getElementById('comment-input')?.focus(), 100);
  }

  renderModal();
};

window.submitComment = async function(postId) {
  const input = document.getElementById('comment-input');
  const text  = input?.value?.trim();
  if (!text) return;
  input.value = '';

  const uid   = state.user?.uid || '';
  const name  = state.profile?.displayName || '';
  const newComment = {
    id:         'c-' + Date.now(),
    postId,
    authorId:   uid,
    authorName: name,
    text,
    createdAt:  { toDate: () => new Date() },
  };

  // Add to local state
  state.comments[postId] = state.comments[postId] || [];
  state.comments[postId].push(newComment);

  // Update count on post
  const post = state.posts.find(p => p.id === postId);
  if (post) post.commentCount = state.comments[postId].length;

  // Update comments list in DOM (without full re-render)
  const list = document.getElementById('comments-list');
  if (list) {
    const comments = state.comments[postId];
    list.innerHTML = comments.map(c => {
      const isMe   = c.authorId === uid;
      const timeAgo = c.createdAt?.toDate ? relativeTime(c.createdAt.toDate()) : 'just now';
      return `
        <div class="comment-row ${isMe?'comment-mine':''}">
          <div class="avatar avatar-sm">${(c.authorName||'?').charAt(0).toUpperCase()}</div>
          <div class="comment-bubble">
            <span class="comment-author">${escHtml(c.authorName||'')}</span>
            <span class="comment-time">${timeAgo}</span>
            <p class="comment-text">${escHtml(c.text)}</p>
          </div>
          ${isMe ? `<button class="comment-delete-btn" onclick="deleteComment('${postId}','${c.id}')">✕</button>` : ''}
        </div>`;
    }).join('');
    list.scrollTop = list.scrollHeight;
  }

  // Update the header count
  const header = document.querySelector('.comments-count');
  if (header) header.textContent = state.comments[postId].length;

  // Persist to Firestore
  if (!state.isGuest && state.activeTeamId) {
    try {
      await addDoc(
        collection(db,'teams',state.activeTeamId,'posts',postId,'comments'),
        { authorId:uid, authorName:name, text, createdAt:serverTimestamp() }
      );
      await updateDoc(
        doc(db,'teams',state.activeTeamId,'posts',postId),
        { commentCount: state.comments[postId].length }
      );
    } catch(e) { /* non-critical */ }
  }
};

window.deleteComment = async function(postId, commentId) {
  const comments = state.comments[postId];
  if (!comments) return;

  state.comments[postId] = comments.filter(c => c.id !== commentId);
  const post = state.posts.find(p => p.id === postId);
  if (post) post.commentCount = state.comments[postId].length;

  if (!state.isGuest && state.activeTeamId) {
    try {
      await deleteDoc(doc(db,'teams',state.activeTeamId,'posts',postId,'comments',commentId));
      await updateDoc(doc(db,'teams',state.activeTeamId,'posts',postId),
        { commentCount: state.comments[postId].length });
    } catch(e) { /* non-critical */ }
  }

  showToast('Comment deleted');
  window.showComments(postId); // refresh
};

window.previewPostMedia = function(input, type) {
  const preview = document.getElementById('post-media-preview');
  if (!preview) return;
  preview.innerHTML = '';
  Array.from(input.files).slice(0, 4).forEach(file => {
    const url = URL.createObjectURL(file);
    if (type === 'image') {
      const img = document.createElement('img');
      img.src = url; img.className = 'post-media-thumb';
      preview.appendChild(img);
    } else {
      const vid = document.createElement('video');
      vid.src = url; vid.className = 'post-media-thumb';
      vid.controls = true; vid.muted = true;
      preview.appendChild(vid);
    }
  });
};

function renderSchedule() {
  if (!state.activeTeamId) return renderNoTeam();

  // All-teams toggle: show events from every team the user is in
  const allTeamsEvents = state.showAllTeams && state.teams.length > 1
    ? state.teams.flatMap(t => {
        // In demo/guest mode we only have events for the active team
        // In production each team's events would be loaded separately
        return state.events.filter(ev => ev.teamId === t.id || ev.teamId === state.activeTeamId);
      })
    : getFilteredEvents();

  // Deduplicate
  const seen = new Set();
  const filteredEvents = allTeamsEvents.filter(ev => {
    if (seen.has(ev.id)) return false;
    seen.add(ev.id); return true;
  });

  const allTeamsBar = state.teams.length > 1 ? `
    <div class="all-teams-bar">
      <button class="all-teams-btn ${!state.showAllTeams?'active':''}"
        onclick="setAllTeams(false)">This team</button>
      <button class="all-teams-btn ${state.showAllTeams?'active':''}"
        onclick="setAllTeams(true)">All my teams</button>
    </div>` : '';

  if (!filteredEvents.length) return `
    ${allTeamsBar}
    ${renderSectionFilter()}
    <div class="empty-state">
      <div class="empty-icon-svg"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="8" width="28" height="26" rx="4" opacity=".15" fill="currentColor"/><rect x="6" y="8" width="28" height="26" rx="4"/><path d="M6 16h28M14 4v8M26 4v8"/><circle cx="14" cy="24" r="1.5" fill="currentColor"/><circle cx="20" cy="24" r="1.5" fill="currentColor"/><circle cx="26" cy="24" r="1.5" fill="currentColor"/></svg></div>
      <h3>${state.activeSection ? 'No events for this section' : 'No upcoming events'}</h3>
      <p>${state.activeSection ? 'Try "All" to see all team events' : 'Create the first event for your team'}</p>
      <button class="btn btn-primary btn-sm" onclick="showCreateEvent()">Create event</button>
      <button class="btn btn-ghost btn-sm" onclick="showTrainingSetupWizard(state.activeTeamId)" style="margin-top:6px">Set up recurring training</button>
    </div>`;

  const now = new Date();
  const upcoming = filteredEvents.filter(e => e.startsAt?.toDate?.() >= now || !e.startsAt);
  const past     = filteredEvents.filter(e => e.startsAt?.toDate?.() < now && e.startsAt);

  const renderEventCard = (ev) => {
    const d = ev.startsAt?.toDate?.() || new Date();
    const myRsvp = state.rsvps[ev.id];
    const isToday = d.toDateString() === now.toDateString();
    const typeColors = { practice:'#f97316', game:'#7c3aed', tournament:'#ec4899', other:'#6b7280' };
    const typeColor  = typeColors[ev.type] || '#6b7280';
    const typeCap    = (ev.type||'event').charAt(0).toUpperCase() + (ev.type||'event').slice(1);
    const subtitle   = ev.opponent
      ? `vs ${ev.opponent}${ev.homeAway && ev.homeAway!=='undecided' ? ` · ${ev.homeAway}` : ''}`
      : d.toLocaleDateString('en-GB',{weekday:'short'}) + ' · ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    // Section chips on event card
    const evSections = (ev.targetSections||[])
      .map(id => state.sections.find(s=>s.id===id))
      .filter(Boolean);
    return `
      <div class="event-card ${isToday?'today':''} ${ev.isDerby?'derby':''}" onclick="showEventDetail('${ev.id}')">
        <div class="event-date" style="${isToday?'background:var(--primary)':ev.isDerby?'background:#dc262615':''}">
          <span class="event-month" style="${isToday?'color:rgba(255,255,255,.75)':''}">${d.toLocaleDateString('en-GB',{month:'short'})}</span>
          <span class="event-day" style="${isToday?'color:#fff':''}">${d.getDate()}</span>
        </div>
        <div class="event-info">
          <div class="event-title-row">
            <span class="event-title">${escHtml(ev.title)}</span>
            ${ev.isDerby
              ? `<span class="derby-badge">${ev.derbyLabel||'🔥 Big Game'}</span>`
              : `<span class="event-type-pill" style="background:${typeColor}22;color:${typeColor}">${typeCap}</span>`}
          </div>
          <span class="event-time">${subtitle}</span>
          ${ev.location ? `<span class="event-location">📍 ${escHtml(ev.location)}</span>` : ''}
          ${evSections.length ? `
            <div class="event-section-chips">
              ${evSections.map(s=>`<span class="event-section-chip" style="background:${s.colour}20;color:${s.colour};border-color:${s.colour}40">${escHtml(s.name)}</span>`).join('')}
            </div>` : ''}
        </div>
        <div class="event-rsvp-status">
          ${myRsvp === 'yes'   ? '<span class="rsvp-dot going">✅</span>'   :
            myRsvp === 'no'    ? '<span class="rsvp-dot no">❌</span>'      :
            myRsvp === 'maybe' ? '<span class="rsvp-dot maybe">🤔</span>'  :
            '<span class="rsvp-dot none">—</span>'}
        </div>
      </div>`;
  };

  return `
    ${allTeamsBar}
    ${renderSectionFilter()}
    ${upcoming.length ? `
      <div class="section-label">Upcoming</div>
      ${upcoming.map(renderEventCard).join('')}` : ''}
    ${past.length ? `
      <div class="section-label">Past</div>
      ${past.map(renderEventCard).join('')}` : ''}`;
}

window.selectActivityType = function(el, type) {
  document.querySelectorAll('.activity-tab').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.color = '';
  });
  el.classList.add('active');
  el.style.background = el.style.getPropertyValue('--tab-color') ||
    getComputedStyle(el).getPropertyValue('--tab-color');
  // Set colour via data attribute for CSS to pick up
  el.setAttribute('data-active', 'true');

  // Show/hide sport-specific fields
  const gameFields = document.getElementById('game-fields');
  const tournFields = document.getElementById('tournament-fields');
  if (gameFields) gameFields.style.display = type === 'game' ? 'block' : 'none';
  if (tournFields) tournFields.style.display = type === 'tournament' ? 'block' : 'none';

  // Auto-generate title placeholder
  const titleInput = document.getElementById('ev-title');
  if (titleInput) {
    const team = state.teams.find(t => t.id === state.activeTeamId);
    const sport = getSport(team?.sport || 'football');
    const placeholders = {
      practice: 'e.g. Tuesday Training',
      game: `e.g. ${team?.name || 'Team'} vs Opponent`,
      tournament: 'e.g. Spring Cup',
      other: 'e.g. Team Meeting',
    };
    titleInput.placeholder = placeholders[type] || 'Event title';
  }
};

window.selectHA = function(el, ha) {
  document.querySelectorAll('.ha-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
};

window.filterOpponentSuggestions = function(val) {
  const container = document.getElementById('opp-suggestions');
  if (!container) return;
  const q = val.toLowerCase();
  container.querySelectorAll('.opp-suggestion-btn').forEach(btn => {
    btn.style.display = btn.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
  container.style.display = val ? '' : '';
};

window.selectOpponentSuggestion = function(name) {
  const input = document.getElementById('ev-opponent');
  if (input) input.value = name;
  const container = document.getElementById('opp-suggestions');
  if (container) container.style.display = 'none';
};

window.selectDuration = function(el, dur) {
  document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
};

window.submitEvent = async function() {
  const dateVal = document.getElementById('ev-date')?.value;
  const loc     = document.getElementById('ev-loc')?.value?.trim();
  const bring   = document.getElementById('ev-bring')?.value?.trim();
  const coachNotes = document.getElementById('ev-coach-notes')?.value?.trim();
  const opponent   = document.getElementById('ev-opponent')?.value?.trim();
  const tournament = document.getElementById('ev-tournament')?.value?.trim();

  const typeEl  = document.querySelector('.activity-tab.active');
  const type    = typeEl?.dataset.type || 'practice';
  const haEl    = document.querySelector('.ha-btn.active');
  const homeAway = haEl?.dataset.ha || 'undecided';
  const durEl   = document.querySelector('.duration-btn.active');
  const duration = durEl?.dataset.duration || '1h';

  if (!dateVal) { showToast('Pick a date and time', 'error'); return; }

  // Auto-generate title if blank
  let title = document.getElementById('ev-title')?.value?.trim();
  if (!title) {
    const team = state.teams.find(t => t.id === state.activeTeamId);
    const d = new Date(dateVal);
    const dayName = d.toLocaleDateString('en-GB', { weekday: 'long' });
    if (type === 'practice') title = `${dayName} Training`;
    else if (type === 'game' && opponent) title = `vs ${opponent}`;
    else if (type === 'tournament' && tournament) title = tournament;
    else title = type.charAt(0).toUpperCase() + type.slice(1);
  }

  closeModal();

  // In demo/guest mode Firestore Timestamp isn't available — use a plain Date shim
  const startDate = new Date(dateVal);
  const startsAtVal = state.isGuest
    ? { toDate: () => startDate, seconds: Math.floor(startDate.getTime()/1000) }
    : Timestamp.fromDate(startDate);

  const eventData = {
    title, type,
    startsAt:   startsAtVal,
    endsAt:     null,
    location:   loc     || null,
    bringNote:  bring   || null,
    coachNotes: coachNotes || null,
    opponent:   opponent   || null,
    homeAway:   type === 'game' ? homeAway : null,
    tournamentName: tournament || null,
    duration,
    description: null,
    isCompetition: document.getElementById('ev-is-comp')?.checked || false,
    compEntries:   {},
  };

  await createEvent(eventData);
};

  const counts = { yes:0, no:0, maybe:0 };
  rsvpList.forEach(r => counts[r.status] = (counts[r.status]||0) + 1);
  const myRsvp = rsvpList.find(r => r.userId === state.user?.uid)?.status;
  if (myRsvp) state.rsvps[eventId] = myRsvp;

  const myRole = state.members.find(m => m.userId === state.user?.uid)?.role || 'player';
  const isCoachOrAdmin = myRole === 'admin' || myRole === 'coach';

// WEATHER FORECAST — Free feature
// Uses Open-Meteo (free, no API key) + their geocoding API
// Shown on event detail for events ≤16 days away with a location set
// ─────────────────────────────────────────────────────────────────────────────

// WMO weather code → emoji + label
function weatherCodeInfo(code) {
  if (code === 0)              return { emoji:'☀️',  label:'Clear'          };
  if (code <= 2)               return { emoji:'🌤️', label:'Mostly clear'   };
  if (code === 3)              return { emoji:'☁️',  label:'Overcast'       };
  if ([45,48].includes(code))  return { emoji:'🌫️', label:'Foggy'          };
  if ([51,53,55].includes(code)) return { emoji:'🌦️',label:'Drizzle'       };
  if ([61,63,65].includes(code)) return { emoji:'🌧️',label:'Rain'          };
  if ([71,73,75].includes(code)) return { emoji:'❄️', label:'Snow'          };
  if ([77].includes(code))     return { emoji:'🌨️', label:'Snow grains'    };
  if ([80,81,82].includes(code)) return { emoji:'🌦️',label:'Showers'       };
  if ([85,86].includes(code))  return { emoji:'🌨️', label:'Snow showers'   };
  if ([95].includes(code))     return { emoji:'⛈️', label:'Thunderstorm'   };
  if ([96,99].includes(code))  return { emoji:'⛈️', label:'Thunderstorm'   };
  return                              { emoji:'🌡️', label:'Mixed'          };
}

// Geocode a location string → { lat, lng, name } or null
async function geocodeLocation(locationStr) {
  if (!locationStr) return null;
  try {
    // Use first 30 chars as search query — strips postcode/details for better results
    const query = locationStr.split(',')[0].trim().slice(0, 40);
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`;
    const res  = await fetch(url);
    const data = await res.json();
    if (!data.results?.length) return null;
    const r = data.results[0];
    return { lat: r.latitude, lng: r.longitude, name: r.name };
  } catch(e) { return null; }
}

// Fetch hourly weather for a specific date/hour at lat/lng
async function fetchWeather(lat, lng, date) {
  try {
    const dateStr = date.toISOString().slice(0,10);
    const url = [
      'https://api.open-meteo.com/v1/forecast',
      `?latitude=${lat}&longitude=${lng}`,
      `&hourly=temperature_2m,weathercode,windspeed_10m,precipitation_probability`,
      `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max`,
      `&start_date=${dateStr}&end_date=${dateStr}`,
      `&timezone=Europe%2FLondon&wind_speed_unit=mph&temperature_unit=celsius`,
    ].join('');
    const res  = await fetch(url);
    const data = await res.json();
    if (!data.daily) return null;

    // Get the hourly slot nearest to the event time
    const targetHour = date.getHours();
    const hourIndex  = data.hourly?.time?.findIndex(t => {
      const h = new Date(t).getHours();
      return h === targetHour;
    }) ?? 12;
    const hi = hourIndex >= 0 ? hourIndex : 12;

    return {
      tempMax:   Math.round(data.daily.temperature_2m_max[0]),
      tempMin:   Math.round(data.daily.temperature_2m_min[0]),
      tempNow:   data.hourly?.temperature_2m?.[hi] !== undefined
                   ? Math.round(data.hourly.temperature_2m[hi]) : null,
      code:      data.daily.weathercode[0],
      wind:      data.hourly?.windspeed_10m?.[hi] !== undefined
                   ? Math.round(data.hourly.windspeed_10m[hi]) : null,
      rainChance: data.daily.precipitation_probability_max[0] ?? null,
    };
  } catch(e) { return null; }
}

// Inject weather into an already-open event detail modal
async function injectWeather(eventId) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return;

  const container = document.getElementById(`weather-${eventId}`);
  if (!container) return;  // modal already closed

  const d = ev.startsAt?.toDate?.() || new Date();

  // Only show for events within the next 16 days
  const diffDays = (d - new Date()) / 86400000;
  if (diffDays < -1 || diffDays > 16) {
    container.innerHTML = '';
    return;
  }

  if (!ev.location) {
    container.innerHTML = '';
    return;
  }

  // Show loading state
  container.innerHTML = `<div class="weather-loading">🌡️ Loading weather…</div>`;

  const geo = await geocodeLocation(ev.location);
  if (!geo) { container.innerHTML = ''; return; }

  const weather = await fetchWeather(geo.lat, geo.lng, d);
  if (!weather) { container.innerHTML = ''; return; }

  const info = weatherCodeInfo(weather.code);

  container.innerHTML = `
    <div class="weather-strip">
      <div class="weather-icon">${info.emoji}</div>
      <div class="weather-info">
        <div class="weather-condition">${info.label}</div>
        <div class="weather-meta">
          ${weather.tempNow !== null ? `<span>${weather.tempNow}°C` : `<span>${weather.tempMin}–${weather.tempMax}°C`}</span>
          ${weather.wind !== null ? `<span class="weather-dot">·</span><span>${weather.wind} mph wind</span>` : ''}
          ${weather.rainChance !== null ? `<span class="weather-dot">·</span><span>${weather.rainChance}% rain</span>` : ''}
        </div>
      </div>
      <div class="weather-location">${escHtml(geo.name)}</div>
    </div>`;
}

// Render a small stack of up to 4 initials avatars
function renderSeenByAvatars(seenByUids) {
  if (!seenByUids?.length) return '';
  const shown  = seenByUids.slice(0, 4);
  const extra  = seenByUids.length - shown.length;
  const avatars = shown.map(uid => {
    const member = state.members.find(m => m.userId === uid);
    const init   = (member?.displayName || uid).charAt(0).toUpperCase();
    return `<div class="seen-avatar">${init}</div>`;
  }).join('');
  return `<div class="seen-avatar-stack">${avatars}${extra > 0 ? `<div class="seen-avatar seen-avatar-extra">+${extra}</div>` : ''}</div>`;
}

// Tappable seen-by row for event detail
function renderEventSeenBy(ev) {
  const seenBy  = ev.seenBy || [];
  const total   = state.members.length;
  const unseen  = total - seenBy.length;
  return `
    <button class="event-seen-row" onclick="showSeenByList('${ev.id}','event')">
      ${renderSeenByAvatars(seenBy)}
      <span class="event-seen-label">
        Seen by <strong>${seenBy.length}</strong>${unseen > 0 ? ` · <span style="color:var(--muted)">${unseen} haven't seen</span>` : ' · Everyone ✓'}
      </span>
      <span class="seen-chevron">›</span>
    </button>`;
}

// Mark event as seen by current user (called when event detail opens)
async function markEventSeen(eventId) {
  const uid = state.user?.uid;
  if (!uid) return;

  // Optimistic local update
  const ev = state.events.find(e => e.id === eventId);
  if (ev) {
    ev.seenBy = ev.seenBy || [];
    if (!ev.seenBy.includes(uid)) ev.seenBy.push(uid);
  }

  if (state.isGuest) return; // no Firestore in demo

  try {
    await updateDoc(
      doc(db, 'teams', state.activeTeamId, 'events', eventId),
      { seenBy: arrayUnion(uid) }
    );
  } catch(e) { /* silent — seen-by is non-critical */ }
}

window.handleVolunteerSlot = async function(eventId, slotId, isClaiming_unused) {
  const ev  = state.events.find(e => e.id === eventId);
  if (!ev?.volunteerSlots) return;
  const uid    = state.user?.uid || '';
  const myName = state.profile?.displayName || '';
  const slot   = ev.volunteerSlots.find(s => s.id === slotId);
  if (!slot) return;

  const isMine = slot.claimedBy === uid;

  // Optimistic update
  if (isMine) {
    slot.claimedBy   = null;
    slot.claimedName = null;
  } else {
    slot.claimedBy   = uid;
    slot.claimedName = myName;
  }

  // Re-open the event detail to reflect change
  closeModal();
  await showEventDetail(eventId);

  if (state.isGuest) return;

  // Persist to Firestore
  try {
    await updateDoc(
      doc(db, 'teams', state.activeTeamId, 'events', eventId),
      { volunteerSlots: ev.volunteerSlots }
    );
  } catch(e) {
    // Rollback on error
    slot.claimedBy   = isMine ? uid   : null;
    slot.claimedName = isMine ? myName: null;
    showToast('Could not update slot','error');
  }
};

  const title  = document.getElementById('fee-title')?.value.trim();

  const due    = document.getElementById('fee-due')?.value;

// File type → emoji icon helper
function fileIcon(mimeType) {
  if (!mimeType) return '📄';
  if (mimeType.includes('pdf'))   return '📕';
  if (mimeType.includes('word') || mimeType.includes('document')) return '📝';
  if (mimeType.includes('sheet') || mimeType.includes('excel'))   return '📊';
  if (mimeType.includes('presentation') || mimeType.includes('powerpoint')) return '📋';
  if (mimeType.startsWith('image/')) return '🖼️';
  if (mimeType.startsWith('video/')) return '🎥';
  if (mimeType.startsWith('audio/')) return '🎵';
  if (mimeType.includes('zip') || mimeType.includes('archive')) return '📦';
  return '📄';
}

// Human-readable file size
function fileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024)       return `${bytes} B`;
  if (bytes < 1024*1024)  return `${Math.round(bytes/1024)} KB`;
  return `${(bytes/(1024*1024)).toFixed(1)} MB`;
}

function showTeamFiles() {
  const files = state.files;
  const myRole = state.members.find(m => m.userId === state.user?.uid)?.role || 'member';
  const isCoachOrAdmin = myRole === 'admin' || myRole === 'coach';
  const uid = state.user?.uid || '';

  // Mark all unseen files as seen
  files.forEach(f => {
    if (!f.seenBy?.includes(uid)) {
      f.seenBy = [...(f.seenBy||[]), uid];
      if (!state.isGuest && state.activeTeamId) {
        updateDoc(doc(db,'teams',state.activeTeamId,'files',f.id), { seenBy: arrayUnion(uid) })
          .catch(()=>{});
      }
    }
  });

  const filesHtml = files.length ? files.map(f => {
    const date   = f.createdAt?.toDate?.() ? f.createdAt.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '';
    const seenCnt = f.seenBy?.length || 0;
    const isMine  = f.uploadedBy === uid;

    return `
      <div class="file-row" onclick="openFile('${f.id}')">
        <div class="file-icon">${fileIcon(f.mimeType)}</div>
        <div class="file-info">
          <div class="file-name">${escHtml(f.name)}</div>
          <div class="file-meta">
            <span>${escHtml(f.uploaderName)}</span>
            <span class="file-meta-dot">·</span>
            <span>${date}</span>
            ${f.sizeBytes ? `<span class="file-meta-dot">·</span><span>${fileSize(f.sizeBytes)}</span>` : ''}
          </div>
          <div class="file-seen">👁 ${seenCnt} seen</div>
        </div>
        ${(isCoachOrAdmin || isMine) ? `
          <button class="file-delete-btn" onclick="event.stopPropagation();deleteFile('${f.id}')"
            title="Delete file">🗑</button>` : '<span class="file-chevron">›</span>'}
      </div>`;
  }).join('') : `
    <div class="files-empty">
      <div class="files-empty-icon">📁</div>
      <div class="files-empty-title">No files yet</div>
      <div class="files-empty-sub">Upload PDFs, docs, images — anything your team needs</div>
    </div>`;

  showModal(`
    <div class="files-screen">
      <div class="files-header">
        <h3>📁 Team files</h3>
        ${isCoachOrAdmin ? `
          <button class="files-upload-btn" onclick="showUploadFile()">+ Upload</button>` : ''}
      </div>

      <div class="files-list">
        ${filesHtml}
      </div>

      <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:8px">Close</button>
    </div>`);
}

window.deleteFile = async function(fileId) {
  const f = state.files.find(f => f.id === fileId);
  if (!f) return;

  if (!confirm(`Delete "${escHtml(f.name)}"?`)) return;

  state.files = state.files.filter(f => f.id !== fileId);

  if (!state.isGuest && state.activeTeamId) {
    try {
      await deleteDoc(doc(db,'teams',state.activeTeamId,'files',fileId));
    } catch(e) { showToast(e.message,'error'); return; }
  }

  showToast('File deleted');
  showTeamFiles(); // refresh the list
};

  bar.style.display  = 'flex';
  icon.textContent   = fileIcon(file.type);
  name.textContent   = file.name;
  size.textContent   = fileSize(file.size);
  // Pre-fill display name with filename (without extension)
  if (displayInput && !displayInput.value) {
    displayInput.value = file.name.replace(/\.[^/.]+$/, '');
  }
};

window.submitUploadFile = async function() {
  const input = document.getElementById('file-upload-input');
  const file  = input?.files[0];
  const displayName = document.getElementById('file-display-name')?.value.trim();

  if (!file) { showToast('Choose a file first','error'); return; }
  if (file.size > 10 * 1024 * 1024) { showToast('File must be under 10 MB','error'); return; }

  const btn = document.getElementById('file-upload-btn');
  if (btn) { btn.textContent = 'Uploading…'; btn.disabled = true; }

  const finalName = displayName || file.name;
  const uid       = state.user?.uid || '';
  const uploaderName = state.profile?.displayName || '';

  if (state.isGuest) {
    // Demo: create a local blob URL
    const blobUrl = URL.createObjectURL(file);
    const newFile = {
      id:          'file-' + Date.now(),
      name:        finalName,
      mimeType:    file.type || 'application/octet-stream',
      sizeBytes:   file.size,
      uploadedBy:  uid,
      uploaderName,
      url:         blobUrl,
      createdAt:   { toDate: () => new Date() },
      seenBy:      [uid],
    };
    state.files.unshift(newFile);
    showToast('File uploaded ✅ (demo)');
    showTeamFiles();
    return;
  }

  // Real upload: Firebase Storage → store URL in Firestore
  // Storage SDK not included in this PWA build — show helpful message
  showToast('File upload requires the TeamUp mobile app', 'error');
  if (btn) { btn.textContent = 'Upload'; btn.disabled = false; }
};

// ATTENDANCE STATS — Phase 3f (Pro)
// Derived from RSVP data already loaded in state.events
// showAttendanceStats() — per-member attendance % + heatmap grid
// ─────────────────────────────────────────────────────────────────────────────

function showAttendanceStats() {
  const events  = state.events;
  const members = state.members.filter(m => m.role === 'player' || m.role === 'coach');
  const uid     = state.user?.uid || '';

  if (!events.length) {
    showModal(`
      <div style="text-align:center;padding:16px 0 8px">
        <div style="font-size:2.5rem;margin-bottom:8px">📊</div>
        <h3>No events yet</h3>
        <p style="color:var(--muted);font-size:.88rem;margin-top:8px">
          Attendance stats will appear here once your team has events with RSVPs.
        </p>
        <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:16px">Close</button>
      </div>`);
    return;
  }

  // Build per-member stats from seenBy arrays (proxy for attendance in PWA)
  // In production this would use dedicated RSVP+attendance subcollection
  const memberStats = members.map(m => {
    const attended = events.filter(ev => (ev.seenBy||[]).includes(m.userId)).length;
    const pct      = events.length > 0 ? Math.round((attended / events.length) * 100) : 0;
    return { ...m, attended, total: events.length, pct };
  }).sort((a,b) => b.pct - a.pct);  // sort highest % first

  // Heatmap: last 8 events × each player
  const recentEvents = [...events].sort((a,b) =>
    (b.startsAt?.toDate?.()?.getTime()||0) - (a.startsAt?.toDate?.()?.getTime()||0)
  ).slice(0, 8).reverse();

  const heatmapHtml = `
    <div class="attendance-heatmap">
      <!-- Column headers: event initials -->
      <div class="heatmap-labels">
        <div class="heatmap-name-col"></div>
        ${recentEvents.map(ev => {
          const d = ev.startsAt?.toDate?.() || new Date();
          const typeColors = { practice:'#f97316', game:'#7c3aed', tournament:'#ec4899', other:'#6b7280' };
          const c = typeColors[ev.type] || '#6b7280';
          return `<div class="heatmap-ev-label" title="${escHtml(ev.title)}" style="color:${c}">
            ${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
          </div>`;
        }).join('')}
      </div>
      <!-- Player rows -->
      ${memberStats.map(m => `
        <div class="heatmap-row">
          <div class="heatmap-name-col">
            <span class="heatmap-name">${escHtml(m.displayName?.split(' ')[0]||'')}</span>
            <span class="heatmap-pct" style="${m.pct>=75?'color:var(--success)':m.pct>=50?'color:var(--warning)':'color:var(--danger)'}">${m.pct}%</span>
          </div>
          ${recentEvents.map(ev => {
            const present = (ev.seenBy||[]).includes(m.userId);
            return `<div class="heatmap-cell ${present?'present':'absent'}" title="${present?'Present':'Absent'}"></div>`;
          }).join('')}
        </div>`).join('')}
    </div>`;

  // Summary stats rows
  const statsRowsHtml = memberStats.map(m => `
    <div class="attend-member-row">
      <div class="avatar avatar-sm">${(m.displayName||'?').charAt(0).toUpperCase()}</div>
      <div class="attend-member-info">
        <span class="attend-member-name">${escHtml(m.displayName||'')}</span>
        <span class="attend-member-sub">${m.attended} / ${m.total} events</span>
      </div>
      <div class="attend-pct-wrap">
        <div class="attend-pct-bar">
          <div class="attend-pct-fill" style="width:${m.pct}%;background:${m.pct>=75?'var(--success)':m.pct>=50?'var(--warning)':'var(--danger)'}"></div>
        </div>
        <span class="attend-pct-label" style="${m.pct>=75?'color:var(--success)':m.pct>=50?'color:var(--warning)':'color:var(--danger)'}">${m.pct}%</span>
      </div>
    </div>`).join('');

  // Team average
  const teamAvg = memberStats.length
    ? Math.round(memberStats.reduce((s,m)=>s+m.pct,0) / memberStats.length)
    : 0;

  showModal(`
    <div class="attendance-screen">
      <h3>📊 Attendance</h3>

      <!-- Team summary banner -->
      <div class="attend-summary-banner">
        <div class="attend-summary-left">
          <div class="attend-summary-avg" style="${teamAvg>=75?'color:var(--success)':teamAvg>=50?'color:var(--warning)':'color:var(--danger)'}">${teamAvg}%</div>
          <div class="attend-summary-label">Team average</div>
        </div>
        <div class="attend-summary-right">
          <div class="attend-summary-stat"><span>${events.length}</span> events tracked</div>
          <div class="attend-summary-stat"><span>${members.length}</span> players</div>
        </div>
      </div>

      <!-- Heatmap -->
      <div class="attend-section-label">Recent events</div>
      ${heatmapHtml}

      <!-- Per-player breakdown -->
      <div class="attend-section-label" style="margin-top:12px">Player breakdown</div>
      <div class="attend-members-list">${statsRowsHtml}</div>

      <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:12px">Close</button>
    </div>`);
}
window.showAttendanceStats = showAttendanceStats;

function showPolls() {
  const polls = state.polls;
  const myRole = state.members.find(m => m.userId === state.user?.uid)?.role || 'member';
  const isCoachOrAdmin = myRole === 'admin' || myRole === 'coach';
  const uid = state.user?.uid || '';
  const now = new Date();

  const activePolls = polls.filter(p => !p.closedAt || p.closedAt.toDate?.() > now);
  const closedPolls = polls.filter(p =>  p.closedAt && p.closedAt.toDate?.() <= now);

  const renderPollCard = (p, closed) => {
    const totalVotes = p.options.reduce((s,o) => s + o.votes.length, 0);
    const hasVoted   = p.options.some(o => o.votes.includes(uid));
    const topOption  = [...p.options].sort((a,b) => b.votes.length - a.votes.length)[0];
    const timeAgo    = p.createdAt?.toDate ? relativeTime(p.createdAt.toDate()) : '';

    return `
      <div class="poll-card ${closed?'poll-closed':''}" onclick="showPollDetail('${p.id}')">
        <div class="poll-card-header">
          ${closed ? '<span class="poll-closed-badge">Closed</span>' : '<span class="poll-open-badge">Open</span>'}
          <span class="poll-time">${timeAgo}</span>
        </div>
        <div class="poll-question">${escHtml(p.question)}</div>
        <div class="poll-card-footer">
          <span class="poll-votes">${totalVotes} vote${totalVotes!==1?'s':''}</span>
          ${hasVoted || closed
            ? `<span class="poll-voted-chip">✓ ${closed ? topOption?.text : 'Voted'}</span>`
            : `<span class="poll-vote-prompt">Tap to vote →</span>`}
        </div>
      </div>`;
  };

  showModal(`
    <div class="polls-screen">
      <div class="polls-header">
        <h3>📋 Polls</h3>
        ${isCoachOrAdmin ? `<button class="files-upload-btn" onclick="showCreatePoll()">+ New poll</button>` : ''}
      </div>

      ${!polls.length ? `
        <div class="files-empty">
          <div class="files-empty-icon">📋</div>
          <div class="files-empty-title">No polls yet</div>
          <div class="files-empty-sub">Create a quick poll to gather team feedback</div>
        </div>` : ''}

      ${activePolls.length ? `
        <div class="polls-section-label">Active</div>
        ${activePolls.map(p => renderPollCard(p, false)).join('')}` : ''}

      ${closedPolls.length ? `
        <div class="polls-section-label" style="margin-top:8px">Closed</div>
        ${closedPolls.map(p => renderPollCard(p, true)).join('')}` : ''}

      <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:12px">Close</button>
    </div>`);
}
window.showPolls = showPolls;

window.showPollDetail = function(pollId) {
  const p   = state.polls.find(p => p.id === pollId);
  if (!p) return;
  const uid = state.user?.uid || '';
  const now = new Date();
  const closed    = p.closedAt && p.closedAt.toDate?.() <= now;
  const hasVoted  = p.options.some(o => o.votes.includes(uid));
  const showResults = hasVoted || closed;
  const totalVotes  = p.options.reduce((s,o) => s + o.votes.length, 0);
  const myVote      = p.options.find(o => o.votes.includes(uid));

  const optionsHtml = p.options.map(o => {
    const pct   = totalVotes > 0 ? Math.round((o.votes.length / totalVotes) * 100) : 0;
    const isTop = o.votes.length === Math.max(...p.options.map(x=>x.votes.length)) && o.votes.length > 0;
    const isMine = o.id === myVote?.id;

    if (showResults) {
      // Results view — show bar chart
      return `
        <div class="poll-result-row ${isTop?'poll-result-top':''}">
          <div class="poll-result-header">
            <span class="poll-result-text">${escHtml(o.text)}</span>
            <span class="poll-result-pct ${isTop?'poll-result-pct-top':''}">${pct}%</span>
          </div>
          <div class="poll-result-bar-track">
            <div class="poll-result-bar-fill ${isTop?'poll-result-fill-top':''}" style="width:${pct}%"></div>
          </div>
          <div class="poll-result-votes">
            ${o.votes.length} vote${o.votes.length!==1?'s':''}
            ${isMine ? ' · <strong style="color:var(--primary)">Your vote</strong>' : ''}
          </div>
        </div>`;
    } else {
      // Voting view
      return `
        <button class="poll-option-btn" onclick="castVote('${pollId}','${o.id}')">
          ${escHtml(o.text)}
        </button>`;
    }
  }).join('');

  showModal(`
    <div class="poll-detail">
      <div class="poll-detail-meta">
        ${closed
          ? '<span class="poll-closed-badge">Closed</span>'
          : '<span class="poll-open-badge">Open</span>'}
        <span style="font-size:.75rem;color:var(--muted)">by ${escHtml(p.creatorName||'')}</span>
      </div>

      <div class="poll-detail-question">${escHtml(p.question)}</div>

      ${showResults
        ? `<div class="poll-results-label">${totalVotes} vote${totalVotes!==1?'s':''} · ${closed ? 'Final results' : 'Results so far'}</div>`
        : `<div class="poll-vote-label">Tap an option to vote</div>`}

      <div class="poll-options-list">
        ${optionsHtml}
      </div>

      ${!closed && hasVoted ? `
        <div class="poll-change-vote">
          <button class="btn btn-ghost btn-sm" onclick="uncastVote('${pollId}')">Change vote</button>
        </div>` : ''}

      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-ghost" style="flex:1" onclick="showPolls()">← Back</button>
        ${!closed && (state.members.find(m=>m.userId===uid&&(m.role==='admin'||m.role==='coach'))) ? `
          <button class="btn btn-secondary btn-sm" onclick="closePoll('${pollId}')">Close poll</button>` : ''}
      </div>
    </div>`);
};

window.castVote = async function(pollId, optionId) {
  const p   = state.polls.find(p => p.id === pollId);
  if (!p) return;
  const uid = state.user?.uid || '';

  // If single-choice, remove any existing vote first
  if (!p.allowMultiple) {
    p.options.forEach(o => { o.votes = o.votes.filter(v => v !== uid); });
  }

  const opt = p.options.find(o => o.id === optionId);
  if (opt && !opt.votes.includes(uid)) opt.votes.push(uid);

  if (!state.isGuest && state.activeTeamId) {
    try {
      await updateDoc(
        doc(db,'teams',state.activeTeamId,'polls',pollId),
        { options: p.options }
      );
    } catch(e) { showToast(e.message,'error'); return; }
  }

  showToast('Vote cast! 🗳️');
  showPollDetail(pollId);   // re-render with results
};

window.uncastVote = async function(pollId) {
  const p   = state.polls.find(p => p.id === pollId);
  if (!p) return;
  const uid = state.user?.uid || '';
  p.options.forEach(o => { o.votes = o.votes.filter(v => v !== uid); });

  if (!state.isGuest && state.activeTeamId) {
    try {
      await updateDoc(
        doc(db,'teams',state.activeTeamId,'polls',pollId),
        { options: p.options }
      );
    } catch(e) { showToast(e.message,'error'); return; }
  }

  showPollDetail(pollId);  // back to voting view
};

window.closePoll = async function(pollId) {
  const p = state.polls.find(p => p.id === pollId);
  if (!p) return;
  const now = new Date();
  p.closedAt = { toDate: () => now };

  if (!state.isGuest && state.activeTeamId) {
    try {
      await updateDoc(
        doc(db,'teams',state.activeTeamId,'polls',pollId),
        { closedAt: Timestamp.fromDate(now) }
      );
    } catch(e) { showToast(e.message,'error'); return; }
  }

  showToast('Poll closed');
  showPollDetail(pollId);
};

    <input id="poll-question" class="input" placeholder="e.g. Which day works best?" autofocus/>

    <div class="form-label">Options</div>

        <input id="poll-multiple" type="checkbox" style="width:16px;height:16px"/>

window.addPollOption = function() {
  const container = document.getElementById('poll-option-inputs');
  if (!container) return;
  const existing = container.querySelectorAll('.poll-option-input').length;
  const input = document.createElement('input');
  input.className = 'input poll-option-input';
  input.placeholder = `Option ${existing + 1}`;
  input.style.marginBottom = '8px';
  container.appendChild(input);
  input.focus();
};

window.submitCreatePoll = async function() {
  const question = document.getElementById('poll-question')?.value.trim();
  const allowMultiple = document.getElementById('poll-multiple')?.checked || false;
  const optionTexts = Array.from(document.querySelectorAll('.poll-option-input'))
    .map(el => el.value.trim()).filter(Boolean);

  if (!question)          { showToast('Add a question','error'); return; }
  if (optionTexts.length < 2) { showToast('Add at least 2 options','error'); return; }

  const uid   = state.user?.uid || '';
  const name  = state.profile?.displayName || '';

  const newPoll = {
    id:          'poll-' + Date.now(),
    question,
    options:     optionTexts.map((text, i) => ({ id:`o-${Date.now()}-${i}`, text, votes:[] })),
    createdBy:   uid,
    creatorName: name,
    createdAt:   { toDate: () => new Date() },
    closedAt:    null,
    allowMultiple,
    seenBy:      [uid],
  };

  if (state.isGuest) {
    state.polls.unshift(newPoll);
    showToast('Poll created ✅ (demo)');
    showPolls();
    return;
  }

  try {
    const ref = doc(collection(db,'teams',state.activeTeamId,'polls'));
    await setDoc(ref, {
      question, allowMultiple,
      options:     optionTexts.map((text,i) => ({ id:`o-${Date.now()}-${i}`, text, votes:[] })),
      createdBy:   uid, creatorName: name,
      createdAt:   serverTimestamp(), closedAt: null,
      seenBy:      [uid],
    });
    newPoll.id = ref.id;
    state.polls.unshift(newPoll);
    showToast('Poll created ✅');
    showPolls();
  } catch(e) { showToast(e.message,'error'); }
};

      ${state.sections.map(s => `
        <button class="section-chip ${state.activeSection===s.id?'active':''}"
          style="${state.activeSection===s.id ? `background:${s.colour};border-color:${s.colour};color:#fff` : `border-color:${s.colour}40;color:${s.colour}`}"
          onclick="setActiveSection('${s.id}')">
          ${escHtml(s.name)}
        </button>`).join('')}
    </div>`;
}

window.setActiveSection = function(sectionId) {
  state.activeSection = sectionId;
  renderApp();
};

// Members filtered by active section
function getFilteredMembers() {
  if (!state.activeSection) return state.members;
  const sec = getSectionById(state.activeSection);
  if (!sec) return state.members;
  return state.members.filter(m => sec.memberIds.includes(m.userId));
}

// Events filtered by active section
function getFilteredEvents() {
  if (!state.activeSection) return state.events;
  const sec = getSectionById(state.activeSection);
  if (!sec) return state.events;
  // Events either target this section or target all (targetSections null/empty)
  return state.events.filter(ev =>
    !ev.targetSections?.length || ev.targetSections.includes(state.activeSection)
  );
}

// ── Create section ────────────────────────────────────────────────────────────
function showCreateSection() {

window.selectSectionColour = function(el, colour) {
  document.querySelectorAll('.section-colour-swatch').forEach(b => {
    b.classList.remove('active');
    b.textContent = '';
  });
  el.classList.add('active');
  el.textContent = '✓';
};

window.submitCreateSection = async function() {
  const name = document.getElementById('sec-name')?.value.trim();
  const activeEl = document.querySelector('.section-colour-swatch.active');
  const colour = activeEl?.dataset.colour || SECTION_COLOURS[0];
  if (!name) { showToast('Enter a section name', 'error'); return; }

  const newSection = {
    id:        'sec-' + Date.now(),
    name, colour,
    memberIds: [],
    createdBy: state.user?.uid || '',
  };

  state.sections.push(newSection);

  if (!state.isGuest && state.activeTeamId) {
    try {
      await setDoc(
        doc(db, 'teams', state.activeTeamId, 'sections', newSection.id),
        { name, colour, memberIds:[], createdBy: state.user.uid, createdAt: serverTimestamp() }
      );
    } catch(e) { showToast(e.message, 'error'); return; }
  }

  showToast(`"${name}" section created ✅`);
  showSections();
};

window.deleteSection = async function(sectionId) {
  const sec = getSectionById(sectionId);
  if (!sec) return;
  if (!confirm(`Delete "${sec.name}"? Members will be unassigned from this section.`)) return;

  state.sections = state.sections.filter(s => s.id !== sectionId);
  // Remove from all members
  state.members.forEach(m => {
    if (m.sectionIds) m.sectionIds = m.sectionIds.filter(id => id !== sectionId);
  });
  if (state.activeSection === sectionId) state.activeSection = null;

  if (!state.isGuest && state.activeTeamId) {
    try {
      await deleteDoc(doc(db,'teams',state.activeTeamId,'sections',sectionId));
    } catch(e) { showToast(e.message,'error'); return; }
  }

  showToast('Section deleted');
  showSections();
};

// ── Section detail ────────────────────────────────────────────────────────────

// Add / remove member from section
window.addMemberToSection = async function(sectionId, userId, displayName) {
  const sec = getSectionById(sectionId);
  const m   = state.members.find(m => m.userId === userId);
  if (!sec || !m) return;

  sec.memberIds = [...new Set([...(sec.memberIds||[]), userId])];
  m.sectionIds  = [...new Set([...(m.sectionIds ||[]), sectionId])];

  if (!state.isGuest && state.activeTeamId) {
    try {
      await updateDoc(doc(db,'teams',state.activeTeamId,'sections',sectionId),
        { memberIds: arrayUnion(userId) });
      await updateDoc(doc(db,'teams',state.activeTeamId,'members',userId),
        { sectionIds: arrayUnion(sectionId) });
    } catch(e) { showToast(e.message,'error'); return; }
  }
  showToast(`${displayName} added ✅`);
  showSectionDetail(sectionId);
};

window.removeMemberFromSection = async function(sectionId, userId, displayName) {
  const sec = getSectionById(sectionId);
  const m   = state.members.find(m => m.userId === userId);
  if (!sec || !m) return;

  sec.memberIds = (sec.memberIds||[]).filter(id => id !== userId);
  m.sectionIds  = (m.sectionIds ||[]).filter(id => id !== sectionId);

  if (!state.isGuest && state.activeTeamId) {
    try {
      await updateDoc(doc(db,'teams',state.activeTeamId,'sections',sectionId),
        { memberIds: arrayRemove(userId) });
      await updateDoc(doc(db,'teams',state.activeTeamId,'members',userId),
        { sectionIds: arrayRemove(sectionId) });
    } catch(e) { showToast(e.message,'error'); return; }
  }
  showToast(`${displayName} removed`);
  showSectionDetail(sectionId);
};

// ── View single photo ─────────────────────────────────────────────────────────
window.viewPhoto = function(albumId, photoId) {
  const album = state.albums.find(a => a.id === albumId);
  const photo = album?.photos?.find(p => p.id === photoId);
  if (!photo) return;

  const date = photo.createdAt?.toDate?.()
    ? photo.createdAt.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short'})
    : '';

  // In demo/PWA, photos are emoji placeholders — open real URL in production
  if (photo.url) {
    window.open(photo.url, '_blank');

  }

  showModal(`
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:5rem;margin-bottom:12px">
        ${['📸','🤳','🏃','⚽','🥅','👟'][Math.abs((photoId||'').charCodeAt(2)||0) % 6]}

      <p style="font-size:.8rem;color:var(--muted);margin-top:16px;line-height:1.5">

      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-ghost" style="flex:1" onclick="showAlbumDetail('${albumId}')">← Back</button>

};

};

window.submitCreateAlbum = async function() {

  state.albums = state.albums.filter(a => a.id !== albumId);

      <span id="photo-preview-icon">🖼️</span>
      <span id="photo-preview-name" style="flex:1;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>

window.previewPhotoUpload = function(input, albumId) {
  const file = input.files[0];
  if (!file) return;
  const bar  = document.getElementById('photo-preview-bar');
  const name = document.getElementById('photo-preview-name');
  const size = document.getElementById('photo-preview-size');
  if (bar) { bar.style.display = 'flex'; }
  if (name) name.textContent = file.name;
  if (size) size.textContent = fileSize(file.size);
};

window.submitPhotoUpload = async function(albumId) {
  const input   = document.getElementById('photo-upload-input');
  const file    = input?.files[0];
  const caption = document.getElementById('photo-caption')?.value.trim() || '';

  if (!file) { showToast('Choose a photo first','error'); return; }
  if (file.size > 10 * 1024 * 1024) { showToast('Photo must be under 10 MB','error'); return; }

  const btn = document.getElementById('photo-upload-btn');
  if (btn) { btn.textContent = 'Uploading…'; btn.disabled = true; }

  const uid  = state.user?.uid || '';
  const album = state.albums.find(a => a.id === albumId);
  if (!album) return;

  const newPhoto = {
    id:           'ph-' + Date.now(),
    caption,
    uploadedBy:   uid,
    uploaderName: state.profile?.displayName || '',
    createdAt:    { toDate: () => new Date() },
    url:          state.isGuest ? URL.createObjectURL(file) : null,
  };

  album.photos = album.photos || [];
  album.photos.unshift(newPhoto);

  if (!state.isGuest && state.activeTeamId) {
    // In production: upload to Firebase Storage first, get URL, then save
    showToast('Photo upload requires the TeamUp mobile app', 'error');
    if (btn) { btn.textContent = 'Add photo'; btn.disabled = false; }
    return;
  }

  showToast('Photo added ✅ (demo)');
  showAlbumDetail(albumId);
};
