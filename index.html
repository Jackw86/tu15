// ── Trip detail ───────────────────────────────────────────────────────────────
window.showTripDetail = function(tripId) {
  const t = state.trips.find(t => t.id === tripId);
  if (!t) return;

  const myRole = state.members.find(m => m.userId === state.user?.uid)?.role || 'member';
  const isCoachOrAdmin = myRole === 'admin' || myRole === 'coach';
  const uid = state.user?.uid || '';

  const start  = t.startDate?.toDate?.() || new Date();
  const end    = t.endDate?.toDate?.()   || new Date();
  const nights = Math.round((end - start) / 86400000);
  const dateRange = `${start.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${end.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;

  // Payment breakdown per member
  const paymentRows = state.members.map(m => {
    const pay = t.payments?.[m.userId];
    const paid = pay?.paid || false;
    const isMine = m.userId === uid;
    const dateStr = paid && pay.paidAt?.toDate?.()
      ? pay.paidAt.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short'})
      : null;
    return `
      <div class="trip-payment-row ${isMine?'trip-payment-mine':''}">
        <div class="avatar avatar-sm">${(m.displayName||'?').charAt(0).toUpperCase()}</div>
        <div class="trip-payment-info">
          <span class="trip-payment-name">${escHtml(m.displayName||'')}${isMine?' (you)':''}</span>
          ${dateStr ? `<span class="trip-payment-date">${dateStr}${pay.note?` · ${pay.note}`:''}</span>` : ''}
        </div>
        ${paid
          ? `<span class="trip-paid-tick">✅</span>`
          : isCoachOrAdmin
            ? `<button class="fee-mark-btn" onclick="markTripPaid('${tripId}','${m.userId}','${escAttr(m.displayName||'')}')">Mark paid</button>`
            : `<span class="trip-unpaid-badge">£${t.costPerPerson||'?'} owed</span>`}
      </div>`;
  }).join('');

  const paidCount  = Object.values(t.payments||{}).filter(p=>p.paid).length;
  const totalCount = state.members.length;
  const pct        = totalCount > 0 ? Math.round((paidCount/totalCount)*100) : 0;
  const totalRaised = paidCount * (t.costPerPerson || 0);

  showModal(`
    <div class="trip-detail">
      <button class="back-btn-inline" onclick="showTrips()">← Trips</button>

      <!-- Header -->
      <div class="trip-detail-hero">
        <div class="trip-detail-emoji">✈️</div>
        <div>
          <div class="trip-detail-name">${escHtml(t.name)}</div>
          <div class="trip-detail-meta">📍 ${escHtml(t.destination)}</div>
          <div class="trip-detail-meta">📅 ${dateRange} · ${nights} night${nights!==1?'s':''}</div>
          ${t.costPerPerson ? `<div class="trip-detail-meta">💰 £${t.costPerPerson} per person</div>` : ''}
        </div>
      </div>

      ${t.description ? `<p class="trip-detail-desc">${escHtml(t.description)}</p>` : ''}
      ${t.notes ? `
        <div class="coach-notes-display">
          <div class="coach-notes-display-label">📌 Notes</div>
          <div>${escHtml(t.notes)}</div>
        </div>` : ''}

      <!-- Payment progress -->
      <div class="trip-detail-section">
        <div class="trip-detail-section-label">Payments</div>
        <div class="trip-progress-bar" style="height:10px;margin-bottom:6px">
          <div class="trip-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="trip-progress-label" style="margin-bottom:8px">
          <span class="${pct===100?'trip-all-paid':''}"><strong>${paidCount}</strong>/${totalCount} paid</span>
          ${t.costPerPerson ? `<span>£${totalRaised} raised of £${totalCount*t.costPerPerson}</span>` : ''}
        </div>
        <div class="trip-payments-list">${paymentRows}</div>
      </div>

      <!-- Packing list -->
      ${(t.packingList?.length) ? `
        <div class="trip-detail-section">
          <div class="trip-detail-section-label">🎒 Packing list</div>
          <div class="trip-packing-grid">
            ${t.packingList.map(item => `
              <div class="trip-packing-item">
                <span class="trip-packing-check">☐</span>
                <span>${escHtml(item)}</span>
              </div>`).join('')}
          </div>
        </div>` : ''}

      ${isCoachOrAdmin ? `
        <button class="btn btn-ghost btn-sm" onclick="deleteTrip('${tripId}')" style="color:var(--danger);border-color:var(--danger);margin-top:4px">
          Delete trip
        </button>` : ''}

      <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:8px">Close</button>
    </div>`);
};

// ── Mark member as paid on a trip ─────────────────────────────────────────────
window.markTripPaid = async function(tripId, userId, displayName) {
  const t = state.trips.find(t => t.id === tripId);
  if (!t) return;
  const now = new Date();

  t.payments = t.payments || {};
  t.payments[userId] = { paid:true, paidAt:{ toDate:()=>now }, note:'' };

  if (!state.isGuest && state.activeTeamId) {
    try {
      await updateDoc(doc(db,'teams',state.activeTeamId,'trips',tripId),
        { [`payments.${userId}`]: { paid:true, paidAt:serverTimestamp(), note:'' } });
    } catch(e) { showToast(e.message,'error'); return; }
  }

  showToast(`${displayName} marked as paid ✅`);
  showTripDetail(tripId);
};

// ── Delete trip ───────────────────────────────────────────────────────────────
window.deleteTrip = async function(tripId) {
  const t = state.trips.find(t => t.id === tripId);
  if (!t) return;
  if (!confirm(`Delete "${t.name}"?`)) return;

  state.trips = state.trips.filter(t => t.id !== tripId);

  if (!state.isGuest && state.activeTeamId) {
    try {
      await deleteDoc(doc(db,'teams',state.activeTeamId,'trips',tripId));
    } catch(e) { showToast(e.message,'error'); return; }
  }

  showToast('Trip deleted');
  showTrips();
};

window.submitCreateTrip = async function() {
  const name    = document.getElementById('trip-name')?.value.trim();
  const dest    = document.getElementById('trip-dest')?.value.trim();
  const start   = document.getElementById('trip-start')?.value;
  const end     = document.getElementById('trip-end')?.value;
  const costStr = document.getElementById('trip-cost')?.value;
  const desc    = document.getElementById('trip-desc')?.value.trim();
  const packRaw = document.getElementById('trip-packing')?.value.trim();

  if (!name)  { showToast('Add a trip name','error');   return; }
  if (!dest)  { showToast('Add a destination','error'); return; }
  if (!start) { showToast('Set a start date','error');  return; }
  if (!end)   { showToast('Set an end date','error');   return; }
  if (new Date(end) <= new Date(start)) { showToast('End must be after start','error'); return; }

  const cost    = costStr ? parseInt(costStr,10) : null;
  const packing = packRaw ? packRaw.split('\n').map(l=>l.trim()).filter(Boolean) : [];
  const uid     = state.user?.uid || '';

  // Pre-populate payments for all current members
  const payments = {};
  state.members.forEach(m => {
    payments[m.userId] = { paid:false, paidAt:null, note:'' };
  });

  const newTrip = {
    id:            'trip-' + Date.now(),
    name, destination:dest, description:desc||'',
    startDate:     { toDate: () => new Date(start) },
    endDate:       { toDate: () => new Date(end)   },
    costPerPerson: cost,
    currency:      'GBP',
    packingList:   packing,
    notes:         '',
    payments,
    createdBy:     uid,
    creatorName:   state.profile?.displayName || '',
    createdAt:     { toDate: () => new Date() },
  };

  state.trips.unshift(newTrip);

  if (!state.isGuest && state.activeTeamId) {
    try {
      await setDoc(doc(db,'teams',state.activeTeamId,'trips',newTrip.id), {
        name, destination:dest, description:desc||'',
        startDate: Timestamp.fromDate(new Date(start)),
        endDate:   Timestamp.fromDate(new Date(end)),
        costPerPerson: cost, currency:'GBP',
        packingList: packing, notes:'',
        payments,
        createdBy: uid, creatorName: state.profile?.displayName||'',
        createdAt: serverTimestamp(),
      });
    } catch(e) { showToast(e.message,'error'); return; }
  }

  showToast('Trip planned ✅');
  showTripDetail(newTrip.id);
};

window.showCreateOpponent = showCreateOpponent;

window.showEditOpponent = function(oppId) {

  showModal(`<h3>Edit opponent</h3>${opponentForm(o)}

function readOpponentForm() {
  const colourEl = document.querySelector('.opp-colour-swatch.active');
  return {
    name:         document.getElementById('opp-name')?.value.trim()||'',
    ground:       document.getElementById('opp-ground')?.value.trim()||'',
    colours:      document.getElementById('opp-colours')?.value.trim()||'',
    kitColour:    colourEl?.dataset.colour||'#ef4444',
    notes:        document.getElementById('opp-notes')?.value.trim()||'',
    contactName:  document.getElementById('opp-contact')?.value.trim()||'',
    contactPhone: document.getElementById('opp-phone')?.value.trim()||'',
  };
}

window.submitCreateOpponent = async function() {
  const data = readOpponentForm();
  if (!data.name) { showToast('Enter a club name','error'); return; }

  const newOpp = { id:'opp-'+Date.now(), ...data, wins:0, draws:0, losses:0, createdBy:state.user?.uid||'' };
  state.opponents.unshift(newOpp);

  if (!state.isGuest && state.activeTeamId) {
    try {
      await setDoc(doc(db,'teams',state.activeTeamId,'opponents',newOpp.id),
        { ...data, wins:0, draws:0, losses:0, createdBy:state.user?.uid||'', createdAt:serverTimestamp() });
    } catch(e) { showToast(e.message,'error'); return; }
  }
  showToast('Opponent saved ✅');
  showOpponentDetail(newOpp.id);
};

window.submitEditOpponent = async function(oppId) {
  const o    = state.opponents.find(o=>o.id===oppId);
  if (!o) return;
  const data = readOpponentForm();
  if (!data.name) { showToast('Enter a club name','error'); return; }

  Object.assign(o, data);

  if (!state.isGuest && state.activeTeamId) {
    try {
      await updateDoc(doc(db,'teams',state.activeTeamId,'opponents',oppId), data);
    } catch(e) { showToast(e.message,'error'); return; }
  }
  showToast('Opponent updated ✅');
  showOpponentDetail(oppId);
};

window.deleteOpponent = async function(oppId) {
  const o = state.opponents.find(o=>o.id===oppId);
  if (!o||!confirm(`Delete ${o.name}?`)) return;
  state.opponents = state.opponents.filter(o=>o.id!==oppId);
  if (!state.isGuest && state.activeTeamId) {
    try { await deleteDoc(doc(db,'teams',state.activeTeamId,'opponents',oppId)); }
    catch(e) { showToast(e.message,'error'); return; }
  }
  showToast('Opponent deleted');
  showOpponents();
};

window.showAvailability = function(eventId) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return;

  const players  = state.members.filter(m => m.role === 'player' || m.role === 'coach');
  const uid      = state.user?.uid || '';

  // Categorise by RSVP
  const going    = players.filter(m => state.rsvps[eventId] === 'yes' ||
    (m.userId === uid && state.rsvps[eventId] === 'yes'));
  const maybe    = players.filter(m => m.userId === uid && state.rsvps[eventId] === 'maybe');
  const unavail  = players.filter(m => m.userId === uid && state.rsvps[eventId] === 'no');
  // For demo, distribute evenly using mock data
  const allRsvps = { 'guest-001':'yes','u2':'yes','u3':'yes','u4':'maybe','u6':'yes','u7':'no' };
  const byStatus = { yes:[], maybe:[], no:[], none:[] };
  players.forEach(m => {
    const s = state.rsvps?.[eventId] === undefined
      ? (allRsvps[m.userId] || 'none')
      : (m.userId === uid ? (state.rsvps[eventId]||'none') : (allRsvps[m.userId]||'none'));
    byStatus[s].push(m);
  });

  const renderPlayerChips = (members, status) => members.map(m => `
    <div class="avail-chip avail-${status}">
      <span class="avail-initial">${(m.displayName||'?').charAt(0).toUpperCase()}</span>
      <div class="avail-info">
        <span class="avail-name">${escHtml(m.displayName?.split(' ')[0]||'')}</span>
        ${m.position ? `<span class="avail-pos">${escHtml(m.position)}</span>` : ''}
      </div>
    </div>`).join('');

  const totalGoing = byStatus.yes.length;

  showModal(`
    <div>
      <button class="back-btn-inline" onclick="showEventDetail('${eventId}')">← Event</button>
      <h3 style="margin-top:6px">👥 Availability</h3>
      <div style="font-size:.82rem;color:var(--muted);margin-bottom:10px">${escHtml(ev.title)}</div>

      <div class="avail-summary">
        <div class="avail-summary-cell avail-summary-yes">
          <span class="avail-summary-num">${byStatus.yes.length}</span>
          <span class="avail-summary-label">Going</span>
        </div>
        <div class="avail-summary-cell avail-summary-maybe">
          <span class="avail-summary-num">${byStatus.maybe.length}</span>
          <span class="avail-summary-label">Maybe</span>
        </div>
        <div class="avail-summary-cell avail-summary-no">
          <span class="avail-summary-num">${byStatus.no.length}</span>
          <span class="avail-summary-label">Out</span>
        </div>
        <div class="avail-summary-cell avail-summary-none">
          <span class="avail-summary-num">${byStatus.none.length}</span>
          <span class="avail-summary-label">No reply</span>
        </div>
      </div>

      ${byStatus.yes.length ? `
        <div class="avail-section-label avail-label-yes">✅ Going (${byStatus.yes.length})</div>
        <div class="avail-chips">${renderPlayerChips(byStatus.yes,'yes')}</div>` : ''}
      ${byStatus.maybe.length ? `
        <div class="avail-section-label avail-label-maybe">🤔 Maybe (${byStatus.maybe.length})</div>
        <div class="avail-chips">${renderPlayerChips(byStatus.maybe,'maybe')}</div>` : ''}
      ${byStatus.no.length ? `
        <div class="avail-section-label avail-label-no">❌ Can't go (${byStatus.no.length})</div>
        <div class="avail-chips">${renderPlayerChips(byStatus.no,'no')}</div>` : ''}
      ${byStatus.none.length ? `
        <div class="avail-section-label" style="color:var(--muted)">⏳ No response (${byStatus.none.length})</div>
        <div class="avail-chips">${renderPlayerChips(byStatus.none,'none')}</div>` : ''}

      <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:12px">Close</button>

// SPORT-SPECIFIC KIT EDITOR

// Map sport IDs → kit type
// ─────────────────────────────────────────────────────────────────────────────
// SPORT → KIT TYPE MAPPING
// Sports with mixed Gi + No-Gi sessions get a special 'mixed' flag.
// ─────────────────────────────────────────────────────────────────────────────

// Sports that have BOTH gi and no-gi training
const MIXED_GI_SPORTS = ['bjj','judo','karate','martialarts','wrestling','taekwondo'];
// Sports that are NO-GI only (shorts + rash guard, no gi at all)
const NOGI_ONLY_SPORTS = ['mma','kickboxing','muaythai','grappling'];
// Sports that are always GI (pure gi sports)
const GI_ONLY_SPORTS   = []; // judo sometimes but we treat it as mixed

function getKitType(sportId) {
  if (MIXED_GI_SPORTS.includes(sportId)) return 'mixed'; // gi + no-gi tabs
  if (NOGI_ONLY_SPORTS.includes(sportId)) return 'combat';
  if (sportId === 'boxing') return 'combat';
  const SWIM    = ['swimming','waterpolo'];
  const LEOTARD = ['gymnastics','dance','cheerleading','rhythmicgymnastics'];
  const GENERIC = ['athletics','cycling','rowing','running','other'];
  if (SWIM.includes(sportId))    return 'swim';
  if (LEOTARD.includes(sportId)) return 'leotard';
  if (GENERIC.includes(sportId)) return 'generic';
  return 'team';
}

// Does this kit type have two separate kit tabs?
function kitHasTwoModes(kitType) {
  return kitType === 'mixed'; // gi tab + no-gi tab
}

// Labels for the two kit tabs
function getKitTabLabels(kitType) {
  if (kitType === 'mixed') return { home:'Gi', away:'No-Gi' };
  return { home:'Home kit', away:'Away kit' };
}

// Legacy alias
function getKitLabel(kitType) { return getKitTabLabels(kitType); }

// Kit part labels per type + active tab
function getKitParts(kitType, activeTab) {
  // Mixed sports: gi tab vs no-gi tab
  if (kitType === 'mixed') {
    if (activeTab === 'away') {
      // No-gi tab — rash guard + shorts/spats
      return [
        { id:'shirt1', label:'Rash guard' },
        { id:'shirt2', label:'Trim / logo' },
        { id:'shorts', label:'Shorts / spats' },
      ];
    } else {
      // Gi tab
      return [
        { id:'shirt1', label:'Gi jacket' },
        { id:'shirt2', label:'Belt'      },
        { id:'shorts', label:'Trousers'  },
      ];
    }
  }
  switch (kitType) {
    case 'gi': return [      // kept for legacy
      { id:'shirt1', label:'Gi jacket' },
      { id:'shirt2', label:'Belt'      },
      { id:'shorts', label:'Trousers'  },
    ];
    case 'combat':  return [
      { id:'shirt1', label:'Vest / rash guard' },
      { id:'shirt2', label:'Trim'              },
      { id:'shorts', label:'Shorts'            },
    ];
    case 'swim':    return [
      { id:'shirt1', label:'Swimsuit' },
      { id:'shirt2', label:'Trim'     },
    ];
    case 'leotard': return [
      { id:'shirt1', label:'Costume' },
      { id:'shirt2', label:'Trim'    },
    ];
    case 'generic': return [
      { id:'shirt1', label:'Vest'   },
      { id:'shorts', label:'Shorts' },
    ];
    default: return [
      { id:'shirt1', label:'Shirt'   },
      { id:'shirt2', label:'2nd col' },
      { id:'shorts', label:'Shorts'  },
      { id:'socks',  label:'Socks'   },
    ];
  }
}

// Kit type labels for the UI header — delegated to getKitTabLabels above

// Patterns available per kit type + tab
function getKitPatterns(kitType, activeTab) {
  // No-gi rash guards can have patterns, gi cannot
  if (kitType === 'mixed') {
    return activeTab === 'away' ? KIT_PATTERNS : [{ id:'solid', label:'Solid' }];
  }
  if (kitType === 'gi' || kitType === 'swim' || kitType === 'leotard') {
    return [{ id:'solid', label:'Solid' }];
  }
  return KIT_PATTERNS;
}

function buildKitSVG(kit, size, kitType, activeTab) {
  if (kitType === 'mixed') {
    return activeTab === 'away'
      ? buildRashGuardSVG(kit, size)   // no-gi tab
      : buildGiSVG(kit, size);          // gi tab
  }
  switch (kitType) {
    case 'gi':      return buildGiSVG(kit, size);
    case 'combat':  return buildCombatSVG(kit, size);
    case 'swim':    return buildSwimSVG(kit, size);
    case 'leotard': return buildLeotardSVG(kit, size);
    case 'generic': return buildGenericSVG(kit, size);
    default:        return buildShirtSVG(kit, size);
  }
}

// Rash guard + fight shorts (no-gi BJJ / grappling)

  const bodyClip = `M22 20 L22 88 L78 88 L78 20 C70 12 30 12 22 20 Z`;

  let rashBody = '';
  if (p === 'solid') {
    rashBody = `
      <path d="${lSleeve}"  fill="${rash}" stroke="rgba(0,0,0,.10)" stroke-width="1"/>
      <path d="${rSleeve}"  fill="${rash}" stroke="rgba(0,0,0,.10)" stroke-width="1"/>

      <!-- Side panel trim lines -->

      <path d="M78 20 L78 88" stroke="${trim}" stroke-width="2" opacity=".5" stroke-linecap="round"/>

      <rect x="22" y="84" width="56" height="6" fill="${trim}" opacity=".4" rx="2"/>

      <line x1="50" y1="88" x2="50" y2="128" stroke="rgba(0,0,0,.08)" stroke-width="1"/>

      <!-- Shine -->
      <clipPath id="${shineId}"><path d="${bodyClip}"/></clipPath>
      <g clip-path="url(#${shineId})">
        <path d="M30 28 C32 44 32 64 30 76" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="3" stroke-linecap="round"/>

// Standard football/team shirt
function buildShirtSVG(kit, size = 110) {
  const c1 = kit.shirt1 || '#cccccc';
  const c2 = kit.shirt2 || '#ffffff';
  const sc = kit.shorts || c1;
  const so = kit.socks  || c1;
  const p  = kit.pattern || 'solid';

  const shirtClip   = `M22 36 L22 96 L78 96 L78 36 L62 28 C58 16 42 16 38 28 Z`;
  const leftSleeve  = `M18 20 L2 40 L22 46 L22 36 Z`;
  const rightSleeve = `M82 20 L98 40 L78 46 L78 36 Z`;

  let shirtBody = '';
  const base = `
    <path d="${leftSleeve}"  fill="${c1}" stroke="rgba(0,0,0,.10)" stroke-width="1"/>
    <path d="${rightSleeve}" fill="${c1}" stroke="rgba(0,0,0,.10)" stroke-width="1"/>
    <path d="${shirtClip}"   fill="${c1}" stroke="rgba(0,0,0,.10)" stroke-width="1"/>`;

  if (p === 'solid') {
    shirtBody = base;
  } else {
    const clipId = `sc${Math.random().toString(36).slice(2,6)}`;
    const patterns = {
      vstripes:  `<clipPath id="${clipId}"><path d="${shirtClip}"/></clipPath><g clip-path="url(#${clipId})">${[30,40,50,60,70].map(x=>`<rect x="${x}" y="0" width="5" height="110" fill="${c2}" opacity=".85"/>`).join('')}</g>`,

      quarters:  `<clipPath id="${clipId}"><path d="${shirtClip}"/></clipPath><g clip-path="url(#${clipId})"><rect x="50" y="0" width="50" height="60" fill="${c2}"/><rect x="0" y="60" width="50" height="50" fill="${c2}"/></g>`,

    <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${Math.round(size*1.4)}">

      <rect x="60" y="118" width="13" height="18" rx="3" fill="${so}" stroke="rgba(0,0,0,.10)" stroke-width="1"/>
      <rect x="27" y="118" width="13" height="4"  rx="2" fill="rgba(255,255,255,.3)"/>
      <rect x="60" y="118" width="13" height="4"  rx="2" fill="rgba(255,255,255,.3)"/>

}

// Judo / BJJ / Karate Gi
function buildGiSVG(kit, size = 110) {
  const team = state.teams.find(t => t.id === state.activeTeamId);
  const isJudo = team?.sport === 'judo';
  // Judo: IJF rules allow only blue or white gi
  let jacket  = kit.shirt1 || '#ffffff';
  let belt    = kit.shirt2 || '#ffffff';
  let trouser = kit.shorts || jacket;
  if (isJudo) {
    const allowed = ['#ffffff','#1e40af','#1d4ed8','#2563eb','#3b82f6','#0000ff','#000080'];
    if (!allowed.includes(jacket.toLowerCase())) jacket  = '#ffffff';
    if (!allowed.includes(trouser.toLowerCase())) trouser = jacket;
  }
  const h = Math.round(size * 1.4);
  return `
    <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${h}">
      <!-- Gi jacket left panel -->
      <path d="M15 20 L15 90 L50 90 L50 30 C44 18 28 16 15 20 Z" fill="${jacket}" stroke="rgba(0,0,0,.15)" stroke-width="1.5"/>
      <!-- Gi jacket right panel (overlapping) -->
      <path d="M85 20 L85 90 L50 90 L50 30 C56 18 72 16 85 20 Z" fill="${jacket}" stroke="rgba(0,0,0,.15)" stroke-width="1.5"/>

// Load team kit into _kit state
function loadKitState() {
  const team = state.teams.find(t => t.id === state.activeTeamId);
  if (team?.kit?.home) {
    Object.assign(_kit.home, team.kit.home);
    Object.assign(_kit.away, team.kit.away || {});
  } else {
    _kit.home.shirt1  = team?.kitColour  || '#ef4444';
    _kit.home.shirt2  = '#ffffff';
    _kit.home.shorts  = team?.kitColour  || '#ef4444';
    _kit.home.socks   = team?.kitColour  || '#ef4444';
    _kit.home.pattern = 'solid';
    _kit.away.shirt1  = team?.awayColour || '#3b82f6';
    _kit.away.shirt2  = '#ffffff';
    _kit.away.shorts  = team?.awayColour || '#3b82f6';
    _kit.away.socks   = team?.awayColour || '#3b82f6';
    _kit.away.pattern = 'solid';
  }
}

// Check if current user can edit kit
function canEditKit() {
  if (state.isGuest) return true; // demo mode — always allow
  const me = state.members.find(m => m.userId === state.user?.uid);
  return me?.role === 'admin' || me?.role === 'coach';
}

window.showKitPreview = function() {
  loadKitState();
  _kit.active     = 'home';
  _kit.activePart = 'shirt1';
  renderKitBuilder();
};

function renderKitBuilder() {
  const team    = state.teams.find(t => t.id === state.activeTeamId);
  const sport   = team?.sport || 'football';
  const kitType = getKitType(sport);
  const labels  = getKitTabLabels(kitType);
  const activeTab = _kit.active;
  const parts   = getKitParts(kitType, activeTab);
  const patterns = getKitPatterns(kitType, activeTab);
  const canEdit = canEditKit();
  const isMixed = kitHasTwoModes(kitType);

  const hk = _kit.home;
  const ak = _kit.away;
  const isHome = activeTab === 'home';
  const current = isHome ? hk : ak;

  const validPartIds = parts.map(p => p.id);
  if (!validPartIds.includes(_kit.activePart)) _kit.activePart = validPartIds[0];

  const sportLabel = WIZARD_SPORTS.find(s => s.id === sport)?.label
    || SPORTS_FLAT.find(s => s.id === sport)?.label || 'Kit';

  const typeDesc = isMixed
    ? (isHome ? 'Gi training' : 'No-Gi / open mat')
    : kitType === 'combat' ? 'Fight kit'
    : kitType === 'swim' ? 'Swimwear'
    : kitType === 'leotard' ? 'Costume'

  showModal(`
    <div class="kit-builder">

        <span class="kit-sport-type">${typeDesc}</span>

      <div class="kit-switcher">
        <button class="kit-tab ${isHome?'active':''}" onclick="switchKitView('home')">${labels.home}</button>
        <button class="kit-tab ${!isHome?'active':''}" onclick="switchKitView('away')">${labels.away}</button>
      </div>

      ${isMixed ? `<div class="kit-mode-hint">${isHome ? 'Gi worn in class' : 'No-gi / gym clothes for open mat &amp; conditioning'}</div>` : ''}

      <div class="kit-both-preview">
        <div class="kit-preview-item ${isHome?'kit-selected':'kit-dimmed'}" onclick="switchKitView('home')">
          <div id="kit-render-home">${buildKitSVG(hk, 80, kitType, 'home')}</div>
          <div class="kit-preview-label">${labels.home}</div>
        </div>
        <div class="kit-preview-item ${!isHome?'kit-selected':'kit-dimmed'}" onclick="switchKitView('away')">
          <div id="kit-render-away">${buildKitSVG(ak, 80, kitType, 'away')}</div>
          <div class="kit-preview-label">${labels.away}</div>
        </div>
      </div>

      ${!canEdit ? `<div class="kit-view-only-notice">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="7"/><path d="M8 5v3.5M8 11v.5"/></svg>
        Only coaches and admins can change the kit
      </div>` : ''}

      ${canEdit ? `
        ${patterns.length > 1 ? `
          <div class="kit-section-label">Pattern</div>
          <div class="kit-pattern-row">
            ${patterns.map(pt => `<button class="kit-pattern-btn ${current.pattern===pt.id?'active':''}" onclick="setKitPattern('${pt.id}')">${pt.label}</button>`).join('')}
          </div>` : ''}

        <div class="kit-section-label">Colour</div>
        <div class="kit-part-row">
          ${parts.map(pt => `
            <button class="kit-part-btn ${_kit.activePart===pt.id?'active':''}" onclick="setKitPart('${pt.id}')">
              <div class="kit-part-swatch" style="background:${current[pt.id]||'#ccc'}"></div>
              <span>${pt.label}</span>
            </button>`).join('')}
        </div>

        <div class="kit-colour-swatches">

             '#14b8a6','#00BFA5','#3b82f6','#6366f1','#8b5cf6','#ec4899',
             '#ffffff','#e5e7eb','#9ca3af','#374151','#1f2937','#000000'].map(col => `
            <button class="kit-swatch-btn" style="background:${col};${col==='#ffffff'?'border:2px solid var(--border2)':''}"

window.switchKitView = function(which) {
  _kit.active = which;
  _kit.activePart = 'shirt1';
  renderKitBuilder();
};

window.setKitPattern = function(patternId) {
  _kit[_kit.active].pattern = patternId;
  refreshKitPreview();
  renderKitBuilder();
};

window.setKitPart = function(partId) {
  _kit.activePart = partId;
  renderKitBuilder();
};

window.applyKitColour = function(colour) {
  _kit[_kit.active][_kit.activePart] = colour;
  refreshKitPreview();
  const team    = state.teams.find(t => t.id === state.activeTeamId);
  const kitType = getKitType(team?.sport || 'football');
  const parts   = getKitParts(kitType, _kit.active).map(p => p.id);
  document.querySelectorAll('.kit-part-btn').forEach((btn, i) => {
    const swatch = btn.querySelector('.kit-part-swatch');
    if (swatch && parts[i] === _kit.activePart) swatch.style.background = colour;
  });
};

function refreshKitPreview() {
  const team    = state.teams.find(t => t.id === state.activeTeamId);
  const kitType = getKitType(team?.sport || 'football');
  const homeDiv = document.getElementById('kit-render-home');
  const awayDiv = document.getElementById('kit-render-away');
  if (homeDiv) homeDiv.innerHTML = buildKitSVG(_kit.home, 80, kitType, 'home');
  if (awayDiv) awayDiv.innerHTML = buildKitSVG(_kit.away, 80, kitType, 'away');
}

window.saveKitColours = async function() {
  const team = state.teams.find(t => t.id === state.activeTeamId);
  if (!team) return;
  if (!canEditKit()) { showToast('Only coaches and admins can change the kit','error'); return; }

  team.kit        = { home: {..._kit.home}, away: {..._kit.away} };
  team.kitColour  = _kit.home.shirt1;
  team.awayColour = _kit.away.shirt1;

  if (!state.isGuest && state.activeTeamId) {
    try {
      await updateDoc(doc(db,'teams',state.activeTeamId), {
        kit:        team.kit,
        kitColour:  team.kitColour,
        awayColour: team.awayColour,
      });
    } catch(e) { showToast(e.message,'error'); return; }
  }
  showToast('Kit saved ✅');
  closeModal();
};

let tourStep = 0;

function showTour(step) {
  if (!TOUR_STEPS[step]) { closeTour(); return; }
  const s = TOUR_STEPS[step];
  const isFirst = step === 0;
  const isLast  = !!s.isLast || step === TOUR_STEPS.length - 1;
  const progress = `${step + 1} / ${TOUR_STEPS.length}`;

  // Switch to the relevant tab if specified
  if (s.tab && s.tab !== state.activeTab) {
    state.activeTab = s.tab;
    renderApp();
  }

  // Remove any existing tour overlay
  document.getElementById('tour-overlay')?.remove();

  const overlay = document.createElement('div');
  overlay.id = 'tour-overlay';
  overlay.className = 'tour-overlay';
  overlay.innerHTML = `
    <div class="tour-card">
      <div class="tour-progress-dots">
        ${TOUR_STEPS.map((_,i) => `<div class="tour-dot ${i===step?'active':i<step?'done':''}"></div>`).join('')}
      </div>
      <div class="tour-emoji">${s.emoji}</div>
      <h3 class="tour-title">${s.title}</h3>
      <p class="tour-body">${s.body}</p>
      ${s.tip ? `<div class="tour-tip">💡 ${s.tip}</div>` : ''}
      <div class="tour-actions">
        <button class="tour-skip-btn" onclick="closeTour()">Skip tour</button>
        <div class="tour-nav">
          ${!isFirst ? `<button class="tour-back-btn" onclick="showTour(${step-1})">← Back</button>` : ''}
          <button class="tour-next-btn" onclick="${isLast ? 'closeTour()' : `showTour(${step+1})`}">
            ${isLast ? 'Start exploring! 🚀' : 'Next →'}
          </button>
        </div>
      </div>
    </div>`;

  document.body?.appendChild(overlay);
  tourStep = step;
}

function closeTour() {
  document.getElementById('tour-overlay')?.remove();
  state.tourDismissed = true;
  try { localStorage.setItem('tu_tour_done','1'); } catch(e) {}
  // Make sure we're on the home tab after the tour
  if (state.activeTab !== 'home') {
    state.activeTab = 'home';
    renderApp();
  }
}
window.closeTour = closeTour;
window.showTour  = showTour;

window.startTour = function() {
  tourStep = 0;
  state.tourDismissed = false;

window.twToggleDay = function(dayIndex) {

function twUpdateCreateBtn() {

window.twConfirm = function() {
  if (!_wizard.days.length) { showToast('Pick at least one training day','error'); return; }
  _wizard.location = document.getElementById('tw-location')?.value.trim() || '';
  _wizard.generatedEvents = generateTrainingEvents();
  showTrainingPreview();
};

function generateTrainingEvents() {
  const events  = [];
  const current = new Date(_wizard.seasonStart + 'T12:00');
  const end     = new Date(_wizard.seasonEnd   + 'T12:00');

  while (current <= end) {
    const dayOfWeek = current.getDay();
    if (_wizard.days.includes(dayOfWeek)) {
      const timeStr = _wizard.perDayTime[dayOfWeek] || '17:30';
      const [h, m]  = timeStr.split(':').map(Number);
      const startsAt = new Date(current);
      startsAt.setHours(h, m, 0, 0);
      events.push({
        id:        'gen-' + Date.now() + '-' + events.length,
        type:      'practice',
        title:     `${DAY_FULL[dayOfWeek]} Training`,
        startsAt:  { toDate: () => new Date(startsAt), _date: new Date(startsAt) },
        location:  _wizard.location || null,
        duration:  _wizard.duration,
        createdBy: state.user?.uid || '',
        teamId:    _wizard.teamId,
        bringNote: null, coachNotes: null, opponent: null, description: null,
      });
    }
    current.setDate(current.getDate() + 1);
  }
  return events;
}

function showTrainingPreview() {
  const events = _wizard.generatedEvents;
  if (!events.length) { showToast('No sessions generated','error'); return; }

  const byMonth = {};
  events.forEach(ev => {
    const d   = ev.startsAt.toDate();
    const key = d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push(ev);
  });

  const previewHtml = Object.entries(byMonth).slice(0,4).map(([month, evs]) => `
    <div class="wizard-month-label">${month}</div>
    ${evs.slice(0,5).map(ev => {
      const d = ev.startsAt.toDate();
      return `<div class="wizard-event-row">
        <span class="wizard-event-day">${d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric'})}</span>
        <span class="wizard-event-title">${escHtml(ev.title)}</span>
        <span class="wizard-event-time">${d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>
      </div>`;
    }).join('')}
    ${evs.length > 5 ? `<div class="wizard-more">+${evs.length-5} more</div>` : ''}
  `).join('');

  const more = Object.keys(byMonth).length > 4
    ? `<div class="wizard-more">…and ${Object.keys(byMonth).length - 4} more months</div>` : '';

  showModal(`
    <div class="wizard-screen">
      <h3>Looks good?</h3>
      <p class="wizard-sub">We'll create <strong>${events.length} sessions</strong> in your schedule.</p>
      <div class="wizard-preview">${previewHtml}${more}</div>
      <div class="wizard-summary-chips" style="margin:10px 0">
        ${_wizard.days.sort().map(d=>`<span class="wizard-summary-chip">${DAY_FULL[d]}</span>`).join('')}
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="showTrainingScreen()">← Back</button>
        <button class="btn btn-primary" onclick="submitTrainingSchedule()">
          Add to schedule
        </button>
      </div>
    </div>`);
}

window.submitTrainingSchedule = async function() {
  const events = _wizard.generatedEvents;
  if (!events.length) { showToast('No events to create','error'); return; }
  showToast(`Adding ${events.length} sessions…`);
  closeModal();

  if (state.isGuest) {
    state.events.push(...events);
    renderApp();
    showToast(`${events.length} training sessions added!`);
    return;
  }

  try {
    const CHUNK = 490;
    for (let i = 0; i < events.length; i += CHUNK) {
      const chunk = events.slice(i, i + CHUNK);
      await Promise.all(chunk.map(ev => {
        const ref = doc(collection(db,'teams',_wizard.teamId,'events'));
        return setDoc(ref, {
          title:      ev.title,
          type:       ev.type,
          startsAt:   Timestamp.fromDate(ev.startsAt._date || ev.startsAt.toDate()),
          endsAt:     null,
          location:   ev.location,
          duration:   ev.duration,
          createdBy:  ev.createdBy,
          teamId:     ev.teamId,
          bringNote:  null, coachNotes: null, description: null,
          seenBy:     [], rsvps: {}, targetSections: null,
          createdAt:  serverTimestamp(),
        });
      }));
    }
    await loadTeamData(_wizard.teamId);
    showToast(`${events.length} sessions added!`);
    renderApp();
  } catch(e) {
    showToast(e.message, 'error');
  }
};

window.toggleMarkIn = async function(eventId, userId, btn) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return;
  ev.markedIn = ev.markedIn || [];
  const isIn = ev.markedIn.includes(userId);

  if (isIn) {
    ev.markedIn = ev.markedIn.filter(id => id !== userId);
  } else {
    ev.markedIn.push(userId);
  }

  // Update button immediately
  const row = btn.closest('.mark-in-row');
  if (isIn) {
    btn.textContent = 'Mark in'; btn.classList.remove('present');
    row?.classList.remove('present');
  } else {
    btn.textContent = '✅ Here'; btn.classList.add('present');
    row?.classList.add('present');
  }
  // Update summary
  const summary = document.querySelector('.mark-in-present');
  if (summary) summary.textContent = ev.markedIn.length + ' present';
  const absSummary = document.querySelector('.mark-in-absent');
  const players = state.members.filter(m => m.role === 'player' || m.role === 'coach');
  if (absSummary) absSummary.textContent = (players.length - ev.markedIn.length) + ' absent';

  if (!state.isGuest && state.activeTeamId) {
    try {
      await updateDoc(doc(db,'teams',state.activeTeamId,'events',eventId),
        { markedIn: ev.markedIn });
    } catch(e) { /* non-critical */ }

// ─────────────────────────────────────────────────────────────────────────────
// CALENDAR SYNC — Add to Google / Apple Calendar
// Uses the standard calendar URL schemes (no API key needed)
// ─────────────────────────────────────────────────────────────────────────────

function buildCalendarEvent(ev) {
  const start = ev.startsAt?.toDate?.() || new Date();
  // Duration mapping
  const durationMap = { '30m':30, '1h':60, '1h 30m':90, '2h':120, 'All day':480 };
  const mins = durationMap[ev.duration] || 90;
  const end  = new Date(start.getTime() + mins * 60000);

  const pad = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;

  return {
    title:    ev.title + (ev.opponent ? ` vs ${ev.opponent}` : ''),
    start:    fmt(start),
    end:      fmt(end),
    location: ev.location || '',
    details:  [ev.bringNote ? `Bring: ${ev.bringNote}` : '', ev.description||''].filter(Boolean).join('\n'),
  };
}

window.addToGoogleCalendar = function(eventId) {
  const ev  = state.events.find(e => e.id === eventId);
  if (!ev) return;
  const cal = buildCalendarEvent(ev);
  const url = 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    + `&text=${encodeURIComponent(cal.title)}`
    + `&dates=${cal.start}/${cal.end}`
    + `&location=${encodeURIComponent(cal.location)}`
    + `&details=${encodeURIComponent(cal.details)}`
    + `&sf=true&output=xml`;
  window.open(url, '_blank');
};

window.addToAppleCalendar = function(eventId) {
  const ev  = state.events.find(e => e.id === eventId);
  if (!ev) return;
  const cal = buildCalendarEvent(ev);

  // Generate .ics file content
  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//TeamUp//TeamUp//EN',
    'BEGIN:VEVENT',
    `DTSTART:${cal.start}`,
    `DTEND:${cal.end}`,
    `SUMMARY:${cal.title}`,
    `LOCATION:${cal.location}`,
    `DESCRIPTION:${cal.details.replace(/\n/g,'\\n')}`,
    `UID:teamup-${eventId}@teamup.app`,
    'END:VEVENT',
    'END:VCALENDAR',
  ].join('\r\n');

  // Download as .ics (opens in Calendar on iOS/macOS automatically)
  const blob = new Blob([ics], { type: 'text/calendar' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${cal.title.replace(/[^a-z0-9]/gi,'-')}.ics`;
  a.click();
  URL.revokeObjectURL(url);
};

// Helper: read file as data URL
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = e => resolve(e.target.result);
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}

function showCreateTeam() {
  // Build grouped sport selector HTML
  const sportGroupsHtml = Object.entries(SPORTS).map(([group, sports]) => `
    <div class="sport-group-label">${group}</div>
    <div class="sport-grid">
      ${sports.map(s => `
        <button class="sport-chip" data-sport="${s.id}" onclick="selectSportChip(this,'${s.id}')">
          <span class="sport-chip-emoji">${s.emoji}</span>
          <span class="sport-chip-label">${s.label}</span>
        </button>`).join('')}
    </div>`).join('');

  showModal(`
    <h3>Create a team</h3>
    <input id="team-name" class="input" placeholder="Team name e.g. City FC Under-14s" autofocus/>

    <div class="form-label">Sport</div>
    <div class="sport-selector-scroll">
      ${sportGroupsHtml}
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitCreateTeam()">Create team</button>
    </div>`);

  // Auto-select football as default
  setTimeout(() => {
    const footballBtn = document.querySelector('.sport-chip[data-sport="football"]');
    if (footballBtn) selectSportChip(footballBtn, 'football');
  }, 50);
}
window.showCreateTeam = showCreateTeam;

window.selectSportChip = function(el, sportId) {
  document.querySelectorAll('.sport-chip').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  // Scroll the selected chip into view
  el.scrollIntoView({ block:'nearest', behavior:'smooth' });
};

window.submitCreateTeam = async function() {
  const name = document.getElementById('team-name')?.value?.trim();
  const activeChip = document.querySelector('.sport-chip.active');
  const sport = activeChip?.dataset.sport || 'football';
  if (!name) { showToast('Enter team name','error'); return; }
  closeModal();
  await createTeam(name, sport);
};

function showJoinTeam() {
  showModal(`
    <h3>Join a team</h3>
    <input id="join-code" class="input code-input" placeholder="ABC123" maxlength="6" autofocus
      style="text-transform:uppercase;letter-spacing:.2em;font-size:1.4rem;text-align:center"/>
    <div class="role-options">
      ${[{r:'player',l:'Player',e:'⚽'},{r:'parent',l:'Parent',e:'👨‍👧'},{r:'coach',l:'Coach',e:'📋'}].map(o=>`
        <button class="role-opt-btn ${o.r==='player'?'active':''}" data-role="${o.r}"
          onclick="selectRole(this,'${o.r}')">${o.e} ${o.l}</button>
      `).join('')}
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitJoinTeam()">Join</button>
    </div>`);
}
window.showJoinTeam = showJoinTeam;
window.selectRole = function(el, role) {
  document.querySelectorAll('.role-opt-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
};
window.submitJoinTeam = async function() {
  const code = document.getElementById('join-code')?.value?.trim().toUpperCase();
  const roleEl = document.querySelector('.role-opt-btn.active');
  const role = roleEl?.dataset.role || 'player';
  if (!code || code.length < 6) { showToast('Enter 6-digit code','error'); return; }
  closeModal();
  try {
    await joinTeam(code, role);
  } catch(e) { showToast(e.message,'error'); }
};

async function showInviteCode() {
  const team = state.teams.find(t => t.id === state.activeTeamId);
  const code = team?.inviteCode || '------';
  const link = `${location.origin}${location.pathname}?join=${code}`;
  showModal(`
    <h3>Invite members</h3>
    <p style="color:var(--muted);font-size:.9rem">Share this code with players, coaches and parents.</p>
    <div class="invite-code-display" onclick="copyInviteLink('${link}')" style="cursor:pointer">
      <span>${code}</span>
      <span class="invite-code-link-hint">Tap to copy link</span>
    </div>
    <button class="btn btn-primary" onclick="copyCode('${code}')">Copy code</button>
    <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:8px">Done</button>`);
}
window.showInviteCode = showInviteCode;
window.copyCode = function(code) {
  navigator.clipboard?.writeText(code).then(()=>showToast('Copied! 📋')).catch(()=>{
    showToast(code);
  });
};

function showMembers() {
  const myRole = state.members.find(m => m.userId === state.user?.uid)?.role || 'member';
  const isCoachOrAdmin = myRole === 'admin' || myRole === 'coach';
  const team = state.teams.find(t => t.id === state.activeTeamId);

  // Group by role in Heja order: coaches/admins → players → parents
  const groups = [
    { label: 'Coaches & Admins', roles: ['admin','coach'],  color: '#60a5fa' },
    { label: 'Players',          roles: ['player'],         color: '#34d399' },
    { label: 'Parents',          roles: ['parent','member'],color: '#fb923c' },
  ];

  const roleColors = { admin:'#a78bfa', coach:'#60a5fa', player:'#34d399', parent:'#fb923c', member:'#6b7280' };

  const groupsHtml = groups.map(group => {
    const members = state.members.filter(m => group.roles.includes(m.role));
    if (!members.length) return '';
    return `
      <div class="members-group-label">${group.label} (${members.length})</div>
      ${members.map(m => {
        const isMe = m.userId === state.user?.uid;
        const hasMedical = !!m.medical?.emergencyName;
        const guardianCount = m.guardians?.length || 0;
        return `
          <div class="member-row member-row-tap" onclick="showMemberDetail('${m.userId}')">
            <div class="avatar">${(m.displayName||'?').charAt(0).toUpperCase()}</div>
            <div class="member-info">
              <div class="member-name">
                ${escHtml(m.displayName||'')}
                ${isMe ? '<span class="member-you-tag">(you)</span>' : ''}
              </div>
              <div class="member-sub-row">
                <span class="role-badge" style="background:${roleColors[m.role]||'#6b7280'}22;color:${roleColors[m.role]||'#6b7280'}">${m.role}</span>
                ${m.jerseyNumber ? `<span class="member-number">#${m.jerseyNumber}</span>` : ''}
                ${m.position    ? `<span class="member-position">${escHtml(m.position)}</span>` : ''}
                ${isCoachOrAdmin && hasMedical ? `<span class="member-medical-dot" title="Medical notes">🩺</span>` : ''}
                ${isCoachOrAdmin && guardianCount > 0 ? `<span class="member-guardian-tag">${guardianCount} guardian${guardianCount>1?'s':''}</span>` : ''}
              </div>
            </div>
            <span class="member-chevron">›</span>
          </div>`; }).join('')}`;
  }).join('');

  showModal(`
    <div class="members-screen">
      <div class="members-screen-header">
        <h3>Members <span class="members-count-badge">${state.members.length}</span></h3>
        ${isCoachOrAdmin ? `
          <button class="members-invite-btn" onclick="closeModal();showInviteCode()">
            + Invite
          </button>` : ''}
      </div>
      ${groupsHtml}
      <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:12px">Close</button>
    </div>`);
}
window.showMembers = showMembers;

// ── Member detail modal ───────────────────────────────────────────────────────
window.showMemberDetail = function(userId) {
  const m = state.members.find(m => m.userId === userId);
  if (!m) return;
  const myRole = state.members.find(mm => mm.userId === state.user?.uid)?.role || 'member';
  const isCoachOrAdmin = myRole === 'admin' || myRole === 'coach';
  const isMe = userId === state.user?.uid;
  const team = state.teams.find(t => t.id === state.activeTeamId);
  const roleColors = { admin:'#a78bfa', coach:'#60a5fa', player:'#34d399', parent:'#fb923c', member:'#6b7280' };
  const roleColor  = roleColors[m.role] || '#6b7280';

  // Guardian section — coaches/admins only
  const guardiansHtml = isCoachOrAdmin ? (() => {
    const guardians = m.guardians || [];
    return `
      <div class="member-detail-section">
        <div class="member-detail-section-header">
          <span class="member-detail-section-title">👨‍👧 Guardians</span>
          ${isCoachOrAdmin ? `<button class="member-detail-add-btn" onclick="showAddGuardian('${userId}')">+ Add</button>` : ''}
        </div>
        ${guardians.length ? guardians.map((g, i) => `
          <div class="guardian-card">
            <div class="guardian-card-header">
              <span class="guardian-name">${escHtml(g.name)}</span>
              ${g.isPrimary ? '<span class="guardian-primary-badge">Primary</span>' : ''}
              <button class="guardian-remove-btn" onclick="removeGuardian('${userId}',${i})" title="Remove">✕</button>
            </div>
            <div class="guardian-detail">${escHtml(g.relation||'Guardian')}</div>

window.submitAddGuardian = async function(userId) {
  const name     = document.getElementById('g-name')?.value.trim();
  const phone    = document.getElementById('g-phone')?.value.trim();
  const email    = document.getElementById('g-email')?.value.trim();
  const isPrimary= document.getElementById('g-primary')?.checked || false;
  const relEl    = document.querySelector('.duration-btn.active');
  const relation = relEl?.dataset.val || 'Parent';

  if (!name) { showToast('Enter guardian name','error'); return; }

  const m = state.members.find(m => m.userId === userId);
  if (!m) return;

  const newGuardian = { name, relation, phone:phone||'', email:email||'', isPrimary };
  m.guardians = m.guardians || [];
  // If setting as primary, clear other primary flags
  if (isPrimary) m.guardians.forEach(g => g.isPrimary = false);
  m.guardians.push(newGuardian);

  if (!state.isGuest) {
    try {
      await updateDoc(
        doc(db,'teams',state.activeTeamId,'members',userId),
        { guardians: m.guardians }
      );
    } catch(e) { showToast(e.message,'error'); return; }
  }

  showToast('Guardian added ✅');
  showMemberDetail(userId);
};

window.switchTeam = async function(teamId) {
  if (teamId === state.activeTeamId) return;
  // Cache current team data before switching
  const curTeam = state.teams.find(t => t.id === state.activeTeamId);
  if (curTeam && state.isGuest) {
    curTeam._cachedEvents   = state.events;
    curTeam._cachedPosts    = state.posts;
    curTeam._cachedMembers  = state.members;
    curTeam._cachedSections = state.sections;
    curTeam._cachedChats    = state.chats;
  }
  state.activeTeamId = teamId;
  // Restore cached data for the target team (guest/demo mode)
  const nextTeam = state.teams.find(t => t.id === teamId);
  if (state.isGuest && nextTeam?._cachedEvents !== undefined) {
    state.events   = nextTeam._cachedEvents   || [];
    state.posts    = nextTeam._cachedPosts    || [];
    state.members  = nextTeam._cachedMembers  || [];
    state.sections = nextTeam._cachedSections || [];
    state.chats    = nextTeam._cachedChats    || [];
    applyTeamTheme(teamId);
    renderApp();
  } else if (state.isGuest && teamId === DEMO.team.id) {
    // Switching back to the original demo team
    state.events   = DEMO.events;
    state.posts    = DEMO.posts;
    state.members  = DEMO.members;
    state.sections = DEMO.sections;
    state.chats    = DEMO.chats;
    applyTeamTheme(teamId);
    renderApp();
  } else {
    await loadTeamData(teamId);
    applyTeamTheme(teamId);
    renderApp();
  }
};

// MESSAGING SAFETY RULES
// FA safeguarding-aligned: adults cannot message children directly.
// Coaches can message parents. Players can message players.
// Team-wide chats (all members) are always allowed.
// ─────────────────────────────────────────────────────────────────────────────

function getMessagingPermission(fromRole, toRole) {
  // Coaches / admins → players: BLOCKED (use team posts/announcements)
  if (['admin','coach'].includes(fromRole) && toRole === 'player') {
    return {
      allowed: false,
      reason:  'For safeguarding, coaches can\'t message players directly. Use a team post or announcement instead — everyone can see it and it keeps a clear record.',
      icon:    '🛡️',
    };
  }
  // Players → coaches: allowed (child initiates)
  if (fromRole === 'player' && ['admin','coach'].includes(toRole)) {
    return { allowed: true };
  }
  // Coaches → parents: allowed
  if (['admin','coach'].includes(fromRole) && toRole === 'parent') {
    return { allowed: true };
  }
  // Players → players: allowed
  if (fromRole === 'player' && toRole === 'player') {
    return { allowed: true };
  }
  // Parents → coaches: allowed
  if (fromRole === 'parent' && ['admin','coach'].includes(toRole)) {
    return { allowed: true };
  }
  // Parents → parents: allowed
  if (fromRole === 'parent' && toRole === 'parent') {
    return { allowed: true };
  }
  // Default: allowed (member → member, unknown roles)
  return { allowed: true };
}

window.startDM = async function(otherUid, otherName) {
  closeModal();
  const ids    = [state.user.uid, otherUid].sort();
  const chatId = ids.join('_dm_');

  // Demo mode: create local chat object
  if (state.isGuest) {
    const existing = state.chats.find(c => c.id === chatId);
    if (!existing) {
      state.chats.push({
        id: chatId, type: 'dm',
        teamId: state.activeTeamId || null,
        name: otherName, memberIds: ids,
        createdBy: state.user.uid, lastMessage: null,
      });
    }
    openChat(chatId, otherName);
    return;
  }

  const chatRef = doc(db, 'chats', chatId);
  const snap    = await getDoc(chatRef);
  if (!snap.exists()) {
    await setDoc(chatRef, {
      type: 'dm', teamId: state.activeTeamId || null,
      name: otherName, memberIds: ids,
      createdBy: state.user.uid,
      createdAt: serverTimestamp(), lastMessage: null,
    });
  }
  openChat(chatId, otherName);
};

  const diff = (Date.now() - date.getTime()) / 1000;
  if (diff < 60)  return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function escHtml(str) {
  return String(str||'')

    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

}
.ct-social-btn {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  background: none; border: none; cursor: pointer;
  font-family: var(--font-body); padding: 4px 0;
  transition: opacity .15s, transform .1s;
}
.ct-social-btn:active { opacity: .7; transform: scale(.93); }
.ct-social-icon {
  width: 56px; height: 56px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ct-social-label {
  font-size: .72rem; font-weight: 600; color: var(--text2);
  white-space: nowrap;
}

/* Platform colours */
.ct-social-wa   .ct-social-icon { background: #25d366; }
.ct-social-fb   .ct-social-icon { background: #1877f2; }
.ct-social-x    .ct-social-icon { background: #000; }
.ct-social-ig   .ct-social-icon { background: linear-gradient(135deg, #f09433, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888); }
.ct-social-snap .ct-social-icon { background: #fffc00; }
.ct-social-snap .ct-social-icon svg { fill: #000; }
.ct-social-sms  .ct-social-icon { background: #34c759; }
.ct-social-email .ct-social-icon { background: #6366f1; }
.ct-social-copy  .ct-social-icon { background: var(--text); }
.ct-social-more  .ct-social-icon { background: var(--text2); }

/* Notice for Instagram/Snapchat copy-paste flow */
.ct-social-notice {
  display: flex; align-items: flex-start; gap: 8px;
  background: #fefce8; border: 1px solid #fde047;
  border-radius: var(--radius-sm); padding: 10px 12px;
  font-size: .8rem; color: #713f12; line-height: 1.45;
  margin-top: 4px;
}

/* ── Invite share (step 4) ── */
.ct-share-primary { display: flex; gap: 8px; }
.ct-share-big {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px 16px; border-radius: var(--radius-lg);
  border: 1.5px solid var(--border2); background: var(--bg3);
  cursor: pointer; font-family: var(--font-body);
  font-size: .85rem; font-weight: 700; color: var(--text);
  transition: all .12s;
}
.ct-share-big:active { transform: scale(.97); background: #1A1A2E; color: #fff; border-color: #1A1A2E; }
.ct-share-wa { background: #f0fdf4; border-color: #86efac; color: #166534; }
.ct-share-wa:active { background: #25d366; border-color: #25d366; color: #fff; }
.ct-share-secondary { display: flex; gap: 6px; margin-top: 8px; }
.ct-sections-summary {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px;
}
.ct-sections-summary-label {
  font-size: .72rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px;
}
.ct-sections-summary-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.ct-sections-summary-chip {
  font-size: .78rem; font-weight: 700;
  padding: 4px 12px; border-radius: 100px; border: 1px solid transparent;
}


/* ── Confetti (wizard celebration) ── */
.ct-celebrate {
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 24px 24px; text-align: center; position: relative;
}
.ct-celebrate-confetti {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: hidden;
}
.confetti-piece {
  position: absolute; top: -10px;
  animation: confetti-fall linear forwards;
}
@keyframes confetti-fall {
  0%   { top: -10px; opacity: 1; transform: rotate(0deg) translateX(0); }
  100% { top: 110%; opacity: 0; transform: rotate(720deg) translateX(40px); }
}
.ct-celebrate-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  font-size: 2rem; font-weight: 900; color: #fff;
  font-family: var(--font-display);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(0,0,0,.15);
  animation: celebrate-pop .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes celebrate-pop {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.ct-celebrate-title {
  font-size: 1.7rem; font-weight: 900; color: var(--text);
  font-family: var(--font-display); margin: 12px 0 4px;
}
.ct-celebrate-sub { font-size: .95rem; color: var(--text2); }
.ct-celebrate-groups {
  font-size: .82rem; color: var(--primary);
  font-weight: 700; margin-top: 4px;
  background: var(--primary-light); padding: 4px 14px; border-radius: 100px;
}

/* ── Sport list (step 2) ── */
.ct-sport-search-bar {
  padding: 8px 16px 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.ct-sport-list-scroll {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  background: var(--bg2);
}
.ct-sport-list-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: none; border-left: none; border-right: none; border-top: none;
  cursor: pointer; font-family: var(--font-body); width: 100%;
  text-align: left; transition: background .1s;
}
.ct-sport-list-row:active { background: var(--bg3); }
.ct-sport-list-row.active { background: var(--primary-light); }
.ct-sport-list-row.active .ct-sport-list-label { font-weight: 700; color: var(--primary-dark); }
.ct-sport-list-row.active svg { stroke: var(--primary); }
.ct-sport-list-label { flex: 1; font-size: .95rem; font-weight: 500; color: var(--text); }
.ct-sport-custom-row { color: var(--muted); border-top: 1px solid var(--border); }
.ct-sport-custom-row .ct-sport-list-label { color: var(--muted); }

/* ── Post media ── */
.post-media-row {
  display: flex; gap: 8px; margin: 10px 0 4px;
}
.post-media-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: 100px; padding: 8px 16px;
  font-family: var(--font-body); font-size: .82rem;
  font-weight: 600; color: var(--text2); cursor: pointer;
  position: relative; transition: all .12s;
}
.post-media-btn:active { background: var(--primary-light); border-color: var(--primary); }
.post-media-preview {
  display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0;
}
.post-media-thumb {
  width: 80px; height: 80px; object-fit: cover;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
}
.post-media-note {
  font-size: .78rem; color: var(--muted);
  background: var(--bg3); padding: 8px 12px;
  border-radius: var(--radius-sm); margin: 8px 0;
}

/* ── Settings toggle ── */
.settings-toggle {
  width: 44px; height: 26px; border-radius: 13px;
  background: var(--border2); position: relative;
  flex-shrink: 0; transition: background .2s;
}
.settings-toggle::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px;
  transition: transform .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.settings-toggle.on { background: var(--primary); }
.settings-toggle.on::after { transform: translateX(18px); }

/* ── Invite code link hint ── */
.invite-code-link-hint {
  display: block; font-size: .7rem; color: var(--muted);
  margin-top: 4px; font-weight: 500;
}


/* ── Personal Training Booking ── */
.booking-screen { display: flex; flex-direction: column; gap: 4px; }
.booking-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.booking-header h3 { margin: 0; }
.booking-desc { font-size: .82rem; color: var(--muted); margin: 0 0 12px; }
.booking-slots { display: flex; flex-direction: column; gap: 10px; }
.booking-slot-card {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.booking-slot-header { display: flex; justify-content: space-between; gap: 12px; }
.booking-slot-label { font-size: .95rem; font-weight: 700; color: var(--text); }
.booking-slot-meta { font-size: .78rem; color: var(--muted); margin-top: 2px; }
.booking-slot-notes { font-size: .78rem; color: var(--text2); margin-top: 4px; font-style: italic; }
.booking-slot-price {
  font-size: 1.1rem; font-weight: 900; color: var(--primary);
  flex-shrink: 0; font-family: var(--font-display);
}
.booking-slot-footer { display: flex; align-items: center; justify-content: space-between; }
.booking-spots { font-size: .78rem; color: var(--muted); font-weight: 500; }
.booking-booked { color: var(--danger) !important; }

.form-row { display: flex; gap: 10px; margin: 0; }


/* ── Running late button ── */
.running-late-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--yellow-bg,#fefce8); border: 1px solid var(--yellow-border,#fde047);
  border-radius: 100px; padding: 9px 16px;
  font-family: var(--font-body); font-size: .82rem; font-weight: 600;
  color: #713f12; cursor: pointer; transition: all .12s;
  width: 100%; justify-content: center; margin-top: 4px;
}
.running-late-btn:active { background: #fde047; transform: scale(.98); }

/* ── Mark all + mark in row ── */
.mark-in-row { display: flex; gap: 8px; align-items: center; }
.mark-in-open-btn {
  flex: 1; display: flex; align-items: center; gap: 7px;
  background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: var(--radius); padding: 10px 14px;
  font-family: var(--font-body); font-size: .85rem; font-weight: 600;
  color: var(--text2); cursor: pointer; transition: all .12s;
}
.mark-in-open-btn:active { background: var(--primary-light); }
.mark-all-btn {
  background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius); padding: 10px 14px;
  font-family: var(--font-body); font-size: .82rem; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: all .12s;
}
.mark-all-btn:active { background: var(--primary-dark); transform: scale(.97); }

/* ── Match report ── */
.match-report-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: var(--radius); padding: 10px 14px;
  font-family: var(--font-body); font-size: .85rem; font-weight: 600;
  color: var(--text2); cursor: pointer; width: 100%; transition: all .12s;
}
.match-report-btn:active { background: var(--primary-light); }
.match-score-badge {
  background: var(--primary); color: #fff;
  border-radius: 100px; padding: 2px 10px;
  font-size: .75rem; font-weight: 800; margin-left: auto;
}
.match-report-public {
  background: var(--bg3); border-radius: var(--radius);
  padding: 12px 14px; text-align: center;
}
.match-report-score {
  font-size: 2rem; font-weight: 900; color: var(--text);
  font-family: var(--font-display); letter-spacing: .05em;
}
.player-rating-list { display: flex; flex-direction: column; gap: 6px; }
.player-rating-row { display: flex; align-items: center; gap: 10px; }
.player-rating-name { flex: 1; font-size: .85rem; font-weight: 500; color: var(--text); }
.player-rating-stars { display: flex; gap: 2px; }
.star-btn {
  background: none; border: none; cursor: pointer;
  font-size: 1.2rem; color: var(--border2); transition: color .1s;
}
.star-btn.active { color: #f59e0b; }

/* ── Competition details ── */
.comp-detail-card {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 14px; margin: 8px 0;
}
.comp-detail-title {
  font-size: .8rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px;
}
.comp-player-list { display: flex; flex-direction: column; gap: 8px; }
.comp-player-row { display: flex; align-items: center; gap: 8px; }
.comp-player-name { flex: 1; font-size: .85rem; font-weight: 600; color: var(--text); min-width: 80px; }
.comp-time-input { width: 90px !important; font-size: .8rem !important; padding: 7px 8px !important; }
.comp-opp-input  { flex: 1; font-size: .8rem !important; padding: 7px 8px !important; }
.comp-my-detail { display: flex; flex-direction: column; gap: 6px; }
.comp-my-detail span { font-size: .88rem; color: var(--text); }

/* ── Belt progress ── */
/* (uses existing modal styles) */


/* ── Belt progress display ── */
.belt-progress-display { margin-top: 4px; }
.belt-badge {
  display: inline-block; background: var(--bg3);
  border: 1.5px solid var(--border2); border-radius: 100px;
  padding: 4px 14px; font-size: .82rem; font-weight: 700; color: var(--text);
}
/* ── Training videos ── */
.video-list { display: flex; flex-direction: column; gap: 10px; }
.video-card { display: flex; gap: 12px; align-items: center; }
.video-thumb {
  width: 72px; height: 52px; border-radius: var(--radius-sm);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.video-duration {
  position: absolute; bottom: 3px; right: 4px;
  font-size: .62rem; font-weight: 700; color: #fff;
  background: rgba(0,0,0,.6); padding: 1px 5px; border-radius: 4px;
}
.video-info { flex: 1; }
.video-title { font-size: .88rem; font-weight: 700; color: var(--text); }
.video-meta  { font-size: .72rem; color: var(--muted); margin-top: 2px; }
.video-quota { font-size: .78rem; color: var(--muted); margin-bottom: 8px; }

/* ── Kit allocation ── */
.kit-alloc-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
.kit-alloc-row { display: flex; align-items: center; gap: 8px; }
.kit-alloc-name { flex: 1; font-size: .85rem; font-weight: 600; color: var(--text); }
.kit-alloc-input {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 6px 8px;
  font-family: var(--font-body); font-size: .82rem; color: var(--text);
}
.kit-alloc-paid { font-size: .72rem; font-weight: 700; padding: 3px 8px;
  border-radius: 100px; background: var(--bg3); color: var(--muted); white-space: nowrap; }
.kit-alloc-paid.paid { background: #dcfce7; color: #166534; }
.kit-my-alloc { display: flex; flex-direction: column; gap: 8px; }
.kit-my-item { display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; background: var(--bg3); border-radius: var(--radius); }
.kit-my-label { font-size: .82rem; color: var(--muted); font-weight: 600; }
.kit-my-val { font-size: 1rem; font-weight: 800; color: var(--text); }
.kit-paid-badge { text-align: center; color: #166534; background: #dcfce7;
  border-radius: var(--radius); padding: 10px; font-weight: 700; }

/* ── Lift share ── */
.lift-section-label { font-size: .72rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .05em; margin: 4px 0 6px; }
.lift-card { background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 6px; }
.lift-offer { border-left: 3px solid var(--primary); }
.lift-need  { border-left: 3px solid #f97316; }
.lift-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.lift-card-name { font-size: .88rem; font-weight: 700; color: var(--text); }
.lift-card-from { font-size: .75rem; color: var(--muted); }
.lift-seats { margin-left: auto; font-size: .8rem; font-weight: 700;
  background: var(--primary-light); color: var(--primary-dark);
  padding: 2px 10px; border-radius: 100px; }
.lift-note { font-size: .8rem; color: var(--text2); margin-top: 4px; }
.lift-contact-btn { display: inline-block; margin-top: 8px; font-size: .78rem;
  font-weight: 700; color: var(--primary); text-decoration: none; cursor: pointer; }
.lift-type-row { display: flex; gap: 8px; margin-bottom: 4px; }
.lift-type-btn { flex: 1; padding: 10px; background: var(--bg3);
  border: 1.5px solid var(--border2); border-radius: var(--radius);
  font-family: var(--font-body); font-size: .82rem; font-weight: 600;
  color: var(--text2); cursor: pointer; transition: all .12s; }
.lift-type-btn.active { background: var(--primary-light); border-color: var(--primary);
  color: var(--primary-dark); font-weight: 700; }
.lift-share-event-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: var(--radius); padding: 10px 14px; width: 100%;
  font-family: var(--font-body); font-size: .85rem; font-weight: 600;
  color: var(--text2); cursor: pointer; margin-top: 4px; transition: all .12s;
}
.lift-share-event-btn:active { background: var(--primary-light); }

/* ── Toggle row ── */
.toggle-row { display: flex; align-items: center; gap: 8px;
  font-size: .88rem; color: var(--text2); cursor: pointer; padding: 4px 0; }

/* ─────────────────────────────────────────────────────────────────────────────
   AUTH SCREENS
───────────────────────────────────────────────────────────────────────────── */
.auth-screen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px 28px max(40px, calc(var(--safe-bottom) + 20px));
  max-width: 420px;
  margin: 0 auto;
  width: 100%;
  gap: 16px;
  position: relative;
  overflow-y: auto;
}

.auth-hero { text-align: center; margin-bottom: 4px; }

.logo-mark {
  font-size: 56px; line-height: 1;
  margin-bottom: 12px; display: block;
  filter: drop-shadow(0 4px 16px #00BFA540);
  animation: none;
}

@keyframes pulse-glow {
  0%,100% { filter: drop-shadow(0 4px 16px #00BFA540); }
  50%      { filter: drop-shadow(0 4px 28px #00BFA580); }
}

.brand-name {
  font-family: var(--font-display);
  font-size: 2.6rem; font-weight: 900; letter-spacing: -1px;
  background: linear-gradient(135deg, #009688 0%, #00BFA5 50%, #4A90D9 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.brand-tagline { color: var(--text2); font-size: 1rem; margin-top: 4px; }

.auth-features { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.feature-pill {
  background: var(--primary-light);
  border: 1px solid #00BFA530;
  padding: 6px 14px; border-radius: 100px;
  font-size: .82rem; font-weight: 600; color: var(--primary-dark);
}

.auth-actions { display: flex; flex-direction: column; gap: 10px; }

.auth-form-header { text-align:left; }
.auth-form-header h2 {
  font-family:var(--font-display);
  font-size:1.7rem; font-weight:800;
  margin-bottom:4px;
}
.auth-form-header p { color:var(--text2); font-size:.9rem; }

.check-email {
  text-align:center;
  display:flex; flex-direction:column;
  align-items:center; gap:16px;
}
.big-emoji { font-size:64px; }
.check-email h2 { font-family:var(--font-display); font-size:1.6rem; }
.check-email p  { color:var(--text2); }

.back-btn {
  background:none; border:none;
  color:var(--primary); cursor:pointer;
  font-size:.9rem; font-family:var(--font-body);
  text-align:left; padding:0;
  align-self:flex-start;
}

.divider {
  display:flex; align-items:center; gap:12px;
  color:var(--muted); font-size:.8rem;
}
.divider::before, .divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}

/* OTP Grid */
.otp-grid {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
}
.otp-input {
  background:var(--bg3); border:2px solid var(--border2);
  border-radius:var(--radius-sm);
  color:var(--text); font-size:1.4rem; font-weight:700;
  text-align:center; padding:12px 4px;
  outline:none; width:100%;
  transition:border-color .15s;
}
.otp-input:focus { border-color:var(--primary); }

/* Avatar picker */
.avatar-picker {
  display:flex; justify-content:center;
  cursor:pointer;
}
.avatar-placeholder {
  width:88px; height:88px;
  border-radius:50%;
  background:var(--bg3);
  border:2px dashed var(--border2);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-size:1.4rem; color:var(--muted);
  gap:2px; transition:border-color .2s;
}
.avatar-placeholder:hover { border-color:var(--primary); }
.avatar-placeholder small { font-size:.65rem; }

.legal-note { font-size:.75rem; color:var(--muted); text-align:center; }
.legal-note a { color:var(--primary); text-decoration:none; }

/* ── Welcome screen extras ── */
.welcome-screen {
  gap: 0;
  justify-content: flex-start;
  padding-top: 0;
  overflow-y: auto;
  animation: wc-fade-in .4s ease both;
}
@keyframes wc-fade-in {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Hero */
.welcome-hero {
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  padding: 56px 24px 28px;
  gap: 8px;
}
.welcome-logo {
  width: 72px; height: 72px;
  background: var(--primary-light);
  border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 8px;
  transition: transform .2s cubic-bezier(.34,1.56,.64,1);
}
.welcome-logo:hover { transform: scale(1.06); }

/* Sports text strip */
.welcome-sports-text {
  display: flex; align-items: center; justify-content: center;
  flex-wrap: wrap; gap: 4px 8px;
  padding: 0 24px 28px;
  font-size: .82rem; font-weight: 500; color: var(--muted);
}
.welcome-sports-text .dot { color: var(--border2); }

/* CTAs */
.welcome-cta-stack {
  display: flex; flex-direction: column; gap: 10px;
  padding: 0 24px 20px;
}

/* Social row — compact 3 buttons */
.welcome-social-row {
  display: flex; align-items: center; gap: 8px;
  padding: 0 24px 20px;
}
.welcome-social-label {
  font-size: .75rem; color: var(--muted);
  white-space: nowrap; flex-shrink: 0;
}
.btn-social {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 10px 8px;
  border-radius: 100px; border: 1.5px solid var(--border2);
  background: var(--bg2); cursor: pointer;
  font-family: var(--font-body);
  font-size: .8rem; font-weight: 600; color: var(--text);
  transition: background .12s, transform .1s;
}
.btn-social:active {
  background: #1A1A2E; color: #fff;
  border-color: #1A1A2E;
  transform: scale(.96);
}
.btn-social-apple { background: #000; color: #fff; border-color: #000; }
.btn-social-apple:active { background: var(--primary); border-color: var(--primary); }

/* Demo button */
.welcome-demo-btn {
  display: block; width: 100%;
  background: none; border: none; cursor: pointer;
  font-family: var(--font-body);
  font-size: .82rem; font-weight: 500;
  color: var(--muted); padding: 10px 24px;
  text-align: center; transition: opacity .15s;
}
.welcome-demo-btn:active { opacity: .6; }

.welcome-demo-options {
  display: flex; flex-direction: column; gap: 0;
  padding: 0 24px 4px;
}
.welcome-demo-create {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: var(--radius-lg); padding: 14px 16px;
  cursor: pointer; font-family: var(--font-body);
  text-align: left; width: 100%;
  transition: background .1s, border-color .1s;
}
.welcome-demo-create:active {
  background: var(--primary-light); border-color: var(--primary);
}
.welcome-demo-create-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  background: var(--primary-light); color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.welcome-demo-create-title {
  font-size: .9rem; font-weight: 700; color: var(--text);
}
.welcome-demo-create-sub {
  font-size: .75rem; color: var(--muted); margin-top: 2px;
}

/* Footer */
.welcome-footer {
  padding: 8px 24px 32px;
  display: flex; flex-direction: column;
  align-items: center; gap: 8px; text-align: center;
}
.welcome-adfree {
  font-size: .75rem; color: var(--muted); font-weight: 500;
}

.welcome-logo-wrap {
  display: flex; justify-content: center; margin-bottom: 4px;
}










/* ── Login method cards ── */
.login-method-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
}
.login-method-icon  { font-size: 1.5rem; flex-shrink: 0; }
.login-method-title { font-size: .88rem; font-weight: 700; color: var(--text); }
.login-method-sub   { font-size: .75rem; color: var(--muted); margin-top: 1px; }

/* ── Onboarding screen ── */
.onboarding-hero { text-align: center; padding: 8px 0 4px; }
.onboarding-title {
  font-family: var(--font-display); font-size: 1.6rem;
  font-weight: 800; margin-top: 8px; color: var(--text);
}
.onboarding-sub { font-size: .9rem; color: var(--text2); margin-top: 4px; }

.onboarding-section { display: flex; flex-direction: column; gap: 10px; }
.onboarding-section-label {
  font-size: .78rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--muted);
}
.onboarding-name-row {
  display: flex; align-items: center; gap: 12px;
}
.avatar-picker-inline {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--primary-light); border: 2px dashed #00BFA560;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; cursor: pointer; flex-shrink: 0;
  transition: border-color .15s;
}
.avatar-picker-inline:hover { border-color: var(--primary); }

.onboarding-role-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.onboarding-role-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  background: var(--bg2); border: 2px solid var(--border2);
  border-radius: var(--radius-lg); padding: 14px 8px;
  cursor: pointer; font-family: var(--font-body);
  transition: all .15s;
}
.onboarding-role-btn.active {
  background: var(--primary-light);
  border-color: var(--primary);
}
.onboarding-role-icon { font-size: 1.5rem; color: var(--text2); }
.onboarding-role-label {
  font-size: .72rem; font-weight: 700;
  color: var(--text2);
}
.onboarding-role-btn.active .onboarding-role-label { color: var(--primary-dark); }
.onboarding-role-note {
  font-size: .75rem; color: var(--muted); text-align: center;
  margin-top: -4px;
}

/* ─────────────────────────────────────────────────────────────────────────────
   FORM ELEMENTS
───────────────────────────────────────────────────────────────────────────── */
.form-group { display:flex; flex-direction:column; gap:6px; }

.input {
  width: 100%;
  background: var(--bg3);
  border: 1.5px solid transparent;
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-body);
  font-size: .95rem;
  padding: 14px 16px;
  outline: none;
  transition: border-color .15s, background .15s, box-shadow .15s;
  -webkit-appearance: none;
}
.input:focus {
  border-color: var(--primary);
  background: var(--bg2);
