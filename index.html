  box-shadow: 0 0 0 3px #00BFA512;
}
.input::placeholder { color: var(--muted); }
.textarea { resize: vertical; min-height: 88px; line-height: 1.55; }
.form-label {
  font-size: .8rem; font-weight: 600;
  color: var(--text2); margin-bottom: 4px;
}
.form-label-hint { font-weight: 400; color: var(--muted); }

/* ─────────────────────────────────────────────────────────────────────────────
   BUTTONS — Black default, teal on active press
───────────────────────────────────────────────────────────────────────────── */
.btn {
  border: none; border-radius: 100px;
  cursor: pointer; font-family: var(--font-body);
  font-size: .95rem; font-weight: 700;
  padding: 15px 24px;
  transition: background .15s, transform .12s cubic-bezier(.34,1.56,.64,1), color .15s;
  display: flex; align-items: center; justify-content: center;
  gap: 8px; width: 100%;
  -webkit-appearance: none;
  letter-spacing: -.01em;
}
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* Primary = black → teal on press */
.btn-primary {
  background: #1A1A2E;
  color: #fff;
}
.btn-primary:active {
  background: var(--primary);
  transform: scale(.97);
}

/* Secondary = dark grey → teal on press */
.btn-secondary {
  background: #2d2d3a;
  color: #fff;
}
.btn-secondary:active {
  background: var(--primary);
  transform: scale(.97);
}

/* Ghost = outlined black → teal fill on press */
.btn-ghost {
  background: transparent;
  color: var(--text);
  border: 1.5px solid var(--border2);
}
.btn-ghost:active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  transform: scale(.97);
}

/* Success */
.btn-success {
  background: #1A1A2E; color: #fff;
}
.btn-success:active { background: var(--success); transform: scale(.97); }

.btn-sm { padding: 10px 20px; font-size: .875rem; width: auto; }

/* Welcome-specific CTAs */
.btn-black {
  background: #1A1A2E; color: #fff;
}
.btn-black:active { background: var(--primary); transform: scale(.97); }

.btn-outline-black {
  background: transparent;
  color: #1A1A2E;
  border: 2px solid #1A1A2E;
}
.btn-outline-black:active {
  background: #1A1A2E; color: #fff;
  transform: scale(.97);
}

/* ─────────────────────────────────────────────────────────────────────────────
   APP SHELL
───────────────────────────────────────────────────────────────────────────── */
.app-shell {
  display:flex; flex-direction:column;
  height:100dvh; overflow:hidden;
  position:relative;
}

.app-header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.header-team {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; padding: 4px 8px 4px 4px;
  border-radius: 100px;
  transition: background .15s;
}
.header-team:active { background: var(--bg3); }
.team-avatar-sm {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: .9rem; color: #fff;
  flex-shrink: 0;
}
.header-team-info { display: flex; flex-direction: column; }
.header-team-name { font-weight: 700; font-size: .95rem; line-height: 1.2; color: var(--text); }
.header-switch { font-size: .68rem; color: var(--muted); }
.header-actions { display: flex; gap: 4px; align-items: center; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 1.1rem;
  transition: background .15s;
}
.icon-btn:active { background: var(--bg3); }
.pro-badge {
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: #fff; font-size: .68rem; font-weight: 800;
  padding: 3px 9px; border-radius: 100px;
  letter-spacing: .04em;
}
.pro-badge-trial {
  background: linear-gradient(135deg, #8b5cf6, #7c3aed);
}

/* Team switcher dropdown */
.team-switcher {
  position:absolute; top:calc(var(--safe-top) + 58px); left:12px;
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--radius-lg); overflow:hidden;
  z-index:100; min-width:220px;
  box-shadow: 0 8px 32px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.08);
  animation: fadeSlideDown .15s ease;
}
.team-switcher.hidden { display:none; }
.switcher-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; cursor:pointer;
  transition:background .1s;
}
.switcher-row:hover { background:var(--bg3); }
.switcher-row.active { background:var(--primary-glow); }
.switcher-avatar {
  width:36px; height:36px;
  background:var(--primary); border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  font-weight:800; color:#fff; font-size:.9rem;
}

@keyframes fadeSlideDown {
  from { opacity:0; transform:translateY(-8px); }
  to   { opacity:1; transform:translateY(0); }
}

.app-main {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding-bottom:8px;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
  min-height:0; /* critical for flex children to scroll */
}

/* ─────────────────────────────────────────────────────────────────────────────
   TAB BAR
───────────────────────────────────────────────────────────────────────────── */
.tab-bar {
  display: grid; grid-template-columns: repeat(4,1fr);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding-bottom: calc(var(--safe-bottom) + 2px);
  flex-shrink: 0; z-index: 50;
}
.tab-btn {
  background: none; border: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 4px 7px; gap: 3px;
  cursor: pointer; position: relative;
  -webkit-tap-highlight-color: transparent;
  min-height: 56px;
}
.tab-icon {
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  transition: color .15s, transform .15s cubic-bezier(.34,1.56,.64,1);
}
.tab-icon svg { display: block; width: 24px; height: 24px; }
.tab-btn.active .tab-icon { color: var(--primary); }
.tab-btn:active .tab-icon {
  color: var(--primary);
  transform: scale(0.9);
}
.tab-label {
  font-size: .62rem; font-weight: 600;
  color: var(--muted); transition: color .15s;
}
.tab-btn.active .tab-label { color: var(--primary); font-weight: 700; }
.tab-btn.active::after {
  content: '';
  position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 2.5px;
  background: var(--primary); border-radius: 2px 2px 0 0;
}
.tab-emoji { display: none; }

/* ─────────────────────────────────────────────────────────────────────────────
   FEED / POSTS
───────────────────────────────────────────────────────────────────────────── */
.post-card {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 16px 12px;
  display: flex; flex-direction: column; gap: 10px;
}
  padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
  animation: fadeIn .2s ease;
}
.post-card:last-child { margin-bottom: 8px; }
.post-author {
  display:flex; align-items:center; gap:10px; margin-bottom:10px;
}
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 800; color: #fff; font-size: .95rem;
  flex-shrink: 0;
}
.avatar-sm { width: 30px; height: 30px; font-size: .72rem; }
.post-meta { flex:1; }
.post-author-name { font-weight:600; font-size:.9rem; display:block; }
.post-time { font-size:.75rem; color:var(--muted); }
.pin-badge { font-size:.72rem; color:var(--warning); }
.post-text { font-size:.93rem; line-height:1.6; color:var(--text); margin-bottom:12px; }
.reaction-bar {
  display:flex; flex-wrap:wrap; align-items:center;
  gap:8px; padding-top:8px;
  border-top:1px solid var(--border);
}
.reactions-existing { display:flex; flex-wrap:wrap; gap:6px; flex:1; }
.reaction-chip {
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:100px; padding:4px 10px;
  font-size:.8rem; cursor:pointer;
  transition:background .1s, border-color .1s;
}
.reaction-chip.mine {
  background:var(--primary-glow);
  border-color:var(--primary);
}
.quick-react { display:flex; gap:2px; }
.emoji-btn {
  background:none; border:none; cursor:pointer;
  font-size:1.1rem; padding:6px;
  border-radius:var(--radius-sm);
  min-width:36px; min-height:36px;
  display:inline-flex; align-items:center; justify-content:center;
  transition:backgroundd .1s;
}
.emoji-btn:hover { background:var(--bg3); }
.post-stats { font-size:.75rem; color:var(--muted); display:flex; gap:8px; }

/* ─────────────────────────────────────────────────────────────────────────────
   SCHEDULE / EVENTS
───────────────────────────────────────────────────────────────────────────── */
.section-label {
  padding: 20px 16px 8px;
  font-size: 1.05rem;
  font-weight: 800;
  font-family: var(--font-display);
  color: var(--text);
  letter-spacing: -.01em;
}
.event-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg2);
  padding: 14px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
  animation: fadeIn .2s ease;
}
.event-card:active { background: var(--bg3); }
.event-card.today  {
  background: linear-gradient(to right, var(--primary-light), var(--bg2));
  border-left: 3px solid var(--primary);
  padding-left: 13px;
}
.event-card.derby {
  background: linear-gradient(to right, #fff5f5, var(--bg2));
  border-left: 3px solid #dc2626;
  padding-left: 13px;
}
.event-date {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-width: 44px; flex-shrink: 0;
}
.event-month { font-size: .68rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .04em; }
.event-day   { font-size: 1.6rem; font-weight: 900; line-height: 1; font-family: var(--font-display); color: var(--text); }
.event-info  { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
.event-title-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.event-title { font-weight: 600; font-size: .95rem; color: var(--text); }
.event-type-badge {
  font-size: .68rem; background: var(--bg3);
  border-radius: 100px; padding: 2px 8px; color: var(--text2);
  text-transform: capitalize;
}
.event-time     { font-size: .8rem; color: var(--text2); }
.event-location { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-rsvp-status { font-size: 1.2rem; flex-shrink: 0; }
.rsvp-dot { font-size: .9rem; }

/* ─────────────────────────────────────────────────────────────────────────────
   CHAT
───────────────────────────────────────────────────────────────────────────── */
.chat-list { display: flex; flex-direction: column; background: var(--bg2); }
.chat-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.chat-row:active { background: var(--bg3); }
.chat-icon {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--primary-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; flex-shrink: 0;
  color: var(--primary);
}
.chat-info { flex:1; min-width:0; }
.chat-name    { font-weight:600; font-size:.93rem; margin-bottom:2px; }
.chat-preview { font-size:.8rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-chevron { color:var(--muted); }

/* Chat room */
.chat-room { display:flex; flex-direction:column; height:100%; }
.chat-room-header {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; border-bottom:1px solid var(--border);
  background:var(--bg); flex-shrink:0;
}
.back-btn-inline {
  background:none; border:none; color:var(--primary);
  cursor:pointer; font-size:.9rem; font-family:var(--font-body);
  padding:0;
}
.chat-room-name { font-weight:700; }
.messages-list {
  flex:1; overflow-y:auto; padding:12px;
  display:flex; flex-direction:column; gap:8px;
  -webkit-overflow-scrolling:touch;
}
.loading-msgs, .empty-msgs { text-align:center; color:var(--muted); padding:24px; font-size:.85rem; }
.msg-wrapper {
  display:flex; align-items:flex-end; gap:8px;
  animation:fadeIn .2s ease;
}
.msg-wrapper.me  { flex-direction:row-reverse; }
.msg-avatar { flex-shrink:0; }
.msg-bubble {
  max-width:72%; border-radius:var(--radius-lg);
  padding:10px 14px;
}
.bubble-me   { background:var(--primary); border-bottom-right-radius:4px; }
.bubble-them { background:var(--bg3); border:1px solid var(--border2); border-bottom-left-radius:4px; }
.msg-sender  { font-size:.72rem; color:var(--text2); margin-bottom:2px; }
.msg-text    { font-size:.9rem; line-height:1.4; word-break:break-word; }
.msg-time    { font-size:.65rem; color:rgba(255,255,255,.45); text-align:right; margin-top:3px; }
.bubble-them .msg-time { color:var(--muted); }
.message-input-bar {
  display:flex; gap:8px; padding:12px;
  border-top:1px solid var(--border);
  background:var(--bg); flex-shrink:0;
  padding-bottom:calc(12px + var(--safe-bottom));
}
.msg-input { margin:0; }
.send-btn {
  background:var(--primary); border:none; color:#fff;
  width:44px; height:44px; border-radius:50%; flex-shrink:0;
  font-size:1rem; cursor:pointer; display:flex;
  align-items:center; justify-content:center;
  transition:opacity .15s;
}
.send-btn:hover { opacity:.85; }

/* ─────────────────────────────────────────────────────────────────────────────
   PROFILE
───────────────────────────────────────────────────────────────────────────── */
.profile-page { display: flex; flex-direction: column; padding-bottom: 32px; }
/* ── Team Header Card ── */
.team-header-card {
  border-radius: var(--radius-xl);
  overflow: hidden;
  background: var(--bg2);
  border: 1px solid var(--border);
  margin-bottom: 12px;
  box-shadow: 0 2px 16px rgba(0,0,0,.06);
}

/* Background photo strip */
.team-header-bg {
  height: 110px;
  background-size: cover;
  background-position: center;
  position: relative;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 10px;
}
.team-bg-edit-btn {
  background: rgba(0,0,0,.45);
  border: none; border-radius: 100px;
  color: #fff; font-size: .82rem;
  padding: 5px 10px; cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background .15s;
}
.team-bg-edit-btn:hover { background: rgba(0,0,0,.65); }

/* Team logo circle */
.team-logo-wrap {
  display: flex;
  justify-content: center;
  margin-top: -36px;
  position: relative;
  z-index: 2;
}
.team-logo-circle {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--bg2);
  border: 4px solid var(--primary);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; overflow: hidden;
  transition: box-shadow .2s;
}
.team-logo-circle:hover .team-logo-edit-hint { opacity: 1; }
.team-logo-img {
  width: 100%; height: 100%;
  object-fit: cover; border-radius: 50%;
}
.team-logo-initial {
  font-family: var(--font-display);
  font-size: 1.8rem; font-weight: 800;
}
.team-logo-edit-hint {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; opacity: 0; transition: opacity .2s;
  border-radius: 50%;
}

/* Team name + sport */
.team-header-info {
  text-align: center; padding: 6px 16px 0;
}
.team-header-name {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 800; color: var(--text);
}
.team-header-sport {
  font-size: .75rem; color: var(--muted); margin-top: 2px;
}

/* Colour picker row */
.team-colour-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-top: 1px solid var(--border);
  margin-top: 8px;
}
.team-colour-label {
  font-size: .75rem; font-weight: 600; color: var(--text2);
  flex-shrink: 0;
}
.team-colour-swatches {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.team-colour-swatch {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid transparent;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  font-size: .65rem; color: #fff; font-weight: 700;
  transition: transform .12s, border-color .12s;
  position: relative;
}
.team-colour-swatch.active {
  border-color: var(--text);
  transform: scale(1.18);
}
.team-colour-custom {
  background: #666; overflow: hidden;
  font-size: .9rem;
}

/* Personal info strip at bottom of card */
.team-header-personal {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}
.personal-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: .95rem;
  font-weight: 800; color: #fff; flex-shrink: 0;
}
.personal-info { flex: 1; min-width: 0; }
.personal-name {
  font-size: .88rem; font-weight: 700; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.personal-email {
  font-size: .72rem; color: var(--muted); margin-top: 1px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.role-badge {
  font-size: .72rem; font-weight: 700; padding: 3px 10px;
  border-radius: 100px; text-transform: capitalize; flex-shrink: 0;
}
.role-admin  { background: #a78bfa22; color: #7c3aed; }
.role-coach  { background: var(--blue-light); color: var(--blue); }
.role-player { background: #d1fae5; color: #059669; }
.role-parent { background: #ffedd5; color: #ea580c; }
.role-member { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); }

.settings-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg2);
  padding: 14px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.settings-row:first-of-type { border-top: 1px solid var(--border); }
.settings-row:active { background: var(--bg3); }
.settings-row.danger .settings-row-label { color: var(--danger); }
.settings-row-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
  color: var(--text2);
}
.settings-row-text  { flex: 1; }
.settings-row-label { font-size: .93rem; font-weight: 500; color: var(--text); }
.settings-row-sub   { font-size: .78rem; color: var(--muted); margin-top: 1px; }
.settings-row-arrow { color: var(--muted); font-size: 1.1rem; }
.check-active { color: var(--primary); font-weight: 700; }

/* ── Demo banner (welcome screen) ── */
.demo-banner {
  background: var(--primary-light);
  border: 1.5px solid #00BFA540;
  border-radius: var(--radius-lg);
  padding: 4px;
}
.demo-banner-inner {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.6);
  border-radius: calc(var(--radius-lg) - 4px);
}
.demo-banner-icon { font-size: 1.6rem; flex-shrink: 0; }
.demo-banner-title { font-weight: 700; font-size: .95rem; color: var(--primary-dark); }
.demo-banner-sub   { font-size: .78rem; color: var(--primary); margin-top: 1px; opacity: .8; }
.btn-demo-go {
  margin-left: auto; flex-shrink: 0;
  background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius);
  padding: 10px 18px; font-weight: 700;
  font-size: .9rem; font-family: var(--font-body);
  cursor: pointer; transition: opacity .15s;
  white-space: nowrap;
}
.btn-demo-go:hover { opacity: .88; }

/* ── Guest banner (profile screen) ── */
.guest-banner {
  display: flex; align-items: center; gap: 12px;
  background: var(--primary-light);
  border: 1.5px solid #00BFA540;
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  margin-bottom: 8px;
}
.guest-banner-icon  { font-size: 1.4rem; }
.guest-banner-text  { flex: 1; }
.guest-banner-title { font-weight: 700; font-size: .9rem; color: var(--primary-dark); }
.guest-banner-sub   { font-size: .75rem; color: var(--primary); margin-top: 1px; opacity: .8; }
.btn-exit-demo {
  background: transparent; color: var(--primary-dark);
  border: 1.5px solid var(--primary);
  border-radius: var(--radius); padding: 7px 14px;
  font-weight: 600; font-size: .82rem;
  font-family: var(--font-body); cursor: pointer;
  transition: background .15s; white-space: nowrap;
}
.btn-exit-demo:hover { background: var(--primary-light); }

/* ── Setup checklist card ── */
.checklist-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--primary);
  border-radius: var(--radius-lg);
  margin: 12px 12px 4px;
  overflow: hidden;
  animation: fadeIn .25s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.checklist-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 12px;
  padding: 16px 16px 10px;
}
.checklist-title {
  font-family: var(--font-display);
  font-size: 1rem; font-weight: 800; color: var(--text);
  margin-bottom: 2px;
}
.checklist-sub { font-size: .78rem; color: var(--muted); }
.checklist-skip {
  background: none; border: 1px solid var(--border2);
  border-radius: 100px; padding: 5px 12px;
  font-size: .75rem; font-weight: 600; color: var(--muted);
  cursor: pointer; font-family: var(--font-body);
  white-space: nowrap; transition: border-color .15s;
  flex-shrink: 0;
}
.checklist-skip:hover { border-color: var(--text2); color: var(--text2); }

/* Progress bar */
.checklist-progress-track {
  height: 5px; background: var(--bg3);
  margin: 0 16px 12px;
  border-radius: 100px; overflow: hidden;
}
.checklist-progress-fill {
  height: 100%; background: var(--primary);
  border-radius: 100px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* Steps */
.checklist-steps { padding: 0 8px 8px; }
.checklist-step {
  display: flex; align-items: center; gap: 12px;
  width: 100%; background: none; border: none;
  padding: 11px 8px; border-radius: var(--radius);
  cursor: pointer; font-family: var(--font-body);
  text-align: left; transition: background .1s;
}
.checklist-step:not(.done):hover { background: var(--bg3); }
.checklist-step.done { opacity: .55; cursor: default; }
.checklist-step-icon { width: 20px; height: 20px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
.checklist-step-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--border2); background: var(--bg3);
}
.checklist-step-label {
  flex: 1; font-size: .88rem; font-weight: 600; color: var(--text);
}
.checklist-step.done .checklist-step-label { color: var(--muted); }
.checklist-step-arrow { color: var(--muted); font-size: 1.1rem; }

/* Tips section */
.checklist-tips {
  border-top: 1px solid var(--border);
  padding: 12px 16px 4px;
  background: var(--primary-light);
}
.checklist-tips-title {
  font-size: .7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); margin-bottom: 8px;
}
.checklist-tip-row {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: none; border: none;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  font-size: .88rem; color: var(--text); cursor: pointer;
  font-family: var(--font-body); text-align: left;
  transition: color .1s;
}
.checklist-tip-row:last-child { border-bottom: none; }
.checklist-tip-row:hover { color: var(--primary); }
.checklist-tip-arrow { color: var(--muted); font-size: 1.1rem; }

/* ── 3-tier pricing grid ── */
.plans-tiers-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding-top: 12px; /* space for absolute badge overflow */
}

.plans-tier-card {
  background: var(--bg2); border: 1.5px solid var(--border2);
  border-radius: var(--radius-lg); padding: 14px 10px;
  display: flex; flex-direction: column; gap: 8px;
  position: relative; overflow: visible;
  transition: border-color .15s;
}
.plans-tier-card:hover { border-color: var(--primary); }
.plans-tier-card-featured {
  background: var(--primary-light);
  border-color: var(--primary);
  box-shadow: 0 2px 12px #00BFA520;
}

.plans-tier-badge {
  position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  background: var(--primary); color: #fff;
  border-radius: 100px; padding: 2px 10px;
  font-size: .68rem; font-weight: 800; letter-spacing: .04em;
  white-space: nowrap;
}
.plans-tier-card-featured .plans-tier-badge {
  background: var(--primary-dark);
}

.plans-tier-header { text-align: center; }
.plans-tier-name {
  font-size: .78rem; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px;
}
.plans-tier-card-featured .plans-tier-name { color: var(--primary-dark); }

.plans-tier-price {
  display: flex; flex-direction: column; align-items: center;
}
.plans-tier-amount {
  font-family: var(--font-display); font-size: 1.3rem; font-weight: 800;
  color: var(--text); line-height: 1;
}
.plans-tier-card-featured .plans-tier-amount { color: var(--primary-dark); }
.plans-tier-period {
  font-size: .65rem; color: var(--muted); margin-top: 2px;
}

.plans-tier-tagline {
  font-size: .68rem; color: var(--muted); text-align: center; line-height: 1.3;
}
.plans-tier-card-featured .plans-tier-tagline { color: var(--primary); }

.plans-tier-btn {
  width: 100%; background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: var(--radius); padding: 9px 6px;
  font-size: .72rem; font-weight: 700; color: var(--text);
  cursor: pointer; font-family: var(--font-body);
  transition: all .15s; text-align: center;
}
.plans-tier-btn:hover { border-color: var(--primary); color: var(--primary); }
.plans-tier-btn-featured {
  background: var(--primary); color: #fff; border-color: var(--primary);
}
.plans-tier-btn-featured:hover { background: var(--primary-dark); border-color: var(--primary-dark); }

/* ── Plans screen ── */
.plans-screen {
  display: flex; flex-direction: column; gap: 14px;
  padding-bottom: 8px;
}
.plans-header { text-align: center; padding: 4px 0 0; }
.plans-trigger-badge {
  display: inline-block;
  background: #FFF3CD; border: 1px solid var(--yellow-border);
  border-radius: 100px; padding: 4px 12px;
  font-size: .75rem; color: var(--yellow-text);
  margin-bottom: 10px;
}
.plans-title {
  font-family: var(--font-display);
  font-size: 1.3rem; font-weight: 800; color: var(--text);
  margin-bottom: 4px;
}
.plans-subtitle { font-size: .85rem; color: var(--muted); line-height: 1.5; }

.plans-trial-banner {
  background: var(--yellow-bg); border: 1.5px solid var(--yellow-border);
  border-radius: var(--radius); padding: 10px 14px;
  font-size: .88rem; color: var(--yellow-text); text-align: center;
}
.plans-trial-note {
  text-align: center; font-size: .75rem; color: var(--muted); margin-top: -6px;
}
.plans-non-admin-note {
  background: var(--bg3); border-radius: var(--radius);
  padding: 12px 14px; font-size: .85rem; color: var(--muted);
  text-align: center;
}

/* Free tier rows */
.plans-free-list { display: flex; flex-direction: column; gap: 6px; }
.plans-free-row {
  display: flex; align-items: center; gap: 8px;
  font-size: .83rem; color: var(--text2);
}
.plans-free-check { color: var(--success); font-weight: 700; flex-shrink: 0; }

/* ── Pro badge variants ── */
.pro-badge-trial {
  background: linear-gradient(135deg, #f59e0b, #d97706) !important;
  cursor: pointer;
  animation: pulse-trial 2s ease-in-out infinite;
}
@keyframes pulse-trial {
  0%,100% { box-shadow: 0 0 0 0 #f59e0b40; }
  50%      { box-shadow: 0 0 0 6px #f59e0b00; }
}

/* Unlock Pro button in header (non-Pro admins only) */
.pro-unlock-btn {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; border: none; border-radius: 100px;
  padding: 4px 10px; font-size: .68rem; font-weight: 700;
  cursor: pointer; font-family: var(--font-body);
  white-space: nowrap; transition: opacity .15s;
}
.pro-unlock-btn:hover { opacity: .88; }

/* Lock icon on Pro-gated settings rows */
.pro-lock-icon { font-size: .85rem; color: var(--muted); }

/* ── Seen-by avatar stack ── */
.seen-by-row {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 2px; font-family: var(--font-body);
}
.seen-by-count { font-size: .75rem; color: var(--muted); }
.seen-avatar-stack {
  display: flex;
}
.seen-avatar {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--primary-glow); border: 1.5px solid var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: .68rem; font-weight: 700; color: var(--primary);
  margin-left: -5px; flex-shrink: 0;
}
.seen-avatar:first-child { margin-left: 0; }
.seen-avatar-extra {
  background: var(--bg3); color: var(--muted); border-color: var(--border2);
}

/* Seen-by row inside event detail */
.event-seen-row {
  display: flex; align-items: center; gap: 8px;
  width: 100%; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 10px 12px;
  cursor: pointer; font-family: var(--font-body);
  transition: background .1s;
}
.event-seen-row:hover { background: var(--bg2); }
.event-seen-label { flex: 1; font-size: .82rem; color: var(--text2); text-align: left; }
.seen-chevron { color: var(--muted); font-size: 1rem; }
.event-seen-simple {
  font-size: .78rem; color: var(--muted);
  text-align: center; padding: 4px 0;
}

/* Seen-by modal list */
.seenby-section-label {
  font-size: .7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; padding: 2px 0;
}
.seenby-seen-label   { color: var(--success); }
.seenby-unseen-label { color: var(--muted); }
.seenby-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.seenby-row:last-child { border-bottom: none; }
.seenby-row-unseen { opacity: .55; }
.seenby-name { font-size: .88rem; font-weight: 500; color: var(--text); }

/* ── Volunteer roster ── */
.volunteer-section {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); overflow: hidden;
}
.volunteer-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
}
.volunteer-title { font-size: .85rem; font-weight: 700; color: var(--text); }
.volunteer-count { font-size: .75rem; color: var(--muted); }

.volunteer-slot {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.volunteer-slot:last-child { border-bottom: none; }
.volunteer-slot.mine   { background: var(--primary-glow); }
.volunteer-slot.taken  { opacity: .7; }
.volunteer-slot-info   { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.volunteer-slot-label  { font-size: .88rem; font-weight: 600; color: var(--text); }
.volunteer-slot-claimer{ font-size: .75rem; color: var(--primary); }
.volunteer-slot-open   { font-size: .75rem; color: var(--success); }

.volunteer-slot-btn {
  border: none; border-radius: var(--radius-sm);
  padding: 6px 12px; font-size: .78rem; font-weight: 700;
  cursor: pointer; font-family: var(--font-body);
  white-space: nowrap; transition: all .15s;
}
.volunteer-slot-btn.claim {
  background: var(--primary-glow); color: var(--primary);
  border: 1px solid var(--primary);
}
.volunteer-slot-btn.claim:hover { background: var(--primary); color: #fff; }
.volunteer-slot-btn.unclaim {
  background: #ef444420; color: var(--danger);
  border: 1px solid var(--danger);
}
.volunteer-slot-btn.taken-btn {
  background: var(--bg3); color: var(--muted);
  border: 1px solid var(--border2);
  cursor: default;
}

.volunteer-add-btn {
  width: 100%; background: none; border: 1.5px dashed var(--border2);
  border-radius: var(--radius); padding: 10px;
  color: var(--muted); font-size: .85rem; font-weight: 600;
  cursor: pointer; font-family: var(--font-body);
  transition: border-color .15s;
}
.volunteer-add-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── Members screen — grouped ── */
.members-screen-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.members-count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg3); border-radius: 100px;
  padding: 1px 8px; font-size: .75rem;
  color: var(--muted); font-family: var(--font-body);
  font-weight: 600; margin-left: 6px;
  vertical-align: middle;
}
.members-invite-btn {
  background: var(--primary-glow); color: var(--primary);
  border: 1px solid var(--primary); border-radius: 100px;
  padding: 6px 14px; font-size: .78rem; font-weight: 700;
  cursor: pointer; font-family: var(--font-body);
  transition: background .15s;
}
.members-invite-btn:hover { background: var(--primary); color: #fff; }
.members-group-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--muted); padding: 12px 0 4px;
}
.member-row-tap { cursor: pointer; transition: background .1s; border-radius: var(--radius-sm); }
.member-row-tap:hover { background: var(--bg3); }
.member-sub-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 2px;
}
.member-number   { font-size: .72rem; font-weight: 700; color: var(--primary); }
.member-position { font-size: .72rem; color: var(--muted); }
.member-medical-dot  { font-size: .8rem; }
.member-guardian-tag {
  font-size: .68rem; color: var(--muted);
  background: var(--bg3); border-radius: 100px; padding: 1px 6px;
}
.member-chevron { color: var(--muted); font-size: 1.1rem; }
.member-you-tag { font-size: .72rem; color: var(--muted); margin-left: 4px; }

/* ── Member detail ── */
.member-detail { display: flex; flex-direction: column; gap: 12px; }
.member-detail-hero {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 8px 0 12px;
  border-bottom: 1px solid var(--border);
}
.member-detail-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--primary-glow); border: 2px solid var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 1.6rem;
  font-weight: 800; color: var(--primary);
}
.member-detail-name {
  font-family: var(--font-display); font-size: 1.1rem; font-weight: 800;
}
.member-detail-number { font-size: .82rem; color: var(--muted); margin-top: 2px; }

.member-detail-section {
  display: flex; flex-direction: column; gap: 8px;
}
.member-detail-section-header {
  display: flex; align-items: center; justify-content: space-between;
}
.member-detail-section-title {
  font-size: .82rem; font-weight: 700; color: var(--text2);
}
.member-detail-add-btn {
  background: none; border: 1px solid var(--border2);
  border-radius: 100px; padding: 4px 10px;
  font-size: .72rem; font-weight: 700; color: var(--primary);
  cursor: pointer; font-family: var(--font-body);
}
.member-detail-empty { font-size: .82rem; color: var(--muted); padding: 4px 0; }

/* Pro gate row inside member detail */
.pro-gate-row {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: var(--primary-light);
  border: 1.5px solid #00BFA530;
  border-radius: var(--radius); padding: 12px 14px;
  font-size: .85rem; color: var(--primary-dark); cursor: pointer;
  font-family: var(--font-body); transition: border-color .15s;
}
.pro-gate-row:hover { border-color: var(--primary); }
.pro-gate-badge {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; border-radius: 100px; padding: 2px 8px;
  font-size: .65rem; font-weight: 800;
}

/* ── Guardian cards ── */
.guardian-card {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.guardian-card-header {
  display: flex; align-items: center; gap: 8px;
}
.guardian-name { font-weight: 700; font-size: .9rem; flex: 1; }
.guardian-primary-badge {
  background: var(--primary-glow); color: var(--primary);
  border-radius: 100px; padding: 2px 8px; font-size: .68rem; font-weight: 700;
}
.guardian-remove-btn {
  background: none; border: none; color: var(--muted);
  font-size: .85rem; cursor: pointer; padding: 2px 4px;
  transition: color .15s;
}
.guardian-remove-btn:hover { color: var(--danger); }
.guardian-detail { font-size: .78rem; color: var(--muted); }
.guardian-contact {
  display: flex; align-items: center; gap: 8px;
}
.guardian-contact-val {
  flex: 1; font-size: .85rem; color: var(--text2);
  font-family: monospace; letter-spacing: .02em;
}

/* ── Medical notes — yellow theme ── */
.medical-card {
  background: #fefce8; border: 1.5px solid #fde047;
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.medical-row {
  display: flex; align-items: flex-start; gap: 10px;
}
.medical-key {
  font-size: .72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: #a16207;
  width: 110px; flex-shrink: 0; padding-top: 2px;
}
.medical-val       { font-size: .85rem; color: #1c1917; flex: 1; }
.medical-val-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.medical-val-alert {
  color: #dc2626; font-weight: 700;
  background: #fee2e2; border-radius: 4px; padding: 2px 6px;
}
.medical-no-consent {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 10px 12px;
  font-size: .82rem; color: var(--muted);
}

/* Medical edit form */
.medical-edit-form { display: flex; flex-direction: column; gap: 0; }
.medical-edit-header { text-align: center; padding: 4px 0 8px; }
.medical-edit-sub {
  font-size: .75rem; color: var(--muted); margin-top: 4px;
}
.medical-divider {
  height: 1px; background: var(--border); margin: 8px 0 4px;
}
.medical-consent-row {
  display: flex; align-items: flex-start; gap: 10px;
  background: #fefce8; border: 1.5px solid #fde047;
  border-radius: var(--radius); padding: 12px 14px;
  font-size: .82rem; color: #854d0e; line-height: 1.5;
  cursor: pointer; margin-top: 4px;
}

/* ── Payment setup ── */
.pay-row-2 {
  display: flex; gap: 10px;
}

/* ── Pay Directly sheet ── */
.pay-directly-sheet { display: flex; flex-direction: column; gap: 12px; }
.pay-directly-header { text-align: center; padding: 4px 0 4px; }
.pay-directly-title  {
  font-family: var(--font-display);
  font-size: 1.05rem; font-weight: 800; color: var(--text);
}
.pay-directly-amount {
  font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 4px 0 2px;
}
.pay-directly-fee-title { font-size: .82rem; color: var(--muted); }

.pay-paid-banner {
  background: #052e1640; border: 1.5px solid #10b98140;
  border-radius: var(--radius); padding: 10px 14px;
  font-size: .88rem; color: #10b981; text-align: center;
}

.pay-method-card {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
}
.pay-method-label { font-size: .78rem; font-weight: 700; color: var(--muted); }

.pay-detail-row {
  display: flex; align-items: center; gap: 8px;
}
.pay-detail-key {
  font-size: .78rem; color: var(--muted); width: 80px; flex-shrink: 0;
}
.pay-detail-val {
  flex: 1; font-size: .9rem; font-weight: 600;
  color: var(--text); font-family: monospace; letter-spacing: .04em;
}
.pay-copy-btn {
  background: var(--primary-glow); color: var(--primary);
  border: 1px solid var(--primary); border-radius: var(--radius-sm);
  padding: 5px 12px; font-size: .78rem; font-weight: 700;
  cursor: pointer; font-family: var(--font-body);
  transition: background .15s;
  white-space: nowrap;
}
.pay-copy-btn:hover { background: var(--primary); color: #fff; }

.pay-banking-apps {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.pay-app-btn {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 6px 12px;
  font-size: .78rem; font-weight: 600; color: var(--text2);
  cursor: pointer; font-family: var(--font-body);
  transition: border-color .15s;
}
.pay-app-btn:hover { border-color: var(--primary); color: var(--primary); }

.pay-note-card {
  display: flex; align-items: flex-start; gap: 10px;
  background: #fefce8; border: 1.5px solid #fde047;
  border-radius: var(--radius); padding: 12px 14px;
  font-size: .88rem; color: #1c1917; line-height: 1.5;
}
.pay-note-icon { font-size: 1rem; flex-shrink: 0; }

.btn-success {
  background: var(--success); color: #fff; border: none;
  border-radius: var(--radius); padding: 14px 20px;
  font-size: .95rem; font-weight: 700; cursor: pointer;
  font-family: var(--font-body); width: 100%;
  transition: opacity .15s;
}
.btn-success:hover { opacity: .88; }

/* ── Fee Tracker ── */
.fee-tracker { display: flex; flex-direction: column; gap: 10px; }
.fee-tracker-header { }
.fee-tracker-amount {
  font-size: 1.2rem; font-weight: 800; color: var(--primary); margin-top: 2px;
}

.fee-tracker-progress-wrap { display: flex; flex-direction: column; gap: 6px; }
.fee-tracker-progress-bar {
  height: 8px; background: var(--bg3); border-radius: 100px; overflow: hidden;
}
.fee-tracker-progress-fill {
  height: 100%; background: var(--success); border-radius: 100px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}
.fee-tracker-progress-label {
  display: flex; justify-content: space-between;
  font-size: .78rem;
}
.fee-tracker-paid-count { color: var(--success); font-weight: 700; }

.fee-section-label {
  font-size: .7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  padding: 4px 0 2px;
}
.fee-paid-label   { color: var(--success); }
.fee-unpaid-label { color: var(--warning); }

.fee-member-row {
  display: flex; align-items: center; gap: 10px; padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.fee-member-row:last-child { border-bottom: none; }
.fee-member-info  { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.fee-member-name  { font-size: .88rem; font-weight: 600; color: var(--text); }
.fee-member-date  { font-size: .72rem; color: var(--muted); }
.fee-paid-tick    { font-size: 1rem; }
.fee-mark-btn {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 7px 12px;
  font-size: .78rem; min-height: 36px; font-weight: 600; color: var(--text2);
  cursor: pointer; font-family: var(--font-body);
  transition: border-color .15s;
  white-space: nowrap;
}
.fee-mark-btn:hover { border-color: var(--success); color: var(--success); }

/* ── Attendance Stats — Phase 3f ── */
.attendance-screen { display: flex; flex-direction: column; gap: 12px; }

.attend-summary-banner {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 16px 18px;
}
.attend-summary-avg {
  font-family: var(--font-display);
  font-size: 2.2rem; font-weight: 800; line-height: 1;
}
.attend-summary-label { font-size: .75rem; color: var(--muted); margin-top: 2px; }
.attend-summary-right { display: flex; flex-direction: column; gap: 4px; text-align: right; }
.attend-summary-stat  { font-size: .78rem; color: var(--muted); }
.attend-summary-stat span { font-weight: 700; color: var(--text); }

.attend-section-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--muted);
}

/* Heatmap */
.attendance-heatmap { overflow-x: auto; }
.heatmap-labels, .heatmap-row {
  display: flex; align-items: center; gap: 4px;
}
.heatmap-name-col {
  width: 80px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  gap: 4px; padding-right: 6px;
}
.heatmap-name  { font-size: .72rem; font-weight: 600; color: var(--text2); truncate: ellipsis; white-space: nowrap; overflow: hidden; max-width: 52px; }
.heatmap-pct   { font-size: .65rem; font-weight: 700; }
.heatmap-ev-label {
  width: 32px; flex-shrink: 0;
  font-size: .68rem; font-weight: 600;
  text-align: center; line-height: 1.2; white-space: nowrap;
}
.heatmap-cell {
  width: 28px; height: 24px; border-radius: 4px; flex-shrink: 0;
  transition: opacity .1s;
}
.heatmap-cell.present { background: var(--success); opacity: .85; }
.heatmap-cell.absent  { background: var(--bg3); border: 1px solid var(--border2); }
.heatmap-row { padding: 3px 0; border-bottom: 1px solid var(--border); }
.heatmap-row:last-child { border-bottom: none; }

/* Per-player breakdown */
.attend-members-list { display: flex; flex-direction: column; gap: 8px; }
.attend-member-row {
  display: flex; align-items: center; gap: 10px;
}
.attend-member-info { flex: 1; }
.attend-member-name { font-size: .88rem; font-weight: 600; color: var(--text); }
.attend-member-sub  { font-size: .72rem; color: var(--muted); display: block; }
.attend-pct-wrap    { display: flex; align-items: center; gap: 8px; width: 100px; flex-shrink: 0; }
.attend-pct-bar     { flex: 1; height: 6px; background: var(--bg3); border-radius: 100px; overflow: hidden; }
.attend-pct-fill    { height: 100%; border-radius: 100px; transition: width .5s; }
.attend-pct-label   { font-size: .75rem; font-weight: 700; width: 30px; text-align: right; }

/* ── Polls — Phase 3g ── */
.polls-screen { display: flex; flex-direction: column; gap: 4px; }
.polls-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.polls-section-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--muted); padding: 4px 0;
}

.poll-card {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 14px 16px;
  cursor: pointer; transition: border-color .15s;
  margin-bottom: 8px;
}
.poll-card:hover { border-color: var(--primary); }
.poll-card.poll-closed { opacity: .7; }

.poll-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.poll-open-badge {
  background: #10b98120; color: var(--success); border: 1px solid var(--success);
  border-radius: 100px; padding: 2px 10px; font-size: .68rem; font-weight: 700;
}
.poll-closed-badge {
  background: var(--bg3); color: var(--muted); border: 1px solid var(--border2);
  border-radius: 100px; padding: 2px 10px; font-size: .68rem; font-weight: 700;
}
.poll-time { font-size: .72rem; color: var(--muted); }

.poll-question   { font-size: .95rem; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 10px; }
.poll-card-footer { display: flex; align-items: center; justify-content: space-between; }
.poll-votes      { font-size: .75rem; color: var(--muted); }
.poll-voted-chip {
  font-size: .75rem; font-weight: 600; color: var(--primary);
  background: var(--primary-glow); border-radius: 100px; padding: 2px 10px;
  max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.poll-vote-prompt { font-size: .78rem; color: var(--primary); font-weight: 600; }

/* Poll detail */
.poll-detail { display: flex; flex-direction: column; gap: 12px; }
.poll-detail-meta { display: flex; align-items: center; gap: 10px; }
.poll-detail-question {
  font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; line-height: 1.3;
}
.poll-results-label, .poll-vote-label {
  font-size: .78rem; color: var(--muted);
}

/* Vote buttons */
.poll-options-list { display: flex; flex-direction: column; gap: 8px; }
.poll-option-btn {
  width: 100%; background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: var(--radius); padding: 13px 16px;
  font-size: .9rem; font-weight: 600; color: var(--text);
  cursor: pointer; font-family: var(--font-body); text-align: left;
  transition: all .15s;
}
.poll-option-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); }

/* Result bars */
.poll-result-row {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.poll-result-row.poll-result-top {
  border-color: var(--primary); background: var(--primary-glow);
}
.poll-result-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.poll-result-text   { font-size: .9rem; font-weight: 600; color: var(--text); flex: 1; }
.poll-result-pct    { font-size: .9rem; font-weight: 800; color: var(--muted); }
.poll-result-pct-top { color: var(--primary); }
.poll-result-bar-track {
  height: 6px; background: var(--bg2); border-radius: 100px; overflow: hidden;
}
.poll-result-bar-fill {
  height: 100%; background: var(--muted); border-radius: 100px; transition: width .6s ease;
}
.poll-result-fill-top { background: var(--primary); }
.poll-result-votes { font-size: .72rem; color: var(--muted); }
.poll-change-vote  { text-align: center; }

/* ── Team Files — Phase 3e ── */
.files-screen { display: flex; flex-direction: column; gap: 0; }
.files-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.files-upload-btn {
  background: var(--primary-glow); color: var(--primary);
  border: 1px solid var(--primary); border-radius: 100px;
  padding: 6px 14px; font-size: .78rem; font-weight: 700;
  cursor: pointer; font-family: var(--font-body);
  transition: background .15s;
}
.files-upload-btn:hover { background: var(--primary); color: #fff; }

.files-list { display: flex; flex-direction: column; gap: 1px; }

.file-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 4px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s;
  border-radius: var(--radius-sm);
}
.file-row:hover  { background: var(--bg3); }
.file-row:last-child { border-bottom: none; }

.file-icon {
  font-size: 1.6rem; flex-shrink: 0;
  width: 40px; text-align: center;
}
.file-info   { flex: 1; min-width: 0; }
.file-name   {
  font-size: .9rem; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-meta   {
  display: flex; align-items: center; gap: 4px;
  font-size: .72rem; color: var(--muted); margin-top: 2px; flex-wrap: wrap;
}
.file-meta-dot { color: var(--border2); }
.file-seen   { font-size: .68rem; color: var(--muted); margin-top: 2px; }

.file-delete-btn {
  background: none; border: none; font-size: 1rem;
  cursor: pointer; color: var(--muted); padding: 4px 8px;
  transition: color .15s; flex-shrink: 0;
}
.file-delete-btn:hover { color: var(--danger); }
.file-chevron { color: var(--muted); font-size: 1.1rem; flex-shrink: 0; }

/* Empty state */
.files-empty {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 32px 20px; text-align: center;
}
.files-empty-icon  { font-size: 2.5rem; }
.files-empty-title { font-weight: 700; font-size: .95rem; color: var(--text); }
.files-empty-sub   { font-size: .82rem; color: var(--muted); max-width: 220px; line-height: 1.4; }

/* Upload form */
.file-picker-zone {
  background: var(--bg3); border: 2px dashed var(--border2);
  border-radius: var(--radius-lg); padding: 28px 20px;
  text-align: center; cursor: pointer;
  transition: border-color .15s, background .15s;
}
.file-picker-zone:hover {
  border-color: var(--primary); background: var(--primary-glow);
}
.file-picker-icon  { font-size: 2rem; margin-bottom: 8px; }
.file-picker-label { font-weight: 700; font-size: .9rem; color: var(--text); }
.file-picker-sub   { font-size: .75rem; color: var(--muted); margin-top: 4px; }

.file-preview-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 10px 14px;
  margin-top: 8px;
}

/* ── Sections / Age Groups — Phase 1c ── */

/* Horizontal filter bar */
.section-filter-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.section-filter-bar::-webkit-scrollbar { display: none; }

.section-chip {
  background: transparent; border: none;
  border-radius: 100px; padding: 7px 16px;
  font-size: .82rem; font-weight: 600; color: var(--muted);
  cursor: pointer; font-family: var(--font-body);
  white-space: nowrap; transition: all .15s; flex-shrink: 0;
}
.section-chip.active {
  background: var(--primary);
  color: #fff;
  font-weight: 700;
}

/* Section chips on event cards */
.event-section-chips {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
}
.event-section-chip {
  font-size: .65rem; font-weight: 700;
  padding: 2px 8px; border-radius: 100px;
  border: 1px solid transparent;
}

/* Sections list screen */
.sections-screen { display: flex; flex-direction: column; gap: 10px; }
.sections-header {
  display: flex; align-items: center; justify-content: space-between;
}
.sections-desc { font-size: .82rem; color: var(--muted); margin-top: -4px; }
.sections-list { display: flex; flex-direction: column; gap: 1px; }

.section-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 4px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s; border-radius: var(--radius-sm);
}
.section-row:hover { background: var(--bg3); }
.section-row:last-child { border-bottom: none; }
.section-row-colour {
  width: 12px; height: 36px; border-radius: 6px; flex-shrink: 0;
}
.section-row-info  { flex: 1; }
.section-row-name  { font-size: .9rem; font-weight: 600; color: var(--text); }
.section-row-count { font-size: .75rem; color: var(--muted); margin-top: 1px; }
.section-delete-btn {
  background: none; border: none; color: var(--muted);
  font-size: .85rem; cursor: pointer; padding: 4px 6px;
  transition: color .15s;
}
.section-delete-btn:hover { color: var(--danger); }
.section-row-chevron { color: var(--muted); font-size: 1.1rem; }

.sections-empty {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 28px 20px; text-align: center;
}
.sections-empty-icon  { font-size: 2rem; }
.sections-empty-title { font-weight: 700; font-size: .9rem; }
.sections-empty-sub   { font-size: .78rem; color: var(--muted); max-width: 220px; }

/* Colour picker */
.section-colour-picker {
  display: flex; flex-wrap: wrap; gap: 10px; padding: 4px 0;
}
.section-colour-swatch {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; color: #fff; font-weight: 800;
  transition: transform .1s;
}
.section-colour-swatch.active { border-color: var(--text); transform: scale(1.15); }

/* Section detail */
.section-detail-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 4px;
}
.section-detail-colour-bar {
  width: 6px; height: 42px; border-radius: 3px; flex-shrink: 0;
}

/* Add member chip */
.section-add-member-chip {
  background: var(--primary-light); color: var(--primary-dark);
  border: 1.5px solid #00BFA540; border-radius: 100px;
  padding: 6px 12px; font-size: .78rem; font-weight: 600;
  cursor: pointer; font-family: var(--font-body);
  transition: background .15s;
}
.section-add-member-chip:hover { background: var(--primary); color: #fff; }

/* Section remove button */
.section-remove-btn {
  background: none; border: none; color: var(--muted);
  font-size: .8rem; cursor: pointer; padding: 4px 6px;
  transition: color .15s;
}
.section-remove-btn:hover { color: var(--danger); }

/* ── Demo role-switch bar ── */
.demo-role-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  flex-shrink: 0; scrollbar-width: none;
}
.demo-role-bar::-webkit-scrollbar { display: none; }
.demo-role-label {
  font-size: .7rem; font-weight: 700;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: .06em;
  white-space: nowrap; flex-shrink: 0;
  margin-right: 4px;
}
.demo-role-btn {
  background: var(--bg3);
  border: 1.5px solid transparent;
  border-radius: 100px; padding: 6px 14px;
  font-size: .78rem; font-weight: 600; color: var(--text2);
  cursor: pointer; font-family: var(--font-body);
  white-space: nowrap; flex-shrink: 0;
  display: flex; align-items: center; gap: 5px;
  transition: background .12s, color .12s, transform .1s;
}
.demo-role-btn svg { color: inherit; }
.demo-role-btn.active {
  background: #1A1A2E; color: #fff;
  border-color: #1A1A2E;
}
.demo-role-btn:active { transform: scale(.94); }
.demo-role-btn:not(.active):active {
  background: var(--primary); color: #fff;
}

/* ── Weather forecast strip ── */
.weather-placeholder { min-height: 0; }
.weather-loading {
  font-size: .78rem; color: var(--muted);
  padding: 8px 0; text-align: center;
  animation: fadeIn .3s ease;
}
.weather-strip {
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(135deg, #EFF8FF, #F0FDF9);
  border: 1px solid #BAE6FD;
  border-radius: var(--radius); padding: 12px 14px;
  animation: fadeIn .4s ease;
}
.weather-icon { font-size: 1.8rem; flex-shrink: 0; line-height: 1; }
.weather-info { flex: 1; min-width: 0; }
.weather-condition {
  font-size: .88rem; font-weight: 700; color: var(--text);
  margin-bottom: 3px;
}
.weather-meta {
  display: flex; align-items: center; gap: 4px;
  font-size: .75rem; color: var(--text2); flex-wrap: wrap;
}
.weather-dot { color: var(--border2); }
.weather-location {
  font-size: .7rem; color: var(--muted);
  text-align: right; flex-shrink: 0;
  max-width: 80px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}

/* ── Game Albums / Photo Gallery ── */
.albums-screen { display: flex; flex-direction: column; gap: 12px; }
.albums-header {
  display: flex; align-items: flex-start; justify-content: space-between;
}
.albums-total { font-size: .78rem; color: var(--muted); margin-top: 3px; }

/* Album grid — 1 card per row, card-style */
.albums-grid { display: flex; flex-direction: column; gap: 10px; }
.album-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 14px 16px;
  cursor: pointer; transition: border-color .15s, box-shadow .15s;
}
.album-card:hover {
  border-color: var(--primary); box-shadow: 0 2px 12px #00BFA515;
}
.album-cover {
  width: 52px; height: 52px; border-radius: var(--radius);
  background: var(--bg2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; flex-shrink: 0;
}
.album-info    { flex: 1; min-width: 0; }
.album-name    { font-size: .93rem; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.album-meta    {
  display: flex; align-items: center; gap: 4px;
  font-size: .75rem; color: var(--muted);
}
.album-meta-dot { color: var(--border2); }
.album-desc    {
  font-size: .75rem; color: var(--text2); margin-top: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Album detail */
.album-detail-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.album-detail-name { font-family: var(--font-display); font-size: 1.05rem; font-weight: 800; color: var(--text); }
.album-detail-desc { font-size: .82rem; color: var(--text2); margin-top: 2px; }
.album-detail-meta { font-size: .75rem; color: var(--muted); margin-top: 2px; margin-bottom: 10px; }
.album-delete-btn {
  background: none; border: none; color: var(--muted);
  font-size: .78rem; cursor: pointer; font-family: var(--font-body);
  padding: 4px 8px; transition: color .15s;
}
.album-delete-btn:hover { color: var(--danger); }

/* Photo grid — 3 columns */
.photo-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 6px; margin-bottom: 4px;
}
.photo-tile {
  aspect-ratio: 1;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; overflow: hidden;
  transition: transform .15s, border-color .15s;
  position: relative;
}
.photo-tile:hover { transform: scale(1.02); border-color: var(--primary); }
.photo-tile-placeholder { font-size: 2rem; }
.photo-tile-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.45); color: #fff;
  font-size: .68rem; font-weight: 600;
  padding: 3px 5px; text-align: center;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Add photo tile */
.photo-tile-add {
  background: var(--primary-light);
  border: 2px dashed var(--primary);
  cursor: pointer;
}
.photo-tile-add:hover { background: var(--primary); }
.photo-tile-add:hover .photo-tile-add-icon,
.photo-tile-add:hover .photo-tile-add-label { color: #fff; }
.photo-tile-add-icon { font-size: 1.5rem; color: var(--primary); font-weight: 300; }
.photo-tile-add-label { font-size: .65rem; color: var(--primary); font-weight: 700; margin-top: 2px; }

/* Album emoji picker */
.album-emoji-picker { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0; }
.album-emoji-btn {
  width: 44px; height: 44px; border-radius: var(--radius-sm);
  background: var(--bg3); border: 2px solid var(--border2);
  font-size: 1.3rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
}
.album-emoji-btn.active {
  border-color: var(--primary);
  background: var(--primary-light);
  transform: scale(1.1);
}

/* ── Big Trip Builder ── */
.trips-screen { display: flex; flex-direction: column; gap: 10px; }
.trips-header {
  display: flex; align-items: center; justify-content: space-between;
}

.trip-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  cursor: pointer; transition: border-color .15s, box-shadow .15s;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
  display: flex; flex-direction: column; gap: 12px;
}
.trip-card:hover { border-color: var(--primary); box-shadow: 0 2px 12px #00BFA515; }

.trip-card-header { display: flex; align-items: flex-start; gap: 12px; }
.trip-card-icon {
  font-size: 1.8rem; flex-shrink: 0;
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  background: var(--primary-light); border-radius: var(--radius-sm);
}
.trip-card-info  { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.trip-card-name  { font-size: .95rem; font-weight: 700; color: var(--text); }
.trip-card-meta  { font-size: .78rem; color: var(--text2); }
.trip-card-dates { font-size: .75rem; color: var(--muted); }
.trip-card-cost  { text-align: right; flex-shrink: 0; }
.trip-cost-amount { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; color: var(--primary); display: block; }
.trip-cost-label  { font-size: .65rem; color: var(--muted); }

.trip-progress-wrap { display: flex; flex-direction: column; gap: 5px; }
.trip-progress-bar {
  height: 7px; background: var(--bg3); border-radius: 100px; overflow: hidden;
}
.trip-progress-fill {
  height: 100%; background: var(--success); border-radius: 100px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}
.trip-progress-label {
  display: flex; justify-content: space-between; align-items: center;
  font-size: .75rem;
}
.trip-paid-count  { color: var(--text2); }
.trip-all-paid    { color: var(--success); font-weight: 700; }
.trip-my-status   { font-weight: 600; }
.trip-my-paid     { color: var(--success); }
.trip-my-unpaid   { color: var(--warning); }

/* Trip detail */
.trip-detail { display: flex; flex-direction: column; gap: 12px; }
.trip-detail-hero {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 12px; background: var(--primary-light);
  border: 1px solid #00BFA520; border-radius: var(--radius-lg);
}
.trip-detail-emoji { font-size: 2rem; flex-shrink: 0; margin-top: 2px; }
.trip-detail-name  { font-family: var(--font-display); font-size: 1.05rem; font-weight: 800; color: var(--text); margin-bottom: 3px; }
.trip-detail-meta  { font-size: .8rem; color: var(--text2); margin-top: 1px; }
.trip-detail-desc  { font-size: .88rem; color: var(--text2); line-height: 1.6; }

.trip-detail-section { display: flex; flex-direction: column; gap: 6px; }
.trip-detail-section-label {
  font-size: .68rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: .1em; color: var(--muted);
}

/* Per-member payment rows */
.trip-payments-list { display: flex; flex-direction: column; gap: 4px; }
.trip-payment-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.trip-payment-row:last-child { border-bottom: none; }
.trip-payment-row.trip-payment-mine { background: var(--primary-light); margin: 0 -4px; padding: 8px 4px; border-radius: var(--radius-sm); }
.trip-payment-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.trip-payment-name { font-size: .88rem; font-weight: 600; }
.trip-payment-date { font-size: .72rem; color: var(--muted); }
.trip-paid-tick    { font-size: 1.1rem; }
.trip-unpaid-badge {
  font-size: .72rem; font-weight: 700; color: var(--warning);
  background: #fef3c720; border: 1px solid #fde68a;
  border-radius: 100px; padding: 2px 8px;
}

/* Packing list */
.trip-packing-grid { display: flex; flex-direction: column; gap: 6px; }
.trip-packing-item {
  display: flex; align-items: center; gap: 10px;
  font-size: .88rem; color: var(--text);
}
.trip-packing-check { font-size: .9rem; color: var(--muted); flex-shrink: 0; }

/* ── Opponent autocomplete in create event ── */
.opp-suggestions {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); overflow: hidden;
  margin-top: -4px;
}
.opp-suggestion-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; background: none; border: none;
  border-bottom: 1px solid var(--border); padding: 11px 14px;
  font-size: .88rem; font-weight: 600; color: var(--text);
  cursor: pointer; font-family: var(--font-body);
  text-align: left; transition: background .1s;
}
.opp-suggestion-btn:last-child { border-bottom: none; }
.opp-suggestion-btn:hover { background: var(--bg3); }
.opp-sug-kit {
  width: 16px; height: 16px; border-radius: 3px;
  flex-shrink: 0; border: 1px solid rgba(0,0,0,.1);
}

/* ── All-teams bar ── */
.all-teams-bar {
  display: flex; gap: 4px; padding: 8px 12px 2px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
}
.all-teams-btn {
  flex: 1; background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: 100px; padding: 7px 12px;
  font-size: .8rem; font-weight: 600; color: var(--text2);
  cursor: pointer; font-family: var(--font-body);
  transition: all .15s;
}
.all-teams-btn.active {
  background: var(--primary-light);
  border-color: var(--primary); color: var(--primary-dark);
}

/* ── Availability ── */
.avail-summary {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 6px; margin-bottom: 12px;
}
.avail-summary-cell {
  display: flex; flex-direction: column; align-items: center;
  border-radius: var(--radius); padding: 10px 4px; gap: 3px;
}
.avail-summary-yes   { background: #d1fae5; }
.avail-summary-maybe { background: #fef3c7; }
.avail-summary-no    { background: #fee2e2; }
.avail-summary-none  { background: var(--bg3); }
.avail-summary-num   { font-size: 1.3rem; font-weight: 800; font-family: var(--font-display); }
.avail-summary-label { font-size: .65rem; font-weight: 600; color: var(--text2); }
.avail-section-label {
  font-size: .68rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: .08em; padding: 8px 0 4px;
}
.avail-label-yes   { color: var(--success); }
.avail-label-maybe { color: var(--warning); }
.avail-label-no    { color: var(--danger); }
.avail-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
.avail-chip {
  display: flex; align-items: center; gap: 6px;
  border-radius: 100px; padding: 5px 10px 5px 5px;
  border: 1px solid transparent;
}
.avail-yes   { background: #d1fae5; border-color: #6ee7b7; }
.avail-maybe { background: #fef3c7; border-color: #fde68a; }
.avail-no    { background: #fee2e2; border-color: #fca5a5; }
.avail-none  { background: var(--bg3); border-color: var(--border2); }
.avail-initial {
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,.12); display: flex; align-items: center;
  justify-content: center; font-size: .75rem; font-weight: 700; color: var(--text);
  flex-shrink: 0;
}
.avail-info { display: flex; flex-direction: column; }
.avail-name { font-size: .78rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.avail-pos  { font-size: .65rem; color: var(--muted); }

/* Availability button in event detail */
.availability-btn {
  width: 100%; background: var(--primary-light);
  border: 1.5px solid #00BFA530;
  border-radius: var(--radius); padding: 11px;
  color: var(--primary-dark); font-size: .88rem; font-weight: 600;
  cursor: pointer; font-family: var(--font-body);
  transition: background .15s;
}
.availability-btn:hover { background: var(--primary); color: #fff; }

/* ── Sport-specific kit additions ── */
.kit-sport-label {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.kit-sport-name { font-size: .95rem; font-weight: 700; color: var(--text); }
.kit-sport-type {
  font-size: .72rem; font-weight: 600; color: var(--primary);
  background: var(--primary-light); padding: 3px 10px; border-radius: 100px;
}
.kit-mode-hint {
  font-size: .78rem; color: var(--text2); font-weight: 500;
  padding: 8px 12px; background: var(--bg3); border-radius: var(--radius-sm);
  display: flex; align-items: center; gap: 6px;
}
.kit-view-only-notice {
  display: flex; align-items: center; gap: 8px;
  background: var(--yellow-bg); border: 1px solid var(--yellow-border);
  border-radius: var(--radius-sm); padding: 10px 14px;
  font-size: .8rem; color: var(--yellow-text); font-weight: 500;
}

/* ── Full Kit Builder ── */
.kit-builder { display: flex; flex-direction: column; gap: 12px; }

.kit-switcher {
  display: flex; gap: 0;
  background: var(--bg3); border-radius: 100px;
  padding: 3px;
}
.kit-tab {
  flex: 1; background: none; border: none;
  border-radius: 100px; padding: 8px 16px;
  font-size: .85rem; font-weight: 600;
  color: var(--muted); cursor: pointer;
  font-family: var(--font-body);
  transition: all .2s ease;
}
.kit-tab.active {
  background: var(--bg2);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}

.kit-both-preview {
  display: flex; gap: 12px; justify-content: center;
  padding: 4px 0;
}
.kit-preview-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  cursor: pointer; border-radius: var(--radius);
  padding: 8px 12px;
  transition: background .15s, opacity .2s;
  flex: 1;
}
.kit-preview-item:active { background: var(--bg3); }
.kit-selected { background: var(--bg3); }
.kit-dimmed { opacity: .45; }
.kit-preview-label {
  font-size: .75rem; font-weight: 600;
  color: var(--text2); text-transform: uppercase;
  letter-spacing: .06em;
}

.kit-section-label {
  font-size: .7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted);
}

/* Pattern pills */
.kit-pattern-row {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.kit-pattern-btn {
  background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: 100px; padding: 6px 14px;
  font-size: .78rem; font-weight: 600;
  color: var(--text2); cursor: pointer;
  font-family: var(--font-body);
  transition: all .15s;
}
.kit-pattern-btn.active {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--primary-dark);
}

/* Part selector (shirt / shorts / socks) */
.kit-part-row { display: flex; gap: 8px; }
.kit-part-btn {
  flex: 1; background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm); padding: 8px 6px;
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  cursor: pointer; font-family: var(--font-body);
  font-size: .72rem; font-weight: 600; color: var(--text2);
  transition: all .15s;
}
.kit-part-btn.active {
  border-color: var(--primary);
  background: var(--primary-light); color: var(--primary-dark);
}
.kit-part-swatch {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid rgba(0,0,0,.1);
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}

/* Colour swatches grid */
.kit-colour-swatches {
  display: grid; grid-template-columns: repeat(9, 1fr);
  gap: 8px;
}
.kit-swatch-btn {
  aspect-ratio: 1; border-radius: 50%;
  border: none; cursor: pointer;
  width: 100%; min-width: 28px;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 1px 3px rgba(0,0,0,.12);
}
.kit-swatch-btn:active { transform: scale(.85); }
.kit-swatch-custom {
  background: var(--bg3); border: 1.5px solid var(--border2) !important;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; position: relative; overflow: hidden;
  box-shadow: none;
}

/* ─────────────────────────────────────────────────────────────────────────────
   CUSTOM ISOMETRIC ICON SYSTEM
───────────────────────────────────────────────────────────────────────────── */
.iso-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.iso-icon svg { display: block; }

/* Tab bar — icons render at full SVG size */
.tab-icon .iso-icon svg { width: 26px; height: 26px; }

/* Settings rows — slightly smaller */
.settings-row-icon .iso-icon svg { width: 22px; height: 22px; }

/* Pro rows */
.settings-row-icon .iso-icon { display: flex; align-items: center; justify-content: center; }

/* Icon in coloured background container */
.settings-row-icon {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* Active state for tab icons — shift teal accent */
.tab-btn.active .iso-icon svg path,
.tab-btn.active .iso-icon svg ellipse {
  /* keep original colours — they're already teal */
}

/* ── Colour picker (team brand) ── */

/* ── Notification settings ── */
.notif-list { display: flex; flex-direction: column; gap: 0; }
.notif-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.notif-row:last-child { border-bottom: none; }
.notif-info { flex: 1; }
.notif-label { font-size: .9rem; font-weight: 600; color: var(--text); }
.notif-desc  { font-size: .75rem; color: var(--muted); margin-top: 1px; }
.toggle-wrap { position: relative; flex-shrink: 0; }
.notif-toggle { position: absolute; opacity: 0; width: 0; height: 0; }
.toggle-track {
  display: block; width: 44px; height: 26px;
  background: var(--border2); border-radius: 100px;
  transition: background .2s; cursor: pointer;
  position: relative;
}
.toggle-track::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px;
  transition: transform .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.notif-toggle:checked + .toggle-track { background: var(--primary); }
.notif-toggle:checked + .toggle-track::after { transform: translateX(18px); }

/* ── Skeleton loading ── */
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: skeleton-shimmer 1.4s ease-in-out infinite;
  border-radius: var(--radius-sm);
}
@keyframes skeleton-shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skeleton-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
  margin-bottom: 8px;
}
.skeleton-line   { height: 14px; border-radius: 4px; }
.skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
.skeleton-row    { display: flex; gap: 10px; align-items: center; }

/* ── Pay Coach Directly card ── */
.pay-coach-card {
  display: flex; align-items: center;
  background: linear-gradient(135deg, #f0fdf4, var(--bg2));
  border: 1.5px solid #86efac;
  border-radius: var(--radius-lg); padding: 14px 16px;
  cursor: pointer; margin-bottom: 6px;
  transition: border-color .15s, box-shadow .15s;
  gap: 12px;
}
.pay-coach-card:hover {
  border-color: var(--success);
  box-shadow: 0 2px 12px rgba(16,185,129,.1);
}
.pay-coach-card-left {
  display: flex; align-items: center; gap: 12px; flex: 1;
}
.pay-coach-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  background: #d1fae5;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.pay-coach-title {
  font-size: .93rem; font-weight: 700; color: var(--text);
}
.pay-coach-sub {
  font-size: .78rem; color: var(--text2); margin-top: 2px;
}

/* ── GDPR / legal notice ── */
.gdpr-notice {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-top: 8px;
}
.gdpr-notice-title {
  font-size: .82rem; font-weight: 700; color: var(--text2);
  margin-bottom: 6px;
}
.gdpr-notice-body {
  font-size: .78rem; color: var(--muted);
  line-height: 1.55; margin-bottom: 10px;
}
.gdpr-links {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap; margin-bottom: 8px;
}
.gdpr-link {
  font-size: .75rem; font-weight: 600;
  color: var(--primary); text-decoration: none;
  background: none; border: none; cursor: pointer;
  font-family: var(--font-body); padding: 0;
  transition: opacity .15s;
}
.gdpr-link:hover { opacity: .7; }
.gdpr-delete-btn { color: var(--danger) !important; }
.gdpr-sep { color: var(--border2); font-size: .75rem; }
.gdpr-version {
  font-size: .7rem; color: var(--border2);
  margin-top: 4px;
}

/* ── Heja-style colour picker ── */
.colour-picker-sheet {
  display: flex; flex-direction: column;
  align-items: center; gap: 16px;
  padding: 8px 0 4px;
  text-align: center;
}
.colour-picker-handle {
  width: 36px; height: 4px;
  background: var(--border2); border-radius: 100px;
  margin: 0 auto;
}
.colour-picker-title {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 800;
  color: var(--text); margin: 0;
}
.colour-picker-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; padding: 4px 8px; width: 100%;
}
.colour-circle-btn {
  width: 64px; height: 64px; border-radius: 50%;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s;
  position: relative; margin: 0 auto;
}
.colour-circle-btn:active { transform: scale(.9); }
.colour-circle-btn.selected {
  box-shadow: 0 0 0 3px var(--bg2), 0 0 0 5px currentColor;
  transform: scale(1.08);
}
.colour-custom-row {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 0 4px; cursor: pointer;
}
.colour-custom-label { font-size: .9rem; font-weight: 500; color: var(--text2); }
.colour-custom-input-wrap {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer;
  border: 3px solid rgba(255,255,255,.4);
}
.colour-custom-input {
  width: 56px; height: 56px;
