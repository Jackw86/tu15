  border: none; padding: 0; cursor: pointer;
  opacity: 0; position: absolute;
}

/* Team colour row in header card */
.team-colour-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  margin-top: 4px; cursor: pointer;
}
.team-colour-label { font-size: .82rem; font-weight: 600; color: var(--text2); flex: 1; }
.team-colour-preview-dot {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid rgba(0,0,0,.1); flex-shrink: 0;
}

/* ── Messaging safety ── */
.dm-row        { transition: background .1s; border-radius: var(--radius-sm); padding: 8px 4px; }
.dm-row:hover  { background: var(--bg3); }
.dm-blocked    { opacity: .6; }
.dm-blocked:hover { background: #fff7ed; }
.dm-blocked-icon { font-size: 1rem; flex-shrink: 0; }

/* ── Payment method badges ── */
.payment-method-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin: 8px 0;
}
.payment-method-btn {
  background: var(--bg3); border: 2px solid var(--border2);
  border-radius: var(--radius); padding: 12px 8px;
  font-size: .85rem; font-weight: 600; color: var(--text2);
  cursor: pointer; font-family: var(--font-body);
  text-align: center; transition: all .15s;
}
.payment-method-btn.active {
  background: var(--primary-light);
  border-color: var(--primary); color: var(--primary-dark);
}
.payment-method-badge {
  font-size: .68rem; font-weight: 700;
  border-radius: 100px; padding: 2px 7px;
  white-space: nowrap; flex-shrink: 0;
}
.payment-method-badge.dd     { background: #ede9fe; color: #7c3aed; }
.payment-method-badge.bank   { background: #dbeafe; color: #1d4ed8; }
.payment-method-badge.cash   { background: #d1fae5; color: #065f46; }
.payment-method-badge.online { background: #fce7f3; color: #be185d; }

/* ── Developer preview mode banner ── */
.preview-banner {
  background: #1c1c2e;
  color: #a5b4fc;
  font-size: .72rem;
  font-weight: 700;
  text-align: center;
  padding: 6px 12px;
  letter-spacing: .03em;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
}

/* ── Training Setup Wizard ── */
.wizard-screen { display: flex; flex-direction: column; gap: 14px; }
.wizard-header  { text-align: center; }
.wizard-step-label {
  font-size: .7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--primary); margin-bottom: 4px;
}
.wizard-sub { font-size: .85rem; color: var(--text2); line-height: 1.5; margin-top: 2px; }
.day-picker { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
.day-btn {
  background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm); padding: 10px 4px;
  font-size: .78rem; font-weight: 700; color: var(--text2);
  cursor: pointer; font-family: var(--font-body); transition: all .15s; text-align: center;
}
.day-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 2px 8px #00BFA540; }
.holiday-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
.holiday-chip {
  display: flex; align-items: center; gap: 6px;
  background: #fff7ed; border: 1px solid #fed7aa;
  border-radius: 100px; padding: 4px 10px;
  font-size: .78rem; color: #c2410c;
}
.holiday-remove { background: none; border: none; color: #c2410c; cursor: pointer; font-size: .8rem; padding: 0 2px; }
.wizard-preview { background: var(--bg3); border-radius: var(--radius); padding: 12px 14px; max-height: 200px; overflow-y: auto; }
.wizard-month-label { font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 6px 0 3px; }
.wizard-event-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .82rem; }
.wizard-event-row:last-child { border-bottom: none; }
.wizard-event-day { color: var(--muted); width: 60px; flex-shrink: 0; font-size: .75rem; }
.wizard-event-title { flex: 1; font-weight: 600; }
.wizard-event-time { color: var(--muted); font-size: .72rem; }
.wizard-more { font-size: .78rem; color: var(--muted); text-align: center; padding: 8px 0 0; }
.wizard-summary-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.wizard-summary-chip { background: var(--primary-light); color: var(--primary-dark); border: 1px solid #00BFA530; border-radius: 100px; padding: 4px 12px; font-size: .78rem; font-weight: 600; }

/* ── Calendar sync ── */
.calendar-sync-row { display: flex; align-items: center; gap: 8px; background: var(--bg3); border-radius: var(--radius); padding: 10px 12px; }
.calendar-sync-label { flex: 1; font-size: .82rem; font-weight: 600; color: var(--text2); }
.calendar-btn { display: flex; align-items: center; gap: 5px; border-radius: var(--radius-sm); padding: 7px 12px; font-size: .75rem; font-weight: 700; cursor: pointer; font-family: var(--font-body); transition: opacity .15s; border: 1px solid var(--border2); white-space: nowrap; }
.cal-google { background: #fff; color: #1f2937; }
.cal-apple  { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }
.calendar-btn:hover { opacity: .85; }

/* ── Mark-in ── */
.mark-in-open-btn { width: 100%; background: var(--bg3); border: 1.5px solid var(--border2); border-radius: var(--radius); padding: 11px 14px; font-size: .88rem; font-weight: 600; color: var(--text); cursor: pointer; font-family: var(--font-body); display: flex; align-items: center; justify-content: space-between; transition: border-color .15s; }
.mark-in-open-btn:hover { border-color: var(--primary); }
.mark-in-badge { background: var(--success); color: #fff; border-radius: 100px; padding: 2px 8px; font-size: .68rem; font-weight: 700; }
.mark-in-summary { display: flex; gap: 12px; margin-bottom: 8px; }
.mark-in-present { color: var(--success); font-weight: 700; font-size: .85rem; }
.mark-in-absent  { color: var(--muted); font-size: .85rem; }
.mark-in-list { display: flex; flex-direction: column; gap: 2px; }
.mark-in-row { display: flex; align-items: center; gap: 10px; padding: 9px 8px; border-radius: var(--radius-sm); transition: background .1s; }
.mark-in-row.present { background: #d1fae5; }
.mark-in-name { flex: 1; display: flex; flex-direction: column; }
.mark-in-pos { font-size: .7rem; color: var(--muted); }
.mark-in-btn { background: var(--bg3); border: 1.5px solid var(--border2); border-radius: 100px; padding: 7px 14px; font-size: .78rem; font-weight: 700; color: var(--text2); cursor: pointer; font-family: var(--font-body); white-space: nowrap; transition: all .15s; min-height: 36px; }
.mark-in-btn.present { background: var(--success); border-color: var(--success); color: #fff; }

/* ── First-use Walkthrough Tour ── */
.tour-overlay {
  position: fixed; inset: 0;
  background: rgba(28,28,46,.65);
  backdrop-filter: blur(3px);
  z-index: 1000;
  display: flex; align-items: flex-end; justify-content: center;
  padding: 0 0 max(24px, env(safe-area-inset-bottom));
  animation: fadeIn .25s ease;
}
.tour-card {
  background: var(--bg2);
  border-radius: var(--radius-xl) var(--radius-xl) var(--radius-lg) var(--radius-lg);
  padding: 28px 24px 24px;
  width: 100%; max-width: 430px;
  display: flex; flex-direction: column; gap: 14px;
  box-shadow: 0 -8px 40px rgba(0,0,0,.15);
  animation: slideUp .3s cubic-bezier(.32,.72,0,1);
}

/* Progress dots */
.tour-progress-dots {
  display: flex; justify-content: center; gap: 6px;
}
.tour-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border2); transition: all .25s;
}
.tour-dot.active { background: var(--primary); transform: scale(1.3); }
.tour-dot.done   { background: var(--primary); opacity: .4; }

/* Content */
.tour-emoji { font-size: 2.8rem; text-align: center; line-height: 1; }
.tour-title {
  font-family: var(--font-display); font-size: 1.25rem; font-weight: 800;
  color: var(--text); text-align: center;
}
.tour-body {
  font-size: .9rem; color: var(--text2); line-height: 1.6; text-align: center;
}
.tour-tip {
  background: var(--yellow-bg); border: 1px solid var(--yellow-border);
  border-radius: var(--radius); padding: 10px 14px;
  font-size: .82rem; color: var(--yellow-text); line-height: 1.5;
}

/* Actions */
.tour-actions {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 4px;
}
.tour-skip-btn {
  background: none; border: none; color: var(--muted);
  font-size: .82rem; cursor: pointer; font-family: var(--font-body);
  padding: 4px; transition: color .15s;
}
.tour-skip-btn:hover { color: var(--text2); }
.tour-nav { display: flex; gap: 8px; align-items: center; }
.tour-back-btn {
  background: none; border: 1.5px solid var(--border2);
  border-radius: var(--radius); padding: 10px 16px;
  font-size: .85rem; font-weight: 600; color: var(--text2);
  cursor: pointer; font-family: var(--font-body);
  transition: border-color .15s;
}
.tour-back-btn:hover { border-color: var(--primary); }
.tour-next-btn {
  background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius);
  padding: 11px 20px; font-size: .9rem; font-weight: 700;
  cursor: pointer; font-family: var(--font-body);
  transition: background .15s;
  box-shadow: 0 4px 16px #00BFA530;
}
.tour-next-btn:hover { background: var(--primary-dark); }

/* ── Comment threads ── */
.post-comment-btn {
  background: none; border: none; cursor: pointer;
  font-size: .78rem; color: var(--muted); font-family: var(--font-body);
  padding: 2px 4px; transition: color .15s;
}
.post-comment-btn:hover { color: var(--primary); }

.comments-screen { display: flex; flex-direction: column; gap: 10px; max-height: 70dvh; }
.comments-header {
  display: flex; align-items: center; gap: 10px;
}
.comments-count {
  background: var(--primary-light); color: var(--primary);
  border-radius: 100px; padding: 1px 8px;
  font-size: .75rem; font-weight: 700;
}
.post-text-preview {
  font-size: .82rem; color: var(--text2);
  background: var(--bg3); border-radius: var(--radius-sm);
  padding: 8px 12px; border-left: 3px solid var(--border2);
}
.comments-list {
  display: flex; flex-direction: column; gap: 10px;
  overflow-y: auto; max-height: 320px;
  -webkit-overflow-scrolling: touch;
}
.comments-empty {
  text-align: center; color: var(--muted); font-size: .85rem;
  padding: 20px 0;
}
.comment-row {
  display: flex; align-items: flex-start; gap: 8px;
}
.comment-row.comment-mine { flex-direction: row-reverse; }
.comment-bubble {
  background: var(--bg3); border-radius: var(--radius-lg);
  border-bottom-left-radius: 4px;
  padding: 8px 12px; max-width: 80%; flex: 1;
}
.comment-mine .comment-bubble {
  background: var(--primary-light);
  border-bottom-left-radius: var(--radius-lg);
  border-bottom-right-radius: 4px;
}
.comment-author {
  font-size: .72rem; font-weight: 700; color: var(--text);
  display: block; margin-bottom: 1px;
}
.comment-time { font-size: .65rem; color: var(--muted); margin-left: 6px; }
.comment-text { font-size: .88rem; color: var(--text); line-height: 1.4; margin-top: 2px; }
.comment-delete-btn {
  background: none; border: none; color: var(--muted);
  font-size: .7rem; cursor: pointer; padding: 4px;
  flex-shrink: 0; align-self: center;
  transition: color .15s;
}
.comment-delete-btn:hover { color: var(--danger); }
.comment-compose {
  display: flex; align-items: center; gap: 8px;
  border-top: 1px solid var(--border); padding-top: 10px;
}
.comment-input { margin: 0; }
.comment-send-btn {
  background: var(--primary); color: #fff;
  border: none; border-radius: 50%;
  width: 44px; height: 44px; flex-shrink: 0;
  font-size: .9rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
}
.comment-send-btn:hover { opacity: .85; }

/* ── Opponent Library ── */
.opp-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 4px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s; border-radius: var(--radius-sm);
}
.opp-card:hover { background: var(--bg3); }
.opp-card:last-child { border-bottom: none; }
.opp-kit {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  flex-shrink: 0; border: 2px solid rgba(0,0,0,.1);
}
.opp-info { flex: 1; min-width: 0; }
.opp-name { font-size: .93rem; font-weight: 700; color: var(--text); }
.opp-meta {
  display: flex; align-items: center; gap: 8px;
  font-size: .75rem; color: var(--muted); margin-top: 2px; flex-wrap: wrap;
}
.opp-record { font-weight: 600; color: var(--text2); }
.opp-notes-preview {
  font-size: .72rem; color: var(--muted); margin-top: 3px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Opponent detail */
.opp-detail-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 4px;
}
.opp-kit-lg {
  width: 56px; height: 56px; border-radius: var(--radius);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  border: 2px solid rgba(0,0,0,.1);
}
.opp-kit-initial { font-size: 1.4rem; font-weight: 800; color: #fff; font-family: var(--font-display); text-shadow: 0 1px 3px rgba(0,0,0,.3); }
.opp-detail-name { font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; }
.opp-detail-meta { font-size: .8rem; color: var(--text2); margin-top: 2px; }

/* W/D/L record bar */
.opp-record-bar {
  display: flex; border-radius: var(--radius-sm); overflow: hidden;
  height: 36px; gap: 2px;
}
.opp-record-cell {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  font-size: .85rem; font-weight: 700; color: #fff; min-width: 32px;
}
.opp-record-label { font-size: .68rem; opacity: .75; }
.opp-w { background: var(--success); }
.opp-d { background: var(--warning); }
.opp-l { background: var(--danger); }

/* Fixtures list */
.opp-game-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; font-size: .85rem;
}
.opp-game-row:last-child { border-bottom: none; }
.opp-game-date { color: var(--muted); font-size: .75rem; width: 80px; flex-shrink: 0; }
.opp-game-title { flex: 1; font-weight: 600; }

/* Kit colour picker */
.opp-colour-picker { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0; }
.opp-colour-swatch {
  width: 34px; height: 34px; border-radius: 50%;
  border: 3px solid transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; color: #fff; font-weight: 800;
  transition: transform .1s;
}
.opp-colour-swatch.active { border-color: var(--text); transform: scale(1.15); }

/* ── Derby / Big Game Flagging ── */
.event-card.derby {
  border-color: #dc262630;
  background: linear-gradient(135deg, #fff5f5 0%, #fff 100%);
  box-shadow: 0 2px 12px #dc262615;
}
.event-card.derby:hover { border-color: #dc2626; }

.derby-badge {
  font-size: .68rem; font-weight: 800;
  background: #dc262615; color: #dc2626;
  border: 1px solid #dc262630;
  border-radius: 100px; padding: 3px 9px;
  white-space: nowrap; flex-shrink: 0;
  animation: derby-pulse 2s ease-in-out infinite;
}
@keyframes derby-pulse {
  0%,100% { box-shadow: 0 0 0 0 #dc262620; }
  50%      { box-shadow: 0 0 0 4px #dc262600; }
}

.derby-banner {
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(135deg, #fff5f5, #fef2f2);
  border: 1.5px solid #dc262630;
  border-radius: var(--radius); padding: 12px 14px;
  animation: fadeIn .3s ease;
}
.derby-banner-icon   { font-size: 1.6rem; flex-shrink: 0; }
.derby-banner-text   { flex: 1; }
.derby-banner-title  { font-size: .9rem; font-weight: 700; color: #dc2626; }
.derby-banner-sub    { font-size: .72rem; color: #ef4444; opacity: .75; margin-top: 2px; }
.derby-remove-btn {
  background: none; border: 1px solid #dc262640;
  border-radius: var(--radius-sm); padding: 5px 10px;
  font-size: .72rem; font-weight: 600; color: #dc2626;
  cursor: pointer; font-family: var(--font-body);
  flex-shrink: 0; transition: background .15s;
}
.derby-remove-btn:hover { background: #dc262610; }

.derby-add-btn {
  width: 100%; background: none; border: 1.5px dashed #dc262630;
  border-radius: var(--radius); padding: 10px;
  color: #dc2626; font-size: .85rem; font-weight: 600;
  cursor: pointer; font-family: var(--font-body);
  transition: border-color .15s, background .15s;
}
.derby-add-btn:hover { border-color: #dc2626; background: #fff5f5; }

.derby-label-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
}
.derby-label-btn {
  background: var(--bg3); border: 1.5px solid var(--border2);
  border-radius: var(--radius); padding: 10px 8px;
  font-size: .82rem; font-weight: 600; color: var(--text);
  cursor: pointer; font-family: var(--font-body);
  transition: all .15s; text-align: center;
}
.derby-label-btn.active {
  background: #fff5f5; border-color: #dc2626; color: #dc2626;
}

/* ── Sport selector ── */
.sport-selector-scroll {
  max-height: 220px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-right: 4px;
}
.sport-group-label {
  font-size:.68rem; font-weight:700; text-transform:uppercase;
  letter-spacing:.1em; color:var(--muted);
  padding:12px 0 6px; margin-top:4px;
}
.sport-grid {
  display:flex; flex-wrap:wrap; gap:8px; margin-bottom:4px;
}
.sport-chip {
  display:flex; align-items:center; gap:6px;
  background:var(--bg3); border:1.5px solid var(--border2);
  border-radius:100px; padding:7px 14px;
  color:var(--text2); font-family:var(--font-body);
  font-size:.82rem; font-weight:600; cursor:pointer;
  transition:all .15s; white-space:nowrap;
}
.sport-chip.active {
  background:var(--primary-glow);
  border-color:var(--primary); color:var(--primary);
}
.sport-chip-emoji { font-size:1rem; }
.sport-chip-label { }

/* ── Activity type tabs (Heja orange/purple/pink/grey) ── */
.activity-type-tabs {
  display:flex; gap:8px; flex-wrap:wrap; margin-bottom:4px;
}
.activity-tab {
  flex:1; min-width:70px;
  background:var(--bg3); border:1.5px solid var(--border2);
  border-radius:100px; padding:9px 12px;
  color:var(--text2); font-family:var(--font-body);
  font-size:.82rem; font-weight:700; cursor:pointer;
  transition:all .2s; text-align:center;
}
.activity-tab.active {
  color:#fff !important;
  border-color:transparent;
}
.activity-tab[data-type="practice"].active { background:#f97316; }
.activity-tab[data-type="game"].active      { background:#7c3aed; }
.activity-tab[data-type="tournament"].active{ background:#ec4899; }
.activity-tab[data-type="other"].active     { background:#6b7280; }

/* ── Home / Away selector ── */
.home-away-selector {
  display:flex; gap:8px; margin:6px 0;
}
.ha-btn {
  flex:1; background:var(--bg3); border:1.5px solid var(--border2);
  border-radius:var(--radius); padding:10px 8px;
  color:var(--text2); font-family:var(--font-body);
  font-size:.82rem; font-weight:600; cursor:pointer;
  transition:all .15s; text-align:center;
}
.ha-btn.active {
  background:var(--primary-glow);
  border-color:var(--primary); color:var(--primary);
}
.ha-chip {
  font-size:.75rem; font-weight:700; padding:3px 10px;
  border-radius:100px; background:var(--bg3);
  border:1px solid var(--border2); color:var(--text2);
}
.ha-chip.ha-home { background:#10b98120; border-color:#10b981; color:#10b981; }
.ha-chip.ha-away { background:#f59e0b20; border-color:#f59e0b; color:#f59e0b; }

/* ── Duration selector ── */
.duration-selector {
  display:flex; gap:6px; flex-wrap:wrap; margin:4px 0;
}
.duration-btn {
  background:var(--bg3); border:1.5px solid var(--border2);
  border-radius:100px; padding:6px 12px;
  color:var(--text2); font-family:var(--font-body);
  font-size:.78rem; font-weight:600; cursor:pointer;
  transition:all .15s;
}
.duration-btn.active {
  background:var(--primary-glow);
  border-color:var(--primary); color:var(--primary);
}

/* ── Coach notes section (yellow highlight) ── */
.coach-notes-section {
  background:#fefce8; border:1.5px solid #fde047;
  border-radius:var(--radius); padding:12px 14px;
  display:flex; flex-direction:column; gap:6px;
}
.coach-notes-label {
  font-size:.82rem; font-weight:700; color:#854d0e;
}
.coach-notes-sub { font-size:.75rem; color:#a16207; }
.coach-notes-textarea {
  background:#fffbeb !important; border-color:#fde047 !important;
  color:#1c1917 !important;
}

/* Coach notes on event detail (read-only) */
.coach-notes-display {
  background:#fefce8; border:1.5px solid #fde047;
  border-radius:var(--radius); padding:12px 14px;
  font-size:.88rem; color:#1c1917;
}
.coach-notes-display-label {
  font-size:.75rem; font-weight:700; color:#854d0e; margin-bottom:4px;
}

/* ── Bring note ── */
.bring-note {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--yellow-bg); border: 1px solid var(--yellow-border);
  border-radius: var(--radius);
  padding: 11px 14px; font-size: .88rem; color: var(--yellow-text);
  line-height: 1.5;
}
.bring-note-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

/* ── Event type pill (coloured, replaces old badge) ── */
.event-type-pill {
  font-size:.68rem; font-weight:700; padding:3px 9px;
  border-radius:100px; white-space:nowrap; flex-shrink:0;
}
/* Keep old .event-type-badge for backward compat */
.event-type-badge {
  font-size:.65rem; background:var(--bg3); border:1px solid var(--border2);
  border-radius:100px; padding:2px 8px; color:var(--text2);
  text-transform:capitalize;
}

/* ── vs chip ── */
.vs-chip {
  font-size:.75rem; font-weight:700;
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:100px; padding:3px 10px; color:var(--text2);
}

/* ── Form label ── */
.form-label {
  font-size:.8rem; font-weight:600; color:var(--text2);
  margin:10px 0 4px;
}
.form-label-hint { font-weight:400; color:var(--muted); }

/* ── Google Sign-In button ── */
.btn-google {
  background: #ffffff;
  color: #1f2937;
  border: 1.5px solid #e5e7eb;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-weight: 600; font-size: .95rem;
  padding: 13px 20px; border-radius: var(--radius);
  cursor: pointer; width: 100%; font-family: var(--font-body);
  transition: background .15s, box-shadow .15s;
}
.btn-google:hover {
  background: #f9fafb;
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
}
.btn-google:active { transform: scale(.97); }

/* ── Apple Sign-In button ── */
.btn-apple {
  background: #000000;
  color: #ffffff;
  border: 1.5px solid #000000;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-weight: 600; font-size: .95rem;
  padding: 13px 20px; border-radius: var(--radius);
  cursor: pointer; width: 100%; font-family: var(--font-body);
  transition: opacity .15s;
}
.btn-apple:hover { opacity: .88; }
.btn-apple:active { transform: scale(.97); }

/* ── Auth actions stack ── */
.auth-actions {
  display: flex; flex-direction: column; gap: 10px;
}

/* ─────────────────────────────────────────────────────────────────────────────
   MODAL
───────────────────────────────────────────────────────────────────────────── */
#modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 200; display: flex;
  align-items: flex-end; justify-content: center;
  transition: opacity .2s;
}
#modal-overlay.hidden { display: none; }
#modal-box {
  background: var(--bg2);
  border-radius: 24px 24px 0 0;
  padding: 0 20px calc(20px + var(--safe-bottom));
  width: 100%; max-width: 480px;
  max-height: 88dvh; overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;
  animation: slideUp .28s cubic-bezier(.32,.72,0,1);
  -webkit-overflow-scrolling: touch;
}
#modal-box::before {
  content: '';
  display: block;
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 100px;
  margin: 12px auto 8px;
  flex-shrink: 0;
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: .6; }
  to   { transform: translateY(0);    opacity: 1; }
}
#modal-box h3 {
  font-family: var(--font-display);
  font-size: 1.15rem; font-weight: 800;
  color: var(--text);
  margin-top: -4px;
}
.modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

/* Type selector */
.type-selector { display:flex; gap:8px; }
.type-btn {
  flex:1; background:var(--bg3); border:1.5px solid var(--border2);
  border-radius:var(--radius); padding:10px 8px;
  color:var(--text2); font-family:var(--font-body);
  font-size:.8rem; font-weight:600; cursor:pointer;
  transition:all .15s;
}
.type-btn.active {
  background:var(--primary-glow);
  border-color:var(--primary); color:var(--primary);
}

/* Sport grid */
.sport-grid { display:flex; flex-wrap:wrap; gap:8px; }
.sport-btn {
  background:var(--bg3); border:1.5px solid var(--border2);
  border-radius:100px; padding:7px 14px;
  color:var(--text2); font-family:var(--font-body);
  font-size:.8rem; font-weight:600; cursor:pointer;
  transition:all .15s;
}
.sport-btn.active {
  background:var(--primary-glow);
  border-color:var(--primary); color:var(--primary);
}

/* Role options */
.role-options { display:flex; gap:8px; flex-wrap:wrap; }
.role-opt-btn {
  flex:1; min-width:80px;
  background:var(--bg3); border:1.5px solid var(--border2);
  border-radius:var(--radius); padding:10px 8px;
  color:var(--text2); font-family:var(--font-body);
  font-size:.8rem; font-weight:600; cursor:pointer;
  text-align:center; transition:all .15s;
}
.role-opt-btn.active {
  background:var(--primary-glow);
  border-color:var(--primary); color:var(--primary);
}

/* Event detail */
.event-detail { display:flex; flex-direction:column; gap:12px; }
.event-detail h3 { font-family:var(--font-display); font-size:1.3rem; font-weight:800; }
.event-detail-meta { display:flex; flex-direction:column; gap:6px; }
.detail-row { font-size:.9rem; color:var(--text2); }
.rsvp-counts {
  display:flex; gap:16px;
  background:var(--bg3); border-radius:var(--radius);
  padding:12px 16px;
}
.rsvp-count { font-size:1rem; font-weight:600; }
.rsvp-buttons { display:flex; gap:8px; }
.rsvp-btn {
  flex:1; background:var(--bg3);
  border:1.5px solid var(--border2);
  font-size:.8rem; padding:10px 4px;
  border-radius:var(--radius); color:var(--text2);
  transition:all .15s; cursor:pointer;
}
.rsvp-active-yes   { background:#10b98122; border-color:#10b981; color:#10b981; }
.rsvp-active-maybe { background:#f59e0b22; border-color:#f59e0b; color:#f59e0b; }
.rsvp-active-no    { background:#ef444422; border-color:#ef4444; color:#ef4444; }
.rsvp-list { display:flex; flex-direction:column; gap:8px; max-height:180px; overflow-y:auto; }
.rsvp-row  { display:flex; align-items:center; gap:10px; }
.rsvp-status-icon { margin-left:auto; }

/* Members */
.members-list { display:flex; flex-direction:column; gap:8px; max-height:300px; overflow-y:auto; }
.member-row   { display:flex; align-items:center; gap:10px; padding:4px 0; }
.member-info  { flex:1; }
.member-name  { font-size:.9rem; font-weight:500; }

/* Invite code */
.invite-code-display {
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:var(--radius); padding:16px;
  font-size:2rem; font-weight:800; letter-spacing:.25em;
  text-align:center; color:var(--text); font-family:var(--font-display);
}

/* ─────────────────────────────────────────────────────────────────────────────
   EMPTY STATE
───────────────────────────────────────────────────────────────────────────── */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 64px 32px;
  gap: 10px; min-height: min(320px, 50dvh);
}
.empty-emoji { font-size: 3.5rem; margin-bottom: 4px; line-height: 1; }
.empty-icon-svg { color: var(--border2); margin-bottom: 8px; }
.empty-state h3 { font-family: var(--font-display); font-size: 1.25rem; font-weight: 800; color: var(--text); }
.empty-state p  { color: var(--muted); font-size: .88rem; line-height: 1.6; max-width: 240px; }

/* ─────────────────────────────────────────────────────────────────────────────
   TOAST
───────────────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: calc(var(--safe-bottom) + 88px);
  left: 50%; transform: translateX(-50%) translateY(12px);
  background: #1a1a2e;
  color: #fff; padding: 12px 24px;
  border-radius: 100px; font-size: .88rem; font-weight: 600;
  z-index: 999; opacity: 0;
  transition: opacity .22s ease, transform .22s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
  pointer-events: none;
  max-width: calc(100vw - 48px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.toast-error   { background: var(--danger); }
.toast.toast-success { background: #059669; }

/* ─────────────────────────────────────────────────────────────────────────────
   ANIMATIONS
───────────────────────────────────────────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ─────────────────────────────────────────────────────────────────────────────
   UTILITY
───────────────────────────────────────────────────────────────────────────── */
.hidden { display:none !important; }

/* ─────────────────────────────────────────────────────────────────────────────
   RESPONSIVE — Landscape + small screens
───────────────────────────────────────────────────────────────────────────── */

/* Landscape phone: modal takes less height, auth scrolls from top */
@media (max-height: 500px) {
  #modal-box {
    max-height: 92dvh !important;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }
  .auth-screen {
    justify-content: flex-start;
    padding-top: 20px;
    gap: 10px;
  }
  .welcome-screen { padding-top: 16px; gap: 8px; }
  .auth-hero      { margin-bottom: 0; }
  .logo-mark      { font-size: 36px; margin-bottom: 6px; }
  .brand-name     { font-size: 2rem; }
  .welcome-props  { display: none; } /* hide on very short screens */
  .welcome-sports-strip { display: none; }
}

/* Very small phones (320px / iPhone SE) */
@media (max-width: 360px) {
  /* Plans 3-tier grid: stack on tiny screens */
  .plans-tiers-grid {
    grid-template-columns: 1fr;
  }
  /* Onboarding role grid: 2×2 */
  .onboarding-role-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  /* Photo grid stays 3-col but smaller tiles */
  .photo-tile-placeholder { font-size: 1.4rem; }
  /* Event cards less padding */
  .event-card { padding: 11px 12px; gap: 10px; }
}

/* Tablets / wide screens get a nicer layout */
@media (min-width: 768px) {
  .plans-tiers-grid {
    gap: 12px;
  }
  .albums-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
  }
  .photo-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* Desktop centering */
@media (min-width: 480px) {
  #root { max-width: 430px; margin: 0 auto; }
  #modal-overlay { align-items: center; }
  #modal-box { border-radius: var(--radius-xl); max-height: 80dvh; }
}

@media (min-width: 900px) {
  body { background: #E8E8E0; }
  #root {
    box-shadow: 0 0 0 1px var(--border), 0 32px 80px rgba(0,0,0,.12);
    border-radius: 40px; overflow: hidden;
  }
}
</style>
</head>
<body>
<div id="root">
  <div style="height:100dvh;display:flex;align-items:center;justify-content:center;background:#F5F5F0">
    <div style="text-align:center">
      <div style="font-size:3rem;animation:pulse-glow 2s infinite">⚡</div>
      <div style="font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:800;margin-top:12px;color:#00BFA5">TeamUp</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box"></div>
</div>

<!-- Service worker registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
  // Deep link: ?join=CODE brings user straight to join flow
  const joinCode = new URLSearchParams(location.search).get('join');
  if (joinCode) {
    // Store for after auth; show join screen
    sessionStorage.setItem('pendingJoinCode', joinCode);
  }

    // Use relative path so it works on both root domain and GitHub Pages subdirectory
    navigator.serviceWorker.register('./sw.js')
      .catch(() => {});
  });
}
</script>
</body>
</html>
